      case 'flatpak': {
        const sub=args[0];
        if(sub==='install'){
          const pkg=args.find(a=>!a.startsWith('-')&&a!=='install')||'app';
          _asyncPrint(winId,[`Installing ${_esc(pkg)} via Flatpak...`,`<span style="color:#22c55e">✔ Installed ${_esc(pkg)}</span>`],500);

      case 'cargo': {

        else if(sub==='build') _asyncPrint(winId,['Compiling...','Finished release [optimized] target(s)'],600);

      case 'mvn': case 'gradle':
        _asyncPrint(winId,[`BUILD STARTED`,'Resolving dependencies...','Compiling...','<span style="color:#22c55e">BUILD SUCCESS</span>'],500);

      case 'docker': {
        const sub=args[0];
        if(sub==='ps') inf(`CONTAINER ID  IMAGE      COMMAND    CREATED    STATUS    PORTS     NAMES\n(no containers running)`);

        else if(sub==='run') { inf(`Running container from ${_esc(args.find(a=>!a.startsWith('-')&&a!=='run')||'image')}...`); }
        else if(sub==='pull') _asyncPrint(winId,[`Pulling from ${_esc(args[1]||'image')}...`,'latest: Pulling from library/ubuntu','<span style="color:#22c55e">Status: Downloaded newer image</span>'],400);
        else ok(`docker ${args.join(' ')}`);
        if(sub==='pull'){return;} break;
      }
      case 'kubectl': ok(`kubectl: cluster not configured (browser sandbox). Use minikube or remote kubeconfig.`); break;
      case 'conda': case 'mamba': {
        if(args[0]==='install') {_asyncPrint(winId,[`Solving environment...`,`Downloading ${_esc(args[1]||'package')}...`,`<span style="color:#22c55e">✔ installed</span>`],400);PkgRegistry.install(args[1]||'package');return;}
        ok(`conda ${args.join(' ')}`); break;
      }
      case 'ruby': case 'irb': inf(`ruby 3.3.0 (GhaniyOS Virtual)\nirb(main):001:0> `); break;
      case 'php': {
        if(args.length&&!args[0].startsWith('-')){const src=VFS.read(_termResolve(s,args[0]));if(src){src.split('\n').forEach(line=>{const m=line.match(/echo\s+["']([^"']+)["']/);if(m)ok(m[1]);});break;}};
        inf(`PHP 8.3.0 (cli) (GhaniyOS Virtual)\n<?php `); break;
      }
      case 'java': {
        if(args[0]==='-version') ok(`openjdk version "21.0.1" 2023-10-17\nOpenJDK Runtime Environment (GhaniyOS Virtual)`);
        else if(args.find(a=>!a.startsWith('-'))) _asyncPrint(winId,[`Running ${_esc(args.find(a=>!a.startsWith('-')))}...`,'Hello, World!'],400);
        else ok('java: no class specified');
        break;
      }
      case 'javac': { suc(`Compiled: ${args[0]?.replace('.java','.class')||'Main.class'}`); break; }
      case 'lua': inf(`Lua 5.4 (GhaniyOS Virtual)\n> `); break;
      case 'perl': inf(`Perl 5.38.0 (GhaniyOS Virtual)\n`); break;
      case 'R': case 'Rscript': inf(`R version 4.3.1 (GhaniyOS Virtual)\n> `); break;
      // ── MISC EXTRA ────────────────────────────────────────────
      case 'notify-send': Notif.push(args[1]||args[0]||'Notification',args[2]||'','🔔'); break;
      case 'xclip': case 'xsel': case 'pbcopy':
        if(pipeIn){navigator.clipboard?.writeText(pipeIn).then(()=>suc('Copied to clipboard')).catch(()=>suc('Clipboard write (simulated)'));}
        break;
      case 'xdotool': ok(`xdotool: window automation (simulated)`); break;
      case 'scrot': case 'import': suc(`Screenshot saved: screenshot_${Date.now()}.png`); break;
      case 'cowfortune': case 'fortune': {
        const fortunes=['The best error message is the one that never shows up.','Works on my machine!','It\'s not a bug, it\'s a feature.','Have you tried turning it off and on again?','sudo make me a sandwich'];
        ok(fortunes[Math.floor(Math.random()*fortunes.length)]); break;
      }
      case 'banner':
        inf(`<pre style="font-size:10px;color:#60a5fa">${args.join(' ').toUpperCase().split('').map(c=>`[${c}]`).join('')}</pre>`); break;
      case 'rev': ok((pipeIn||args.join(' ')).split('').reverse().join('')); break;
      case 'factor': {
        const n=parseInt(args[0])||12;const factors=[];let x=n;for(let i=2;i<=x;i++)while(x%i===0){factors.push(i);x/=i;}
        ok(`${n}: ${factors.join(' ')}`); break;
      }
      case 'bc': {
        const expr=pipeIn||args.join(' ');
        try{ok(String(Function('"use strict";return ('+expr+')')()));}catch{err('invalid expression');} break;
      }
      case 'store': case 'playstore': {
        const sub=args[0], pkg=args.slice(1).join(' ');
        if(sub==='install'||sub==='get'){
          const app=PS_DB.find(a=>a.id===pkg||a.name.toLowerCase().includes(pkg.toLowerCase()));
          if(!app){err(`store: '${pkg}' not found. Try: store search ${pkg}`);break;}
          suc(`Found: ${app.ico} ${app.name} by ${app.dev}`);
          OS.open('Store');
          setTimeout(()=>{psInstall(app.id);},500);
        } else if(sub==='search'){
          const results=PS_DB.filter(a=>a.name.toLowerCase().includes(pkg.toLowerCase())||a.cat.toLowerCase().includes(pkg.toLowerCase())||(a.tags||[]).some(t=>t.includes(pkg.toLowerCase())));
          if(!results.length){ok(`No results for '${pkg}'`);break;}
          results.slice(0,8).forEach(a=>ok(`${a.ico} <b>${a.name}</b> (${a.cat}) ★${a.rating} — ${a.installs}`));
          inf(`Use: store install &lt;name&gt; — or open GhaniyOS Play for the full store`);
        } else if(sub==='list'){
          PS_DB.filter(a=>PS_INSTALLED.has(a.id)).forEach(a=>ok(`${a.ico} ${a.name} — ${a.dev}`));
        } else if(sub==='open'||!sub){
          OS.open('Store');suc('Opening GhaniyOS Play Store…');
        } else {
          err(`store: unknown command '${sub}'. Try: open, install, search, list`);
        }
        break;
      }
      case 'sudo': _execCore(winId,args.join(' '),pipeIn,emit,false);if(doPrompt)_prompt(winId);return;
      case 'su': ok('Switched to root (virtual)'); s.env.USER=args[0]||'root'; break;
      case 'exit': case 'logout': if(typeof WM!=='undefined')WM.close(winId); return;
      case '': break;
      default: {
        if(s.aliases[cmd]){_exec(winId,s.aliases[cmd]+' '+args.join(' '));return;}
        if(PkgRegistry.has(cmd)&&PkgOutputs[cmd]){
          const inp4=document.getElementById('tinp-'+winId);
          PkgOutputs[cmd](winId,h=>_print(winId,h),inf,[cmd,...args],OS,inp4,s);
        } else if(PkgRegistry.has(cmd)){
          inf(`<span style="color:#94a3b8">${_esc(cmd)} ${args.map(_esc).join(' ')}</span>`);
        } else if(PkgOutputs[cmd]){
          err(`${cmd}: command not found. Try: apt install ${cmd}`);
        } else {
          // Try to find as executable file in PATH
          const execPaths=[s.cwd,'/bin','/usr/bin','/usr/local/bin'].map(d=>d.replace(/\/$/,'')+'/'+cmd);
          const found=execPaths.find(p=>VFS.exists(p));
          if(found){_exec(winId,`sh ${found} ${args.join(' ')}`);return;}
          err(`${cmd}: command not found. Type 'help' or 'apt search ${cmd}'`);
        }
      }
    }
    s._lastExit=0;
    if(doPrompt)_prompt(winId);
  }

  function _tokenize(s, raw) {
    const tokens=[];let cur='',inS=false,inD=false;
    for(let i=0;i<raw.length;i++){
      const c=raw[i];
      if(c==="'"&&!inD)inS=!inS;
      else if(c==='"'&&!inS)inD=!inD;
      else if((c===' '||c==='\t')&&!inS&&!inD){if(cur){tokens.push(_expandVars(s,cur));cur='';}}
      else cur+=c;
    }
    if(cur)tokens.push(_expandVars(s,cur));
    return tokens;
  }
  function _expandVars(s,str){return str.replace(/\$\{(\w+)\}/g,(_,k)=>s.env[k]??'').replace(/\$(\w+)/g,(_,k)=>s.env[k]??'');}

  function _asyncPrint(winId, lines, delay) {
    const inp=document.getElementById('tinp-'+winId);
    if(inp)inp.disabled=true;
    lines.forEach((line,i)=>{
      setTimeout(()=>{
        _print(winId,`<span style="color:#94a3b8">${line}</span>`);
        document.getElementById('tout-'+winId)?.scrollTo(0,9e9);
        if(i===lines.length-1){const inp2=document.getElementById('tinp-'+winId);if(inp2){inp2.disabled=false;inp2.focus();}const s=sessions[winId];if(s)_prompt(winId);}
      },delay*(i+1));
    });
  }

  return { buildUI, initSession, sessions, print:_print, exec:_exec };
})();

// Calculator logic
let calcExpr='',calcVal='0',calcOp=null,calcReset=false;
function calcInput(btn){
  const disp=()=>{const ve=document.getElementById('calc-val'),ee=document.getElementById('calc-expr');if(ve)ve.textContent=calcVal;if(ee)ee.textContent=calcExpr;};
  if(btn==='AC'){calcVal='0';calcExpr='';calcOp=null;calcReset=false;disp();return;}
  if(btn==='⌫'){calcVal=calcVal.length>1?calcVal.slice(0,-1):'0';disp();return;}
  if(btn==='±'){calcVal=String(-parseFloat(calcVal));disp();return;}
  if(btn==='%'){calcVal=String(parseFloat(calcVal)/100);disp();return;}
  if(['+','−','×','÷'].includes(btn)){calcExpr=calcVal+' '+btn;calcOp=btn;calcReset=true;disp();return;}
  if(btn==='='){if(!calcOp)return;const a=parseFloat(calcExpr),b=parseFloat(calcVal);let r=0;if(calcOp==='+')r=a+b;else if(calcOp==='−')r=a-b;else if(calcOp==='×')r=a*b;else if(calcOp==='÷')r=b!==0?a/b:'Error';calcExpr='';calcVal=String(r);calcOp=null;calcReset=false;disp();return;}
  if(btn==='.'&&calcVal.includes('.'))return;
  if(calcReset){calcVal=btn==='.'?'0.':btn;calcReset=false;}
  else calcVal=calcVal==='0'&&btn!=='.'?btn:calcVal+btn;
  disp();
}

// PIXELIFY ENGINE — Photoshop + Illustrator Alternative
// ══════════════════════════════════════════════════════════════
const PX = {
  tool: 'brush', layers: [], activeLayer: 0, zoom: 1,
  drawing: false, lastX: 0, lastY: 0,
  startX: 0, startY: 0, shape: 'rect',
  undoStack: [], redoStack: [], maxUndo: 30,
  selection: null, panning: false, panStart: null,
  vectors: [], activeVector: null,
  penPoints: [], penDrawing: false,
};

function initPaint() {
  const draw = document.getElementById('px-draw');
  if (!draw) return;
  const W = parseInt(document.getElementById('px-w')?.value || 800);
  const H = parseInt(document.getElementById('px-h')?.value || 600);
  PX.width = W; PX.height = H;

  // Set all canvases to same size
  ['px-draw','px-composite','px-selection'].forEach(id => {
    const c = document.getElementById(id);
    if (c) { c.width = W; c.height = H; }
  });

  // Create first layer if empty
  if (PX.layers.length === 0) {
    pxAddLayer('Background');
    const ctx = PX.layers[0].canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
  }

  pxComposite();
  pxSyncLayers();
  pxSyncColors();
  pxRenderSwatches();
  pxSetTool('brush');
  pxUpdateInfo();

  // Events on draw canvas
  const dc = document.getElementById('px-draw');
  if (!dc) return;
  dc.onmousedown  = pxMouseDown;
  dc.onmousemove  = pxMouseMove;
  dc.onmouseup    = pxMouseUp;
  dc.onmouseleave = pxMouseUp;
  dc.oncontextmenu = e => { e.preventDefault(); pxShowContextMenu(e); };

  // Wheel zoom
  const wrap = document.getElementById('px-canvas-wrap');
  if (wrap) wrap.onwheel = e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      pxZoom(e.deltaY < 0 ? 1.1 : 0.9);
    }
  };

  // Keyboard shortcuts
  document.onkeydown = e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    const k = e.key.toLowerCase();
    if (e.ctrlKey || e.metaKey) {
      if (k==='z') { e.preventDefault(); e.shiftKey ? pxRedo() : pxUndo(); }
      else if (k==='s') { e.preventDefault(); pxExport('png'); }
      else if (k==='a') { e.preventDefault(); pxSelectAll(); }
      else if (k==='d') { e.preventDefault(); pxDeselect(); }
      else if (k==='j') { e.preventDefault(); pxAddLayer(); }
      return;
    }
    const toolMap = {b:'brush',e:'eraser',g:'fill',m:'select',l:'lasso',i:'eyedrop',r:'rect',o:'ellipse',t:'text',z:'zoom',h:'pan',v:'pen',p:'pencil'};
    if (toolMap[k]) pxSetTool(toolMap[k]);
    if (k==='[') { const s=document.getElementById('px-size'); if(s){s.value=Math.max(1,parseInt(s.value)-2);document.getElementById('px-size-val').textContent=s.value;} }
    if (k===']') { const s=document.getElementById('px-size'); if(s){s.value=Math.min(100,parseInt(s.value)+2);document.getElementById('px-size-val').textContent=s.value;} }
    if (k==='delete'||k==='backspace') pxClearSelection();
  };
}

function pxGetActiveCtx() {
  if (!PX.layers[PX.activeLayer]) return null;
  return PX.layers[PX.activeLayer].canvas.getContext('2d');
}

function pxMouseDown(e) {
  const [x, y] = pxEventPos(e);
  PX.drawing = true;
  PX.startX = x; PX.startY = y;
  PX.lastX = x; PX.lastY = y;
  const ctx = pxGetActiveCtx();
  if (!ctx) return;
  pxSaveUndo();

  if (PX.tool === 'pan') { PX.panning = true; PX.panStart = {mx: e.clientX, my: e.clientY, sx: document.getElementById('px-canvas-wrap').scrollLeft, sy: document.getElementById('px-canvas-wrap').scrollTop}; return; }
  if (PX.tool === 'eyedrop') { pxEyedrop(x, y); PX.drawing = false; return; }
  if (PX.tool === 'fill') { pxFloodFill(x, y); PX.drawing = false; return; }
  if (PX.tool === 'text') { pxPlaceText(x, y); PX.drawing = false; return; }
  if (PX.tool === 'zoom') { pxZoom(e.shiftKey ? 0.8 : 1.25); PX.drawing = false; return; }
  if (PX.tool === 'pen') { pxPenClick(x, y); return; }

  if (['brush','pencil','eraser'].includes(PX.tool)) {
    pxApplyBrush(ctx, x, y, x, y);
    pxComposite();
  }
}

function pxMouseMove(e) {
  const [x, y] = pxEventPos(e);
  const coords = document.getElementById('px-coords');
  if (coords) coords.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;

  if (PX.panning && PX.panStart) {
    const wrap = document.getElementById('px-canvas-wrap');
    if (wrap) {
      wrap.scrollLeft = PX.panStart.sx - (e.clientX - PX.panStart.mx);
      wrap.scrollTop  = PX.panStart.sy - (e.clientY - PX.panStart.my);
    }
    return;
  }
  if (!PX.drawing) return;
  const ctx = pxGetActiveCtx();
  if (!ctx) return;

  if (['brush','pencil','eraser'].includes(PX.tool)) {
    pxApplyBrush(ctx, PX.lastX, PX.lastY, x, y);
    pxComposite();
  } else if (['rect','ellipse','line','triangle','star','pen'].includes(PX.tool) || PX.tool === 'select' || PX.tool === 'lasso') {
    // Live preview on draw canvas
    pxComposite();
    pxPreviewShape(x, y);
  }
  PX.lastX = x; PX.lastY = y;
}

function pxMouseUp(e) {
  if (!PX.drawing && !PX.panning) return;
  PX.panning = false;
  if (!PX.drawing) return;
  PX.drawing = false;
  const [x, y] = pxEventPos(e);
  const ctx = pxGetActiveCtx();
  if (!ctx) return;

  if (['rect','ellipse','line','triangle','star'].includes(PX.tool)) {
    pxCommitShape(ctx, PX.startX, PX.startY, x, y);
    pxComposite();
  } else if (PX.tool === 'select') {
    PX.selection = { x: Math.min(PX.startX,x), y: Math.min(PX.startY,y), w: Math.abs(x-PX.startX), h: Math.abs(y-PX.startY) };
    pxDrawSelection();
  }
}

function pxEventPos(e) {
  const canvas = document.getElementById('px-draw');
  if (!canvas) return [0,0];
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) / PX.zoom;
  const y = (e.clientY - r.top)  / PX.zoom;
  return [Math.round(x), Math.round(y)];
}

function pxApplyBrush(ctx, x1, y1, x2, y2) {
  const size    = parseInt(document.getElementById('px-size')?.value || 8);
  const opacity = parseInt(document.getElementById('px-opacity')?.value || 100) / 100;
  const blend   = document.getElementById('px-blend')?.value || 'normal';
  const color   = document.getElementById('px-fg-color')?.value || '#000000';
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.globalCompositeOperation = PX.tool === 'eraser' ? 'destination-out' : blend;
  ctx.strokeStyle = PX.tool === 'eraser' ? 'rgba(0,0,0,1)' : color;
  ctx.lineWidth = size;
  ctx.lineCap = PX.tool === 'pencil' ? 'square' : 'round';
  ctx.lineJoin = 'round';
  if (PX.tool === 'pencil') ctx.globalAlpha = Math.min(1, opacity * 1.5);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function pxPreviewShape(x, y) {
  const dc = document.getElementById('px-draw');
  if (!dc) return;
  const ctx = dc.getContext('2d');
  const color = document.getElementById('px-fg-color')?.value || '#000000';
  const size  = parseInt(document.getElementById('px-size')?.value || 2);
  ctx.clearRect(0, 0, dc.width, dc.height);
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = size; ctx.fillStyle = color + '33';
  pxDrawShape(ctx, PX.tool, PX.startX, PX.startY, x, y);
  ctx.restore();
}

function pxCommitShape(ctx, x1, y1, x2, y2) {
  const color   = document.getElementById('px-fg-color')?.value || '#000000';
  const size    = parseInt(document.getElementById('px-size')?.value || 2);
  const opacity = parseInt(document.getElementById('px-opacity')?.value || 100) / 100;
  const blend   = document.getElementById('px-blend')?.value || 'normal';
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = size;
  ctx.fillStyle = color + '33';
  ctx.globalAlpha = opacity;
  ctx.globalCompositeOperation = blend;
  pxDrawShape(ctx, PX.tool, x1, y1, x2, y2);
  ctx.restore();
  // Clear preview
  const dc = document.getElementById('px-draw');
  if (dc) dc.getContext('2d').clearRect(0,0,dc.width,dc.height);
}

function pxDrawShape(ctx, tool, x1, y1, x2, y2) {
  const w = x2-x1, h = y2-y1;
  const cx = (x1+x2)/2, cy = (y1+y2)/2;
  const rx = Math.abs(w)/2, ry = Math.abs(h)/2;
  ctx.beginPath();
  if (tool==='rect') { ctx.rect(x1,y1,w,h); }
  else if (tool==='ellipse') { ctx.ellipse(cx,cy,rx||1,ry||1,0,0,Math.PI*2); }
  else if (tool==='line') { ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); }
  else if (tool==='triangle') { ctx.moveTo(cx,y1); ctx.lineTo(x2,y2); ctx.lineTo(x1,y2); ctx.closePath(); }
  else if (tool==='star') {
    const spikes=5, outerR=Math.max(rx,ry), innerR=outerR*0.4;
    for(let i=0;i<spikes*2;i++){const a=i*Math.PI/spikes-Math.PI/2;const r=i%2===0?outerR:innerR;ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
    ctx.closePath();
  }
  ctx.fill(); ctx.stroke();
}

function pxFloodFill(x, y) {
  const ctx = pxGetActiveCtx();
  if (!ctx) return;
  const color = document.getElementById('px-fg-color')?.value || '#000000';
  const imgData = ctx.getImageData(0, 0, PX.width, PX.height);
  const data = imgData.data;
  const idx = (Math.round(y) * PX.width + Math.round(x)) * 4;
  const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];
  const fc = pxHexToRgb(color);
  if (tr===fc.r && tg===fc.g && tb===fc.b) return;
  const stack = [[Math.round(x), Math.round(y)]];
  const visited = new Uint8Array(PX.width * PX.height);
  let iters = 0;
  while (stack.length && iters++ < 500000) {
    const [cx, cy] = stack.pop();
    if (cx<0||cy<0||cx>=PX.width||cy>=PX.height) continue;
    const i = (cy*PX.width+cx)*4;
    if (visited[cy*PX.width+cx]) continue;
    if (Math.abs(data[i]-tr)>30||Math.abs(data[i+1]-tg)>30||Math.abs(data[i+2]-tb)>30) continue;
    visited[cy*PX.width+cx] = 1;
    data[i]=fc.r; data[i+1]=fc.g; data[i+2]=fc.b; data[i+3]=255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imgData, 0, 0);
  pxComposite();
}

function pxHexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function pxEyedrop(x, y) {
  const ctx = pxGetActiveCtx();
  if (!ctx) return;
  const p = ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
  const hex = '#'+[p[0],p[1],p[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  const fg = document.getElementById('px-fg-color');
  if (fg) { fg.value = hex; }
  Toast.show('Color picked: '+hex, 'info', 1500);
}

function pxPlaceText(x, y) {
  const ti = document.getElementById('px-text-input');
  const cont = document.getElementById('px-canvas-container');
  if (!ti || !cont) return;
  const dc = document.getElementById('px-draw');
  const r = dc ? dc.getBoundingClientRect() : {left:0,top:0};
  const cr = cont.getBoundingClientRect();
  ti.style.display = 'block';
  ti.style.left = (x * PX.zoom) + 'px';
  ti.style.top  = (y * PX.zoom) + 'px';
  ti.style.fontSize = Math.round(16 * PX.zoom) + 'px';
  ti.style.color = document.getElementById('px-fg-color')?.value || '#000000';
  ti.value = '';
  ti.focus();
  ti.onkeydown = e => {
    if (e.key === 'Escape') { ti.style.display='none'; }
    if (e.key === 'Enter' && !e.shiftKey) {
      const ctx = pxGetActiveCtx();
      if (ctx) {
        const s = parseInt(document.getElementById('px-size')?.value||16)*2;
        ctx.save();
        ctx.font = `${s}px sans-serif`;
        ctx.fillStyle = document.getElementById('px-fg-color')?.value||'#000';
        ctx.globalAlpha = parseInt(document.getElementById('px-opacity')?.value||100)/100;
        ti.value.split('\n').forEach((line, i) => ctx.fillText(line, x, y + i*s));
        ctx.restore();
        pxComposite();
        pxAddHistory('Text');
      }
      ti.style.display = 'none';
    }
  };
}

function pxPenClick(x, y) {
  PX.penPoints.push({x, y});
  const dc = document.getElementById('px-draw');
  if (!dc) return;
  const ctx = dc.getContext('2d');
  pxComposite();
  if (PX.penPoints.length >= 2) {
    ctx.save();
    ctx.strokeStyle = document.getElementById('px-fg-color')?.value||'#000';
    ctx.lineWidth = parseInt(document.getElementById('px-size')?.value||2);
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(PX.penPoints[0].x, PX.penPoints[0].y);
    for (let i=1; i<PX.penPoints.length; i++) {
      const p0=PX.penPoints[i-1], p1=PX.penPoints[i];
      ctx.quadraticCurveTo(p0.x,p0.y,(p0.x+p1.x)/2,(p0.y+p1.y)/2);
    }
    ctx.stroke();
    ctx.restore();
  }
  // Draw anchor dot
  const ctx2 = dc.getContext('2d');
  ctx2.fillStyle = '#58a6ff';
  ctx2.beginPath();
  ctx2.arc(x, y, 4, 0, Math.PI*2);
  ctx2.fill();
}

function pxPenCommit() {
  if (PX.penPoints.length < 2) { PX.penPoints=[]; return; }
  const ctx = pxGetActiveCtx();
  if (ctx) {
    ctx.save();
    ctx.strokeStyle = document.getElementById('px-fg-color')?.value||'#000';
    ctx.lineWidth = parseInt(document.getElementById('px-size')?.value||2);
    ctx.beginPath();
    ctx.moveTo(PX.penPoints[0].x, PX.penPoints[0].y);
    for (let i=1; i<PX.penPoints.length; i++) {
      const p0=PX.penPoints[i-1], p1=PX.penPoints[i];
      ctx.quadraticCurveTo(p0.x,p0.y,(p0.x+p1.x)/2,(p0.y+p1.y)/2);
    }
    ctx.stroke();
    ctx.restore();
    pxComposite();
    pxAddHistory('Pen path');
  }
  PX.penPoints=[];
  const dc=document.getElementById('px-draw');
  if(dc) dc.getContext('2d').clearRect(0,0,dc.width,dc.height);
}

function pxComposite() {
  const cc = document.getElementById('px-composite');
  if (!cc) return;
  const ctx = cc.getContext('2d');
  ctx.clearRect(0, 0, cc.width, cc.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cc.width, cc.height);
  PX.layers.forEach(layer => {
    if (!layer.visible) return;
    ctx.save();
    ctx.globalAlpha = layer.opacity;
    ctx.globalCompositeOperation = layer.blend || 'source-over';
    ctx.drawImage(layer.canvas, 0, 0);
    ctx.restore();
  });
}

function pxAddLayer(name) {
  const W = PX.width || 800, H = PX.height || 600;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const layer = {
    canvas, name: name || `Layer ${PX.layers.length+1}`,
    visible: true, opacity: 1, blend: 'source-over', locked: false
  };
  PX.layers.splice(PX.activeLayer + 1, 0, layer);
  PX.activeLayer = PX.layers.indexOf(layer);
  pxSyncLayers();
  pxAddHistory('New layer');
}

function pxDupeLayer() {
  const src = PX.layers[PX.activeLayer];
  if (!src) return;
  const W = PX.width||800, H=PX.height||600;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  canvas.getContext('2d').drawImage(src.canvas, 0, 0);
  const layer = {...src, canvas, name: src.name+' copy'};
  PX.layers.splice(PX.activeLayer+1, 0, layer);
  PX.activeLayer++;
  pxSyncLayers();
}

function pxDeleteLayer() {
  if (PX.layers.length <= 1) { Toast.show('Cannot delete last layer','warn'); return; }
  PX.layers.splice(PX.activeLayer, 1);
  PX.activeLayer = Math.min(PX.activeLayer, PX.layers.length-1);
  pxComposite();
  pxSyncLayers();
}

function pxSyncLayers() {
  const el = document.getElementById('px-layers');
  if (!el) return;
  el.innerHTML = [...PX.layers].reverse().map((l, ri) => {
    const i = PX.layers.length - 1 - ri;
    return `<div class="px-layer-row ${i===PX.activeLayer?'active':''}" onclick="pxSetActiveLayer(${i})">
      <canvas class="px-layer-thumb" id="px-thumb-${i}"></canvas>
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;color:${i===PX.activeLayer?'#58a6ff':'#e6edf3'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.name}</div>
        <input type="range" min="0" max="100" value="${Math.round(l.opacity*100)}"
          style="width:100%;height:2px" oninput="PX.layers[${i}].opacity=this.value/100;pxComposite()" onclick="event.stopPropagation()">
      </div>
      <div onclick="event.stopPropagation();PX.layers[${i}].visible=!PX.layers[${i}].visible;pxComposite();pxSyncLayers()" style="cursor:pointer;font-size:12px;color:${l.visible?'#58a6ff':'#484f58'}">${l.visible?'👁':'🚫'}</div>
    </div>`;
  }).join('');
  // Render thumbs
  PX.layers.forEach((l, i) => {
    const t = document.getElementById('px-thumb-'+i);
    if (!t) return;
    t.width=40; t.height=30;
    t.getContext('2d').drawImage(l.canvas, 0, 0, 40, 30);
  });
}

function pxSetActiveLayer(i) {
  PX.activeLayer = i;
  pxSyncLayers();
}

function pxSaveUndo() {
  const layer = PX.layers[PX.activeLayer];
  if (!layer) return;
  const snap = document.createElement('canvas');
  snap.width = layer.canvas.width; snap.height = layer.canvas.height;
  snap.getContext('2d').drawImage(layer.canvas, 0, 0);
  PX.undoStack.push({ layer: PX.activeLayer, canvas: snap });
  if (PX.undoStack.length > PX.maxUndo) PX.undoStack.shift();
  PX.redoStack = [];
}

function pxUndo() {
  if (!PX.undoStack.length) { Toast.show('Nothing to undo','info'); return; }
  const snap = PX.undoStack.pop();
  const layer = PX.layers[snap.layer];
  if (!layer) return;
  // Save current for redo
  const cur = document.createElement('canvas');
  cur.width=layer.canvas.width; cur.height=layer.canvas.height;
  cur.getContext('2d').drawImage(layer.canvas, 0, 0);
  PX.redoStack.push({ layer: snap.layer, canvas: cur });
  layer.canvas.getContext('2d').clearRect(0,0,layer.canvas.width,layer.canvas.height);
  layer.canvas.getContext('2d').drawImage(snap.canvas, 0, 0);
  pxComposite(); pxSyncLayers();
  pxAddHistory('Undo');
}

function pxRedo() {
  if (!PX.redoStack.length) { Toast.show('Nothing to redo','info'); return; }
  const snap = PX.redoStack.pop();
  const layer = PX.layers[snap.layer];
  if (!layer) return;
  const cur = document.createElement('canvas');
  cur.width=layer.canvas.width; cur.height=layer.canvas.height;
  cur.getContext('2d').drawImage(layer.canvas, 0, 0);
  PX.undoStack.push({ layer: snap.layer, canvas: cur });
  layer.canvas.getContext('2d').clearRect(0,0,layer.canvas.width,layer.canvas.height);
  layer.canvas.getContext('2d').drawImage(snap.canvas, 0, 0);
  pxComposite(); pxSyncLayers();
}

function pxApplyFilter(filter) {
  const ctx = pxGetActiveCtx();
  if (!ctx) return;
  pxSaveUndo();
  const W = PX.width, H = PX.height;
  const filterMap = {
    'Blur':      'blur(3px)',
    'Sharpen':   'contrast(1.5) brightness(1.05)',
    'Invert':    'invert(1)',
    'Grayscale': 'grayscale(1)',
    'Sepia':     'sepia(1)',
    'Brightness':'brightness(1.3)',
    'Contrast':  'contrast(1.5)',
    'Saturate':  'saturate(2)',
    'Hue Rotate':'hue-rotate(90deg)',
    'Emboss':    'contrast(2) brightness(0.8)',
    'Edge':      'invert(1) grayscale(1) contrast(3)',
    'Pixelate':  null,
  };
  if (filter === 'Pixelate') {
    const tmp = document.createElement('canvas');
    tmp.width=W; tmp.height=H;
    const tc = tmp.getContext('2d');
    const px=8;
    tc.drawImage(PX.layers[PX.activeLayer].canvas, 0, 0, W/px, H/px);
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(tmp, 0, 0, W/px, H/px, 0, 0, W, H);
    ctx.imageSmoothingEnabled = true;
  } else if (filterMap[filter]) {
    const img = document.createElement('canvas');
    img.width=W; img.height=H;
    const ic = img.getContext('2d');
    ic.drawImage(PX.layers[PX.activeLayer].canvas, 0, 0);
    ctx.clearRect(0,0,W,H);
    ctx.filter = filterMap[filter];
    ctx.drawImage(img, 0, 0);
    ctx.filter = 'none';
  }
  pxComposite(); pxSyncLayers();
  pxAddHistory('Filter: '+filter);
  Toast.show(filter+' applied', 'success', 1500);
}

function pxAdjust() {
  const b = parseInt(document.getElementById('px-adj-bright')?.value||0);
  const c = parseInt(document.getElementById('px-adj-contrast')?.value||0);
  const s = parseInt(document.getElementById('px-adj-sat')?.value||0);
  const h = parseInt(document.getElementById('px-adj-hue')?.value||0);
  const ctx = pxGetActiveCtx();
  if (!ctx) return;
  const W=PX.width, H=PX.height;
  const img = document.createElement('canvas');
  img.width=W; img.height=H;
  // Draw original from a stored snapshot if available — for now apply to composite
  const cc = document.getElementById('px-composite');
  if (!cc) return;
  img.getContext('2d').drawImage(cc, 0, 0);
  const dc = document.getElementById('px-draw');
  if (dc) {
    const pc = dc.getContext('2d');
    pc.clearRect(0,0,W,H);
    pc.filter = `brightness(${1+b/100}) contrast(${1+c/100}) saturate(${1+s/100}) hue-rotate(${h}deg)`;
    pc.drawImage(img, 0, 0);
    pc.filter = 'none';
  }
}

function pxFlatten() {
  const W=PX.width||800, H=PX.height||600;
  const flat = document.createElement('canvas');
  flat.width=W; flat.height=H;
  const ctx = flat.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);
  PX.layers.forEach(l => { if(l.visible) ctx.drawImage(l.canvas,0,0); });
  PX.layers = [{ canvas: flat, name:'Background', visible:true, opacity:1, blend:'source-over' }];
  PX.activeLayer = 0;
  pxComposite(); pxSyncLayers();
  pxAddHistory('Flatten');
  Toast.show('All layers flattened', 'success');
}

function pxExport(format) {
  pxFlattenToCanvas().then(canvas => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/'+format, 0.95);
    a.download = 'pixelify_'+Date.now()+'.'+format;
    a.click();
    Toast.show('Saved as '+format.toUpperCase(), 'success', 2000);
  });
}

function pxFlattenToCanvas() {
  return new Promise(res => {
    const W=PX.width||800, H=PX.height||600;
    const flat = document.createElement('canvas');
    flat.width=W; flat.height=H;
    const ctx = flat.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    PX.layers.forEach(l => { if(l.visible) ctx.drawImage(l.canvas,0,0); });
    res(flat);
  });
}

function pxImport() { document.getElementById('px-file-inp')?.click(); }

function pxLoadImage(inp) {
  const file = inp.files[0]; if (!file) return;
  const img = new Image();
  img.onload = () => {
    const W = img.width||800, H = img.height||600;
    PX.width=W; PX.height=H;
    ['px-draw','px-composite','px-selection'].forEach(id=>{const c=document.getElementById(id);if(c){c.width=W;c.height=H;}});
    const canvas = document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    canvas.getContext('2d').drawImage(img,0,0);
    PX.layers = [{ canvas, name: file.name, visible:true, opacity:1, blend:'source-over' }];
    PX.activeLayer = 0;
    pxComposite(); pxSyncLayers(); pxUpdateInfo();
    const wi=document.getElementById('px-w'), hi=document.getElementById('px-h');
    if(wi)wi.value=W; if(hi)hi.value=H;
    Toast.show('Image loaded: '+file.name, 'success');
  };
  img.src = URL.createObjectURL(file);
}

function pxResize() {
  const W = parseInt(document.getElementById('px-w')?.value||800);
  const H = parseInt(document.getElementById('px-h')?.value||600);
  PX.width=W; PX.height=H;
  PX.layers.forEach(l => {
    const tmp=document.createElement('canvas'); tmp.width=W; tmp.height=H;
    tmp.getContext('2d').drawImage(l.canvas,0,0,W,H);
    l.canvas=tmp;
  });
  ['px-draw','px-composite','px-selection'].forEach(id=>{const c=document.getElementById(id);if(c){c.width=W;c.height=H;}});
  pxComposite(); pxSyncLayers(); pxUpdateInfo();
  Toast.show(`Canvas resized to ${W}×${H}`, 'success');
}

function pxSetTool(tool) {
  PX.tool = tool;
  document.querySelectorAll('.px-tool').forEach(t=>t.classList.remove('active'));
  const el = document.getElementById('pxt-'+tool);
  if (el) el.classList.add('active');
  const dc = document.getElementById('px-draw');
  if (dc) dc.style.cursor = tool==='zoom'?'zoom-in':tool==='pan'?'grab':tool==='eyedrop'?'crosshair':'crosshair';
  // Commit pen if switching away
  if (tool !== 'pen' && PX.penPoints.length) pxPenCommit();
  const props = document.getElementById('px-props');
  if (props) props.innerHTML = `Tool: <b style="color:#58a6ff">${tool}</b><br>Layer: ${PX.layers[PX.activeLayer]?.name||'-'}<br>Size: ${document.getElementById('px-size')?.value||8}px<br>Opacity: ${document.getElementById('px-opacity')?.value||100}%`;
}

function pxSetShape(s) { PX.shape = s; pxSetTool(s); }

function pxTool(t) { pxSetTool(t); }

function pxZoom(factor) {
  PX.zoom = Math.max(0.1, Math.min(8, PX.zoom * factor));
  const cont = document.getElementById('px-canvas-container');
  if (cont) cont.style.transform = `scale(${PX.zoom})`;
  const label = document.getElementById('px-zoom-label');
  if (label) label.textContent = `Zoom: ${Math.round(PX.zoom*100)}%`;
}
function pxZoomFit() {
  const wrap = document.getElementById('px-canvas-wrap');
  if (!wrap) return;
  const f = Math.min((wrap.clientWidth-40)/PX.width, (wrap.clientHeight-40)/PX.height);
  PX.zoom = Math.max(0.1, Math.min(8, f));
  const cont = document.getElementById('px-canvas-container');
  if (cont) cont.style.transform = `scale(${PX.zoom})`;
  const label = document.getElementById('px-zoom-label');
  if (label) label.textContent = `Zoom: ${Math.round(PX.zoom*100)}%`;
}
function pxZoomReset() { PX.zoom=1; const cont=document.getElementById('px-canvas-container'); if(cont)cont.style.transform='scale(1)'; const l=document.getElementById('px-zoom-label'); if(l)l.textContent='Zoom: 100%'; }

function pxSelectAll() { PX.selection={x:0,y:0,w:PX.width,h:PX.height}; pxDrawSelection(); }
function pxDeselect() { PX.selection=null; const sc=document.getElementById('px-selection'); if(sc)sc.getContext('2d').clearRect(0,0,sc.width,sc.height); }

function pxClearSelection() {
  if (!PX.selection) return;
  const ctx=pxGetActiveCtx(); if(!ctx) return;
  pxSaveUndo();
  ctx.clearRect(PX.selection.x, PX.selection.y, PX.selection.w, PX.selection.h);
  pxComposite();
}

function pxDrawSelection() {
  const sc = document.getElementById('px-selection');
  if (!sc || !PX.selection) return;
  const ctx = sc.getContext('2d');
  ctx.clearRect(0,0,sc.width,sc.height);
  ctx.save();
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(PX.selection.x, PX.selection.y, PX.selection.w, PX.selection.h);
  ctx.restore();

function pxNewCanvas() {
  const W=parseInt(document.getElementById('px-w')?.value||800);
  const H=parseInt(document.getElementById('px-h')?.value||600);
  PX.layers=[]; PX.activeLayer=0; PX.undoStack=[]; PX.redoStack=[];
  PX.width=W; PX.height=H;
  initPaint();
  Toast.show('New canvas: '+W+'×'+H, 'success');
}

function pxFlipH() {
  const ctx=pxGetActiveCtx(); if(!ctx) return; pxSaveUndo();
  const W=PX.width,H=PX.height;
  const tmp=document.createElement('canvas'); tmp.width=W;tmp.height=H;
  tmp.getContext('2d').drawImage(PX.layers[PX.activeLayer].canvas,0,0);
  ctx.clearRect(0,0,W,H); ctx.save(); ctx.translate(W,0); ctx.scale(-1,1); ctx.drawImage(tmp,0,0); ctx.restore();
  pxComposite();
}
function pxFlipV() {
  const ctx=pxGetActiveCtx(); if(!ctx) return; pxSaveUndo();
  const W=PX.width,H=PX.height;
  const tmp=document.createElement('canvas'); tmp.width=W;tmp.height=H;
  tmp.getContext('2d').drawImage(PX.layers[PX.activeLayer].canvas,0,0);
  ctx.clearRect(0,0,W,H); ctx.save(); ctx.translate(0,H); ctx.scale(1,-1); ctx.drawImage(tmp,0,0); ctx.restore();
  pxComposite();
}
function pxRotate90() {
  const src=PX.layers[PX.activeLayer]; if(!src) return; pxSaveUndo();
  const W=PX.width,H=PX.height;
  const tmp=document.createElement('canvas'); tmp.width=H;tmp.height=W;
  const tc=tmp.getContext('2d'); tc.translate(H,0); tc.rotate(Math.PI/2); tc.drawImage(src.canvas,0,0);
  src.canvas=tmp; PX.width=H; PX.height=W;
  ['px-draw','px-composite','px-selection'].forEach(id=>{const c=document.getElementById(id);if(c){c.width=H;c.height=W;}});
  pxComposite(); pxSyncLayers(); pxUpdateInfo();
}

// Vector tools (SVG-style on top of canvas)
const PX_VEC = { items: [] };
function pxVectorCircle() { PX_VEC.items.push({type:'circle',cx:PX.width/2,cy:PX.height/2,r:60,fill:'none',stroke:document.getElementById('px-fg-color')?.value||'#000',sw:2}); pxVectorRender(); }
function pxVectorRect()   { PX_VEC.items.push({type:'rect',x:PX.width/2-60,y:PX.height/2-40,w:120,h:80,fill:'none',stroke:document.getElementById('px-fg-color')?.value||'#000',sw:2}); pxVectorRender(); }
function pxVectorText()   { const t=prompt('Enter text:','Hello'); if(t)PX_VEC.items.push({type:'text',x:PX.width/2,y:PX.height/2,text:t,fill:document.getElementById('px-fg-color')?.value||'#000',size:24}); pxVectorRender(); }
function pxVectorRender() {
  const ctx=pxGetActiveCtx(); if(!ctx) return;
  PX_VEC.items.forEach(v=>{
    ctx.save();
    if(v.type==='circle'){ctx.beginPath();ctx.arc(v.cx,v.cy,v.r,0,Math.PI*2);ctx.strokeStyle=v.stroke;ctx.lineWidth=v.sw;ctx.fillStyle=v.fill;if(v.fill!=='none')ctx.fill();ctx.stroke();}
    else if(v.type==='rect'){ctx.beginPath();ctx.rect(v.x,v.y,v.w,v.h);ctx.strokeStyle=v.stroke;ctx.lineWidth=v.sw;ctx.fillStyle=v.fill;if(v.fill!=='none')ctx.fill();ctx.stroke();}
    else if(v.type==='text'){ctx.font=`${v.size}px sans-serif`;ctx.fillStyle=v.fill;ctx.fillText(v.text,v.x,v.y);}
    ctx.restore();
  });
  pxComposite();
}
function pxVectorExportSVG() {
  pxFlattenToCanvas().then(canvas => {
    const W=PX.width, H=PX.height;
    const img = canvas.toDataURL('image/png');
    const svgItems = PX_VEC.items.map(v=>{
      if(v.type==='circle') return `<circle cx="${v.cx}" cy="${v.cy}" r="${v.r}" fill="${v.fill}" stroke="${v.stroke}" stroke-width="${v.sw}"/>`;
      if(v.type==='rect') return `<rect x="${v.x}" y="${v.y}" width="${v.w}" height="${v.h}" fill="${v.fill}" stroke="${v.stroke}" stroke-width="${v.sw}"/>`;
      if(v.type==='text') return `<text x="${v.x}" y="${v.y}" font-size="${v.size}" fill="${v.fill}">${v.text}</text>`;
      return '';
    }).join('\n');
    const svg=`<?xml version="1.0"?><svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}"><image href="${img}" width="${W}" height="${H}"/>${svgItems}</svg>`;
    const a=document.createElement('a'); a.href='data:image/svg+xml;base64,'+btoa(svg); a.download='pixelify_'+Date.now()+'.svg'; a.click();
    Toast.show('SVG exported', 'success');
  });
}

// MUSIC PLAYER ENGINE
// ══════════════════════════════════════════════════════════════
const MU = { tracks:[], idx:0, shuffle:false, repeat:false, raf:null };

function musicInit() {
  const a = document.getElementById('mu-audio');
  if (!a) return;
  a.volume = 0.8;
  a.ontimeupdate = () => {
    const seek = document.getElementById('mu-seek');
    const cur  = document.getElementById('mu-cur');
    if (seek && a.duration) seek.value = (a.currentTime / a.duration) * 100;
    if (cur) cur.textContent = muFmt(a.currentTime);
  };
  a.onended = () => MU.repeat ? (a.currentTime=0, a.play()) : muNext();
  a.onloadedmetadata = () => {
    const dur = document.getElementById('mu-dur');
    if (dur) dur.textContent = muFmt(a.duration);
  };
}

function muLoad(inp) {
  const files = Array.from(inp.files);
  MU.tracks = files.map(f => ({ name: f.name.replace(/\.[^.]+$/, ''), url: URL.createObjectURL(f), file: f }));
  MU.idx = 0;
  muRenderPlaylist();
  muPlay(0);
}

function muRenderPlaylist() {
  const pl = document.getElementById('mu-playlist');
  if (!pl) return;
  if (!MU.tracks.length) { pl.innerHTML = '<div style="padding:12px;text-align:center;font-size:11px;color:#334155">No tracks</div>'; return; }
  pl.innerHTML = MU.tracks.map((t, i) => `
    <div onclick="muPlay(${i})" style="display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);background:${i===MU.idx?'rgba(139,92,246,0.12)':'transparent'};transition:background .15s"
      onmouseover="this.style.background='rgba(139,92,246,0.1)'" onmouseout="this.style.background='${i===MU.idx?'rgba(139,92,246,0.12)':'transparent'}'">
      <div style="font-size:16px">${i===MU.idx?'▶️':'🎵'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;color:${i===MU.idx?'#a78bfa':'#e2e8f0'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:${i===MU.idx?600:400}">${t.name}</div>
      </div>
      <div style="font-size:10px;color:#334155">${i+1}</div>
    </div>`).join('');
}

function muPlay(i) {
  if (i < 0 || i >= MU.tracks.length) return;
  MU.idx = i;
  const a = document.getElementById('mu-audio');
  const title = document.getElementById('mu-title');
  const artist = document.getElementById('mu-artist');
  const art = document.getElementById('mu-art');
  if (!a) return;
  a.src = MU.tracks[i].url;
  a.play();
  if (title) title.textContent = MU.tracks[i].name;
  if (artist) artist.textContent = 'Local File · Track ' + (i+1) + ' of ' + MU.tracks.length;
  if (art) { art.style.transform = 'scale(1.05)'; setTimeout(() => art.style.transform = '', 300); }
  document.getElementById('mu-play-btn').textContent = '⏸';
  muRenderPlaylist();
}

function muToggle() {
  const a = document.getElementById('mu-audio');
  const btn = document.getElementById('mu-play-btn');
  if (!a) return;
  if (a.paused) { a.play(); if(btn)btn.textContent='⏸'; }
  else          { a.pause(); if(btn)btn.textContent='▶'; }
}

function muNext() {
  const next = MU.shuffle ? Math.floor(Math.random()*MU.tracks.length) : (MU.idx+1) % MU.tracks.length;
  muPlay(next);
}
function muPrev() { muPlay((MU.idx - 1 + MU.tracks.length) % MU.tracks.length); }
function muSeek(v) { const a=document.getElementById('mu-audio'); if(a&&a.duration)a.currentTime=(v/100)*a.duration; }
function muVol(v)  { const a=document.getElementById('mu-audio'); if(a) a.volume=v/100; }
function muShuffle() { MU.shuffle=!MU.shuffle; const b=document.getElementById('mu-shuf-btn'); if(b)b.style.color=MU.shuffle?'#a78bfa':'#475569'; }
function muRepeat()  { MU.repeat=!MU.repeat;   const b=document.getElementById('mu-rep-btn');  if(b)b.style.color=MU.repeat?'#a78bfa':'#475569'; }
function muFmt(s) { if(isNaN(s))return'0:00'; const m=Math.floor(s/60),ss=Math.floor(s%60); return m+':'+(ss<10?'0':'')+ss; }

function veInit() {
  const v = document.getElementById('ve-video');
  if (!v) return;
  v.ontimeupdate = () => {
    if (!v.duration) return;
    const pct = (v.currentTime / v.duration) * 100;
    const fill = document.getElementById('ve-tl-fill');
    const head = document.getElementById('ve-tl-head');
    const tc   = document.getElementById('ve-timecode');
    if (fill) fill.style.width = pct + '%';
    if (head) head.style.left  = pct + '%';
    if (tc)   tc.textContent   = veFmtTime(v.currentTime);
  };
  v.onloadedmetadata = () => {
    const dur = document.getElementById('ve-dur2');
    const props = document.getElementById('ve-props');
    const overlay = document.getElementById('ve-overlay');
    const track = document.getElementById('ve-clip-track');
    if (dur)   dur.textContent  = veFmtTime(v.duration);
    if (overlay) overlay.style.display = 'none';
    if (props) props.innerHTML  = `File: <b style="color:#e6edf3">${v._name||'video'}</b><br>Duration: ${veFmtTime(v.duration)}<br>Size: ${v._size||'?'}<br>Resolution: ${v.videoWidth}×${v.videoHeight}`;
    if (track) {
      const w = Math.max(60, Math.min(400, v.duration * 8));
      track.innerHTML = `<div style="height:100%;min-width:${w}px;background:linear-gradient(90deg,rgba(88,166,255,0.2),rgba(88,166,255,0.1));border-radius:5px;border:1px solid rgba(88,166,255,0.3);display:flex;align-items:center;padding:0 10px;font-size:10px;color:#58a6ff;cursor:pointer" onclick="document.getElementById('ve-video').play()">${v._name||'Video Clip'} · ${veFmtTime(v.duration)}</div>`;
    }
  };
}

function veLoad(inp) {
  const f = inp.files[0]; if (!f) return;
  const v = document.getElementById('ve-video');
  if (!v) return;
  v.src = URL.createObjectURL(f);
  v._name = f.name; v._size = (f.size/1024/1024).toFixed(1)+'MB';
  Toast.show('Video loaded: ' + f.name, 'success', 2000);
}

function veTogglePlay() {
  const v = document.getElementById('ve-video');
  if (!v) return;
  v.paused ? v.play() : v.pause();
}

function veTimelineClick(e) {
  const v = document.getElementById('ve-video');
  const tl = document.getElementById('ve-timeline');
  if (!v || !tl || !v.duration) return;
  const r = tl.getBoundingClientRect();
  v.currentTime = ((e.clientX - r.left) / r.width) * v.duration;
}

function veFilter(f) {
  const v = document.getElementById('ve-video');
  if (!v) return;
  const filters = {
    'None':'', 'Grayscale':'grayscale(1)', 'Sepia':'sepia(1)', 'Invert':'invert(1)',
    'Blur':'blur(2px)', 'Contrast':'contrast(1.8)', 'Saturate':'saturate(2)',
    'Vintage':'sepia(0.5) contrast(1.2) brightness(0.9)',
    'Cool':'hue-rotate(200deg) saturate(1.3)', 'Warm':'hue-rotate(-20deg) saturate(1.4) brightness(1.1)'
  };
  v.style.filter = filters[f] || '';
  Toast.show('Filter: ' + f, 'info', 1000);
}

function veAdjust(id, val) {
  const lbl = document.getElementById(id+'-val');
  if (lbl) lbl.textContent = val + '%';
  const v = document.getElementById('ve-video');
  if (!v) return;
  const b = parseInt(document.getElementById('ve-bright')?.value||100)/100;
  const c = parseInt(document.getElementById('ve-con')?.value||100)/100;
  const s = parseInt(document.getElementById('ve-vol2')?.value||100)/100;
  const spd = parseInt(document.getElementById('ve-spd')?.value||100)/100;
  v.style.filter = `brightness(${b}) contrast(${c})`;
  v.volume = Math.min(1, s);
  v.playbackRate = Math.max(0.25, Math.min(4, spd));
}

function veAction(action) {
  const v = document.getElementById('ve-video');
  if (!v || !v.src) { Toast.show('Load a video first', 'warn'); return; }
  const actions = {
    'Cut':    () => Toast.show('Cut at ' + veFmtTime(v.currentTime), 'info', 2000),
    'Trim':   () => Toast.show('Trim: set In/Out points with [ and ] keys', 'info', 3000),
    'Split':  () => Toast.show('Split at ' + veFmtTime(v.currentTime), 'info', 2000),
    'Merge':  () => Toast.show('Select multiple clips to merge', 'info', 2000),
    'Fade In':  () => { v.volume = 0; let i = setInterval(()=>{if(v.volume>=0.98){v.volume=1;clearInterval(i);}else v.volume=Math.min(1,v.volume+0.05);},100); Toast.show('Fade in applied', 'success', 1500); },
    'Fade Out': () => { let i = setInterval(()=>{if(v.volume<=0.02){v.volume=0;clearInterval(i);}else v.volume=Math.max(0,v.volume-0.05);},100); Toast.show('Fade out applied', 'success', 1500); },
  };
  if (actions[action]) actions[action]();
}

function veExport() {
  const v = document.getElementById('ve-video');
  if (!v || !v.src) { Toast.show('No video loaded', 'warn'); return; }
  Toast.show('Export: In a real video editor this would render the file. For now, the original file is used.', 'info', 4000);
  const a = document.createElement('a');
  a.href = v.src; a.download = 'ghaniyos_export_' + Date.now() + '.mp4'; a.click();
}

function veFmtTime(s) {
  if (isNaN(s)) return '00:00.00';
  const m=Math.floor(s/60), sec=Math.floor(s%60), ms=Math.floor((s%1)*100);
  return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec+'.'+(ms<10?'0':'')+ms;
}

// ══════════════════════════════════════════════════════════════
// PDF READER ENGINE (uses PDF.js CDN)
// ══════════════════════════════════════════════════════════════
const PDF_STATE = { pdf: null, page: 1, scale: 1.5 };

function pdfLoad(inp) {
  const f = inp.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = e => pdfRender(new Uint8Array(e.target.result), f.name);
  reader.readAsArrayBuffer(f);
}

function pdfDrop(e) {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (!f || f.type !== 'application/pdf') { Toast.show('Please drop a PDF file', 'warn'); return; }
  const reader = new FileReader();
  reader.onload = ev => pdfRender(new Uint8Array(ev.target.result), f.name);
  reader.readAsArrayBuffer(f);
}

function pdfRender(data, name) {
  // Load PDF.js dynamically
  if (!window.pdfjsLib) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfDoRender(data, name);
    };
    document.head.appendChild(script);
  } else {
    pdfDoRender(data, name);
  }
}

function pdfDoRender(data, name) {
  Toast.show('Loading PDF…', 'info', 2000);
  pdfjsLib.getDocument({ data }).promise.then(pdf => {
    PDF_STATE.pdf = pdf;
    PDF_STATE.page = 1;
    const info = document.getElementById('pdf-pageinfo');
    if (info) info.textContent = `1 / ${pdf.numPages}`;
    // Hide drop zone
    const drop = document.getElementById('pdf-drop');
    if (drop) drop.style.display = 'none';
    pdfShowPage(1);
    pdfRenderThumbs();
    pdfExtractText();
    Toast.show(`PDF loaded: ${name} (${pdf.numPages} pages)`, 'success', 2500);
  }).catch(err => Toast.show('PDF error: ' + err.message, 'error', 4000));
}

function pdfShowPage(n) {
  if (!PDF_STATE.pdf) return;
  PDF_STATE.pdf.getPage(n).then(page => {
    const wrap = document.getElementById('pdf-canvas-wrap');
    let canvas = document.getElementById('pdf-canvas-' + n);
    if (!canvas) {
      canvas = document.createElement('canvas');
      canvas.id = 'pdf-canvas-' + n;
      canvas.style.cssText = 'box-shadow:0 4px 32px rgba(0,0,0,0.5);display:block;margin-bottom:12px';
      wrap.appendChild(canvas);
    }
    const vp = page.getViewport({ scale: PDF_STATE.scale });
    canvas.width = vp.width; canvas.height = vp.height;
    page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
    canvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
    const info = document.getElementById('pdf-pageinfo');
    if (info) info.textContent = `${n} / ${PDF_STATE.pdf.numPages}`;
    PDF_STATE.page = n;
    pdfHighlightThumb(n);
  });
}

function pdfRenderThumbs() {
  if (!PDF_STATE.pdf) return;
  const thumbs = document.getElementById('pdf-thumbs');
  if (!thumbs) return;
  thumbs.innerHTML = '';
  for (let i = 1; i <= Math.min(PDF_STATE.pdf.numPages, 50); i++) {
    (n => {
      PDF_STATE.pdf.getPage(n).then(page => {
        const canvas = document.createElement('canvas');
        const vp = page.getViewport({ scale: 0.2 });
        canvas.width = vp.width; canvas.height = vp.height;
        canvas.style.cssText = `width:100%;border-radius:4px;border:2px solid ${n===1?'#e94560':'rgba(255,255,255,0.1)'};cursor:pointer;margin-bottom:2px`;
        canvas.id = 'pdf-thumb-' + n;
        canvas.onclick = () => pdfShowPage(n);
        page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
        const lbl = document.createElement('div');
        lbl.style.cssText = 'font-size:9px;color:#475569;text-align:center;margin-bottom:6px';
        lbl.textContent = n;
        thumbs.appendChild(canvas);
        thumbs.appendChild(lbl);
      });
    })(i);
  }
}

function pdfHighlightThumb(n) {
  document.querySelectorAll('[id^="pdf-thumb-"]').forEach(c => c.style.borderColor='rgba(255,255,255,0.1)');
  const active = document.getElementById('pdf-thumb-'+n);
  if (active) active.style.borderColor = '#e94560';
}

function pdfExtractText() {
  if (!PDF_STATE.pdf) return;
  const el = document.getElementById('pdf-text');
  if (!el) return;
  let text = '';
  const promises = [];
  for (let i = 1; i <= Math.min(PDF_STATE.pdf.numPages, 10); i++) {
    promises.push(PDF_STATE.pdf.getPage(i).then(page => page.getTextContent()).then(tc => {
      text += `\n── Page ${i} ──\n` + tc.items.map(item => item.str).join(' ');
    }));
  }
  Promise.all(promises).then(() => { el.textContent = text.trim() || 'No extractable text found.'; });
}

function pdfNext() { if (PDF_STATE.pdf && PDF_STATE.page < PDF_STATE.pdf.numPages) pdfShowPage(PDF_STATE.page+1); }
function pdfPrev() { if (PDF_STATE.pdf && PDF_STATE.page > 1) pdfShowPage(PDF_STATE.page-1); }
function pdfZoomIn()  { PDF_STATE.scale = Math.min(4, PDF_STATE.scale + 0.25); document.getElementById('pdf-zoom').textContent = Math.round(PDF_STATE.scale/1.5*100)+'%'; document.getElementById('pdf-canvas-wrap').innerHTML='<div id="pdf-drop" style="display:none"></div>'; pdfShowPage(PDF_STATE.page); pdfRenderThumbs(); }
function pdfZoomOut() { PDF_STATE.scale = Math.max(0.5, PDF_STATE.scale - 0.25); document.getElementById('pdf-zoom').textContent = Math.round(PDF_STATE.scale/1.5*100)+'%'; document.getElementById('pdf-canvas-wrap').innerHTML='<div id="pdf-drop" style="display:none"></div>'; pdfShowPage(PDF_STATE.page); pdfRenderThumbs(); }
function pdfPrint()   { if (PDF_STATE.pdf) window.print(); else Toast.show('No PDF loaded', 'warn'); }

// CALENDAR ENGINE
// ══════════════════════════════════════════════════════════════
const CAL = { year: new Date().getFullYear(), month: new Date().getMonth(), events: [] };

function calInit() {
  CAL.events = State.get('cal_events', [
    { date: new Date().toISOString().slice(0,10), title: 'Today', color: '#3b82f6' },
  ]);
  calRender();
  calRenderEvents();
}

function calRender() {
  const grid = document.getElementById('cal-grid');
  const title = document.getElementById('cal-title');
  if (!grid) return;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (title) title.textContent = months[CAL.month] + ' ' + CAL.year;
  const first = new Date(CAL.year, CAL.month, 1).getDay();
  const days  = new Date(CAL.year, CAL.month+1, 0).getDate();
  const today = new Date();
  let html = '';
  // Day headers
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    html += `<div style="text-align:center;font-size:10px;font-weight:600;color:#475569;padding:4px">${d}</div>`;
  });
  // Empty cells
  for (let i = 0; i < first; i++) html += '<div></div>';
  // Day cells
  for (let d = 1; d <= days; d++) {
    const dateStr = CAL.year+'-'+(String(CAL.month+1).padStart(2,'0'))+'-'+(String(d).padStart(2,'0'));
    const isToday = d===today.getDate() && CAL.month===today.getMonth() && CAL.year===today.getFullYear();
    const ev = CAL.events.filter(e => e.date === dateStr);
    html += `<div onclick="calDayClick('${dateStr}',${d})" style="
      min-height:52px;border-radius:10px;padding:4px 6px;cursor:pointer;
      background:${isToday?'rgba(59,130,246,0.15)':'rgba(255,255,255,0.03)'};
      border:1px solid ${isToday?'rgba(59,130,246,0.4)':'rgba(255,255,255,0.06)'};
      transition:background .15s"
      onmouseover="this.style.background='rgba(59,130,246,0.1)'" onmouseout="this.style.background='${isToday?'rgba(59,130,246,0.15)':'rgba(255,255,255,0.03)'}'">
      <div style="font-size:11px;font-weight:${isToday?700:400};color:${isToday?'#60a5fa':'#94a3b8'};text-align:right">${d}</div>
      ${ev.slice(0,2).map(e=>`<div style="font-size:9px;background:${e.color||'#3b82f6'};color:#fff;border-radius:3px;padding:1px 4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.title}</div>`).join('')}
      ${ev.length>2?`<div style="font-size:9px;color:#475569">+${ev.length-2} more</div>`:''}
    </div>`;
  }
  grid.innerHTML = html;
}

function calRenderEvents() {
  const el = document.getElementById('cal-events-list');
  if (!el) return;
  const now = new Date().toISOString().slice(0,10);
  const upcoming = CAL.events.filter(e => e.date >= now).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 10);
  if (!upcoming.length) { el.innerHTML = '<div style="font-size:11px;color:#334155;padding:8px">No upcoming events</div>'; return; }
  el.innerHTML = upcoming.map(e => `
    <div style="display:flex;gap:8px;align-items:flex-start;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:8px;border-left:3px solid ${e.color||'#3b82f6'}">
      <div>
        <div style="font-size:11px;font-weight:600;color:#e2e8f0">${e.title}</div>
        <div style="font-size:10px;color:#475569">${e.date}</div>
      </div>
      <button onclick="calDeleteEvent('${e.date}','${e.title}')" style="margin-left:auto;background:none;border:none;color:#475569;cursor:pointer;font-size:12px">×</button>
    </div>`).join('');
}

function calNav(dir) { CAL.month += dir; if(CAL.month>11){CAL.month=0;CAL.year++;} if(CAL.month<0){CAL.month=11;CAL.year--;} calRender(); }
function calToday()  { CAL.year=new Date().getFullYear(); CAL.month=new Date().getMonth(); calRender(); }

function calDayClick(date, day) {
  const existing = CAL.events.filter(e => e.date === date);
  if (existing.length) {
    Toast.show(existing.map(e=>e.title).join(', '), 'info', 3000);
  } else {
    calAddEvent(date);
  }
}

function calAddEvent(date) {
  const d = date || new Date().toISOString().slice(0,10);
  const title = prompt('Event title:', 'New Event');
  if (!title) return;
  const colors = ['#3b82f6','#8b5cf6','#22c55e','#ef4444','#f59e0b','#ec4899'];
  CAL.events.push({ date: d, title, color: colors[Math.floor(Math.random()*colors.length)] });
  State.set('cal_events', CAL.events);
  calRender(); calRenderEvents();
  Toast.show('Event added: ' + title, 'success');
}

function calDeleteEvent(date, title) {
  CAL.events = CAL.events.filter(e => !(e.date===date && e.title===title));
  State.set('cal_events', CAL.events);
  calRender(); calRenderEvents();
}

const WX_ICONS = { Clear:'☀️', Clouds:'☁️', Rain:'🌧️', Drizzle:'🌦️', Thunderstorm:'⛈️', Snow:'❄️', Mist:'🌫️', Fog:'🌫️', Haze:'🌫️', Smoke:'🌫️', default:'🌡️' };

function weatherInit() { weatherFetch(); }

function weatherFetch() {
  const city = document.getElementById('wx-city')?.value.trim() || 'London';
  // Use wttr.in as it allows CORS
  fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`)
    .then(r => r.json())
    .then(data => wxRender(data, city))
    .catch(() => {
      // Fallback: simulate weather data
      wxRenderSimulated(city);
    });

function wxRender(data, city) {
  const curr = data.current_condition[0];
  const temp = curr.temp_C;
  const desc = curr.weatherDesc[0].value;
  const humidity = curr.humidity;
  const wind = curr.windspeedKmph;
  const feelsLike = curr.FeelsLikeC;
  const condCode = parseInt(curr.weatherCode);
  let icon = '⛅';
  if (condCode <= 113) icon = '☀️';
  else if (condCode <= 119) icon = '🌤️';
  else if (condCode <= 143) icon = '☁️';
  else if (condCode <= 200) icon = '🌫️';
  else if (condCode <= 299) icon = '🌧️';
  else if (condCode <= 399) icon = '❄️';
  else if (condCode <= 499) icon = '🌧️';
  document.getElementById('wx-icon').textContent = icon;
  document.getElementById('wx-temp').textContent = temp + '°C';
  document.getElementById('wx-desc').textContent = desc;
  document.getElementById('wx-loc').textContent  = city;
  const stats = document.getElementById('wx-stats');
  if (stats) stats.innerHTML = [
    ['💧','Humidity', humidity+'%'],

    ['🌡️','Feels Like', feelsLike+'°C'],
  ].map(([ico,l,v]) => `<div style="background:rgba(255,255,255,0.08);border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px">${ico}</div><div style="font-size:11px;color:rgba(255,255,255,0.5);margin:3px 0">${l}</div><div style="font-size:14px;font-weight:600;color:#fff">${v}</div></div>`).join('');

      const hi=d.maxtempC, lo=d.mintempC, fdesc=d.hourly[4]?.weatherDesc[0]?.value||'';

        <span style="font-size:11px;color:rgba(255,255,255,0.6);width:70px">${days[i]||'Day '+(i+1)}</span>
        <span style="font-size:14px">${icon}</span>
        <span style="font-size:10px;color:rgba(255,255,255,0.5);flex:1;padding:0 8px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap">${fdesc}</span>
        <span style="font-size:11px;color:#60a5fa;min-width:30px;text-align:right">${hi}°</span>
        <span style="font-size:11px;color:rgba(255,255,255,0.35);min-width:30px;text-align:right">${lo}°</span>
      </div>`;
    }).join('');
  }

// CLOCK ENGINE
// ══════════════════════════════════════════════════════════════
const CLK = { swRunning:false, swMs:0, swStart:null, swLaps:[], swRaf:null, tmSecs:0, tmRunning:false, tmIv:null, clockRaf:null };

function clockInit() { clkDrawAnalog(); clkTab(0); }

function clkTab(i) {
  [0,1,2,3].forEach(j => {
    const el=document.getElementById('clk-'+j); if(el)el.style.display='none';
    const tb=document.getElementById('clk-tab-'+j); if(tb)tb.classList.remove('sel');
  });
  const show=document.getElementById('clk-'+i); if(show)show.style.display='flex';
  const tab=document.getElementById('clk-tab-'+i); if(tab)tab.classList.add('sel');
  if (i===0) clkDrawAnalog();
  if (i===3) clkRenderWorld();
}

function clkDrawAnalog() {
  const canvas=document.getElementById('clk-canvas'); if(!canvas)return;
  const ctx=canvas.getContext('2d'); const W=180,R=80;
  function draw() {
    if(!document.getElementById('clk-canvas')){cancelAnimationFrame(CLK.clockRaf);return;}
    const now=new Date();
    ctx.clearRect(0,0,W,W);
    // Face
    ctx.beginPath();ctx.arc(W/2,W/2,R,0,Math.PI*2);
    const grad=ctx.createRadialGradient(W/2,W/2,0,W/2,W/2,R);
    grad.addColorStop(0,'rgba(15,22,41,0.95)');grad.addColorStop(1,'rgba(10,14,26,0.98)');
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle='rgba(59,130,246,0.3)';ctx.lineWidth=2;ctx.stroke();
    // Ticks
    for(let m=0;m<60;m++){
      const a=m*6*Math.PI/180;const big=m%5===0;
      const r1=R-(big?12:6);const r2=R-2;
      ctx.beginPath();ctx.moveTo(W/2+Math.cos(a)*r1,W/2+Math.sin(a)*r1);
      ctx.lineTo(W/2+Math.cos(a)*r2,W/2+Math.sin(a)*r2);
      ctx.strokeStyle=big?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.12)';ctx.lineWidth=big?2:1;ctx.stroke();
    }
    // Hands
    const h=now.getHours()%12,mi=now.getMinutes(),s=now.getSeconds();
    const drawHand=(angle,len,width,color)=>{
      const a=(angle-90)*Math.PI/180;
      ctx.beginPath();ctx.moveTo(W/2,W/2);
      ctx.lineTo(W/2+Math.cos(a)*len,W/2+Math.sin(a)*len);
      ctx.strokeStyle=color;ctx.lineWidth=width;ctx.lineCap='round';ctx.stroke();
    };
    drawHand((h*30)+(mi*0.5),R*0.5,4,'rgba(255,255,255,0.9)');
    drawHand(mi*6,R*0.7,3,'rgba(255,255,255,0.8)');
    drawHand(s*6,R*0.8,1.5,'#3b82f6');
    ctx.beginPath();ctx.arc(W/2,W/2,4,0,Math.PI*2);ctx.fillStyle='#3b82f6';ctx.fill();
    // Digital
    const dig=document.getElementById('clk-digital');
    const dt=document.getElementById('clk-date');
    if(dig)dig.textContent=now.toLocaleTimeString();
    if(dt)dt.textContent=now.toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    CLK.clockRaf=requestAnimationFrame(draw);
  }
  cancelAnimationFrame(CLK.clockRaf); draw();
}

function swToggle() {
  const btn=document.getElementById('sw-start');
  if(CLK.swRunning){
    CLK.swRunning=false; CLK.swMs+=(Date.now()-CLK.swStart);
    cancelAnimationFrame(CLK.swRaf); if(btn)btn.textContent='Resume';btn.style.background='#3b82f6';
  } else {
    CLK.swRunning=true; CLK.swStart=Date.now();
    if(btn)btn.textContent='Pause';btn.style.background='#ef4444';
    function tick(){const el=document.getElementById('sw-display');if(!el)return;const ms=CLK.swMs+(CLK.swRunning?Date.now()-CLK.swStart:0);const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s+'.'+(cs<10?'0':'')+cs;if(CLK.swRunning)CLK.swRaf=requestAnimationFrame(tick);}
    tick();
  }
}
function swReset(){CLK.swRunning=false;CLK.swMs=0;cancelAnimationFrame(CLK.swRaf);const el=document.getElementById('sw-display');if(el)el.textContent='00:00.00';CLK.swLaps=[];const laps=document.getElementById('sw-laps');if(laps)laps.innerHTML='';const btn=document.getElementById('sw-start');if(btn){btn.textContent='Start';btn.style.background='#22c55e';}}
function swLap(){const el=document.getElementById('sw-display');const laps=document.getElementById('sw-laps');if(!el||!laps)return;const li=document.createElement('div');li.style.cssText='font-size:11px;color:#94a3b8;padding:4px 8px;background:rgba(255,255,255,0.04);border-radius:6px;display:flex;justify-content:space-between';li.innerHTML=`<span>Lap ${CLK.swLaps.length+1}</span><span style="color:#60a5fa;font-family:monospace">${el.textContent}</span>`;laps.insertBefore(li,laps.firstChild);CLK.swLaps.push(el.textContent);}

function tmAdj(s){CLK.tmSecs=Math.max(0,CLK.tmSecs+s);tmUpdateDisplay();}

// VOICE RECORDER ENGINE
// ══════════════════════════════════════════════════════════════
const REC = { mr:null, running:false, secs:0, iv:null, chunks:[], recordings:[], ctx:null, analyser:null, raf:null };
function recorderInit(){ recDrawWave(); }
function recToggle(){
  if(REC.running){
    REC.mr?.stop();REC.running=false;clearInterval(REC.iv);
    const btn=document.getElementById('rec-btn');if(btn)btn.textContent='⏺';
    document.getElementById('rec-status').textContent='Recording saved';
    cancelAnimationFrame(REC.raf);
  } else {
    navigator.mediaDevices?.getUserMedia({audio:true}).then(stream=>{
      REC.ctx=new(window.AudioContext||window.webkitAudioContext)();
      REC.analyser=REC.ctx.createAnalyser();REC.analyser.fftSize=256;
      REC.ctx.createMediaStreamSource(stream).connect(REC.analyser);
      REC.mr=new MediaRecorder(stream);REC.chunks=[];
      REC.mr.ondataavailable=e=>REC.chunks.push(e.data);
      REC.mr.onstop=()=>{
        const blob=new Blob(REC.chunks,{type:'audio/webm'});
        const url=URL.createObjectURL(blob);
        const dur=REC.secs;
        REC.recordings.push({url,dur,name:'Recording '+REC.recordings.length+1,date:new Date().toLocaleTimeString()});
        recRenderList();
        REC.secs=0;document.getElementById('rec-time').textContent='0:00';
      };
      REC.mr.start();REC.running=true;REC.secs=0;
      const btn=document.getElementById('rec-btn');if(btn)btn.textContent='⏸';
      document.getElementById('rec-status').textContent='● Recording…';
      document.getElementById('rec-status').style.color='#ef4444';
      REC.iv=setInterval(()=>{REC.secs++;const m=Math.floor(REC.secs/60),s=REC.secs%60;const el=document.getElementById('rec-time');if(el)el.textContent=m+':'+(s<10?'0':'')+s;},1000);
      recAnimateWave();
    }).catch(()=>Toast.show('Microphone access denied','warn',3000));
  }
}
function recStop(){if(REC.mr&&REC.running){REC.mr.stop();REC.running=false;clearInterval(REC.iv);const btn=document.getElementById('rec-btn');if(btn)btn.textContent='⏺';document.getElementById('rec-status').textContent='Ready';document.getElementById('rec-status').style.color='';}}
function recAnimateWave(){
  const canvas=document.getElementById('rec-wave');if(!canvas||!REC.analyser)return;
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
  const buf=new Uint8Array(REC.analyser.frequencyBinCount);
  function draw(){if(!REC.running){cancelAnimationFrame(REC.raf);return;}
    REC.analyser.getByteTimeDomainData(buf);
    ctx.clearRect(0,0,W,H);ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.beginPath();
    buf.forEach((v,i)=>{const x=i/buf.length*W,y=(v/128-1)*H/2+H/2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();REC.raf=requestAnimationFrame(draw);
  }draw();
}
function recDrawWave(){
  const canvas=document.getElementById('rec-wave');if(!canvas)return;
  const ctx=canvas.getContext('2d');ctx.strokeStyle='rgba(239,68,68,0.2)';ctx.lineWidth=1;ctx.beginPath();
  ctx.moveTo(0,45);ctx.lineTo(320,45);ctx.stroke();
}
function recRenderList(){
  const el=document.getElementById('rec-list');if(!el)return;
  if(!REC.recordings.length){el.innerHTML='<div style="font-size:11px;color:#334155;text-align:center;padding:6px">No recordings</div>';return;}
  el.innerHTML=REC.recordings.map((r,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:8px">
    <div style="flex:1;min-width:0"><div style="font-size:11px;color:#e2e8f0;font-weight:500">${r.name}</div><div style="font-size:9px;color:#475569">${r.date} · ${Math.floor(r.dur/60)}:${(r.dur%60<10?'0':'')+r.dur%60}</div></div>
    <audio src="${r.url}" controls style="height:24px;width:120px"></audio>
    <a href="${r.url}" download="${r.name}.webm" style="color:#60a5fa;font-size:14px;text-decoration:none">💾</a>
  </div>`).join('');
}

function archiveLoad(inp){
  const f=inp.files[0];if(!f)return;
  const status=document.getElementById('arch-status');
  if(status)status.textContent='Loading '+f.name+'…';
  if(f.name.endsWith('.zip')){
    if(!window.JSZip){
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=()=>archiveReadZip(f);
      document.head.appendChild(s);
    } else { archiveReadZip(f); }
  } else {
    // For other formats show file info
    const list=document.getElementById('arch-list');
    if(list)list.innerHTML=`<div style="padding:16px"><div style="font-size:13px;color:#e2e8f0;margin-bottom:8px">📦 ${f.name}</div><div style="font-size:11px;color:#64748b">Size: ${(f.size/1024).toFixed(1)} KB<br>Type: ${f.type||'archive'}<br><br><span style="color:#f59e0b">Note: Full extraction requires JSZip (ZIP only) or a server-side tool for TAR/GZ/RAR.</span></div></div>`;
    if(status)status.textContent=f.name+' · '+f.type;
  }
}
function archiveReadZip(f){
  JSZip.loadAsync(f).then(zip=>{
    const files=Object.keys(zip.files);
    const tree=document.getElementById('arch-tree');
    const list=document.getElementById('arch-list');
    const status=document.getElementById('arch-status');
    // Build folder tree
    const folders=new Set(files.map(p=>p.split('/').slice(0,-1).join('/')).filter(Boolean));
    if(tree)tree.innerHTML=['/',... folders].map(folder=>`<div style="padding:4px 6px;font-size:11px;color:#94a3b8;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:4px" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background=''"><span>📁</span>${folder||'root'}</div>`).join('');
    // File list
    if(list)list.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr style="background:#161b22;position:sticky;top:0">${['Name','Size','Type','Modified'].map(h=>`<th style="padding:6px 12px;text-align:left;color:#8b949e;font-weight:500;border-bottom:1px solid #30363d">${h}</th>`).join('')}</tr></thead>
      <tbody>${files.filter(p=>!zip.files[p].dir).map(p=>{
        const entry=zip.files[p];const name=p.split('/').pop();
        const ext=name.split('.').pop().toLowerCase();
        const icons={pdf:'📄',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',mp3:'🎵',mp4:'🎬',zip:'📦',txt:'📝',js:'📜',html:'🌐',css:'🎨',py:'🐍',default:'📄'};
        const ico=icons[ext]||icons.default;
        return `<tr style="border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background=''" onclick="archiveExtract('${p.replace(/'/g,"\\'")}',this)">
          <td style="padding:7px 12px;color:#e2e8f0;display:flex;align-items:center;gap:7px">${ico} ${name}</td>
          <td style="padding:7px 12px;color:#64748b">${entry._data?Math.round((entry._data.uncompressedSize||0)/1024)+'KB':'?'}</td>
          <td style="padding:7px 12px;color:#64748b">.${ext}</td>
          <td style="padding:7px 12px;color:#64748b">${entry.date?.toLocaleDateString()||'—'}</td>
        </tr>`;}).join('')}
      </tbody></table>`;
    if(status)status.textContent=f.name+' · '+files.filter(p=>!zip.files[p].dir).length+' files';
    Toast.show('ZIP opened: '+files.length+' entries','success',2000);
  }).catch(e=>Toast.show('ZIP error: '+e.message,'error',4000));
}

// SPREADSHEET ENGINE
// ══════════════════════════════════════════════════════════════
const SS = { data:{}, selected:null, ROWS:50, COLS:26 };

function ssInit(){
  const body=document.getElementById('ss-body');if(!body)return;
  let html='';
  for(let r=1;r<=SS.ROWS;r++){
    html+=`<tr><th style="background:#161b22;border:1px solid #30363d;padding:2px 4px;color:#8b949e;font-weight:400;font-size:10px;width:36px;position:sticky;left:0;z-index:1;text-align:center">${r}</th>`;
    for(let c=0;c<SS.COLS;c++){
      const ref=String.fromCharCode(65+c)+r;
      html+=`<td id="ss-${ref}" onclick="ssSelect('${ref}')" ondblclick="ssEdit('${ref}')" style="border:1px solid #21262d;padding:0;width:80px;min-width:80px;height:22px;overflow:hidden;white-space:nowrap;cursor:cell;font-size:11px;color:#e6edf3;background:transparent">
        <div id="ss-d-${ref}" style="padding:1px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;height:100%;display:flex;align-items:center"></div>
      </td>`;
    }
    html+='</tr>';
  }
  body.innerHTML=html;
  // Sample data
  const sample={A1:'Name',B1:'Score',C1:'Grade',A2:'Alice',B2:'95',A3:'Bob',B3:'82',A4:'Carol',B4:'78',A5:'David',B5:'91',B6:'=SUM(B2:B5)',C2:'=IF(B2>=90,"A","B")',C3:'=IF(B3>=90,"A","B")',C4:'=IF(B4>=90,"A","B")',C5:'=IF(B5>=90,"A","B")'};
  Object.entries(sample).forEach(([k,v])=>ssSetCell(k,v));
  ssCalcAll();
}

function ssSelect(ref){
  if(SS.selected){const prev=document.getElementById('ss-'+SS.selected);if(prev)prev.style.background='transparent';}
  SS.selected=ref;
  const cell=document.getElementById('ss-'+ref);if(cell)cell.style.background='rgba(88,166,255,0.15)';
  const cr=document.getElementById('ss-cellref');if(cr)cr.textContent=ref;
  const raw=SS.data[ref]?.raw||'';
  const f=document.getElementById('ss-formula');if(f)f.value=raw;
  ssUpdateStats();
}

function ssEdit(ref){
  const raw=SS.data[ref]?.raw||'';
  const cell=document.getElementById('ss-d-'+ref);if(!cell)return;
  const inp=document.createElement('input');
  inp.value=raw;inp.style.cssText='width:100%;height:100%;background:#1c2128;border:1px solid #58a6ff;outline:none;font-size:11px;color:#e6edf3;padding:1px 4px;font-family:inherit;box-sizing:border-box';
  cell.innerHTML='';cell.appendChild(inp);inp.focus();inp.select();
  inp.onblur=inp.onkeydown=e=>{if(e.type==='keydown'&&e.key!=='Enter'&&e.key!=='Tab'&&e.key!=='Escape')return;if(e.key==='Escape'){ssRenderCell(ref);return;}ssSetCell(ref,inp.value);ssCalcAll();ssRenderCell(ref);ssSelect(ref);};
}

function ssFormulaCommit(){
  if(!SS.selected)return;
  const f=document.getElementById('ss-formula');if(!f)return;
  ssSetCell(SS.selected,f.value);ssCalcAll();ssRenderCell(SS.selected);
}

function ssSetCell(ref,val){ SS.data[ref]={raw:val,val:val}; }

function ssCalcAll(){
  // Evaluate formulas
  Object.keys(SS.data).forEach(ref=>{
    const raw=SS.data[ref].raw;
    if(raw&&raw.startsWith('=')){
      try{SS.data[ref].val=ssEval(raw.slice(1));}
      catch(e){SS.data[ref].val='#ERR';}
    } else {
      SS.data[ref].val=isNaN(raw)?raw:raw===''?'':Number(raw);
    }
    ssRenderCell(ref);
  });
  ssUpdateStats();
}

function ssEval(expr){
  // Replace cell refs like A1 with their values
  expr=expr.replace(/([A-Z])(\d+)/g,(_,c,r)=>{const v=SS.data[c+r]?.val;return isNaN(v)||v===''?'"'+(v||0)+'"':v;});
  // SUM(A1:A5)
  expr=expr.replace(/SUM\(([A-Z])(\d+):([A-Z])(\d+)\)/g,(_,c1,r1,c2,r2)=>{
    let sum=0;for(let r=parseInt(r1);r<=parseInt(r2);r++){for(let c=c1.charCodeAt(0);c<=c2.charCodeAt(0);c++){const v=SS.data[String.fromCharCode(c)+r]?.val;if(!isNaN(v)&&v!=='')sum+=Number(v);}}return sum;
  });
  // AVERAGE
  expr=expr.replace(/AVERAGE\(([A-Z])(\d+):([A-Z])(\d+)\)/g,(_,c1,r1,c2,r2)=>{
    let sum=0,cnt=0;for(let r=parseInt(r1);r<=parseInt(r2);r++){for(let c=c1.charCodeAt(0);c<=c2.charCodeAt(0);c++){const v=SS.data[String.fromCharCode(c)+r]?.val;if(!isNaN(v)&&v!==''){sum+=Number(v);cnt++;}}}return cnt?sum/cnt:0;
  });
  // IF(cond,t,f)
  expr=expr.replace(/IF\((.+),(.+),(.+)\)/,(_, cond,t,f)=>{try{return eval(cond)?t:f;}catch(e){return f;}});
  // eslint-disable-next-line no-new-func
  return new Function('return '+expr)();
}

function ssRenderCell(ref){
  const el=document.getElementById('ss-d-'+ref);if(!el)return;
  const v=SS.data[ref]?.val;
  const isNum=typeof v==='number';
  el.style.textAlign=isNum?'right':'left';
  el.style.color=typeof v==='string'&&v.startsWith('#')?'#ef4444':'#e6edf3';
  el.textContent=v===null||v===undefined?'':v;
}

function ssUpdateStats(){
  const sel=SS.selected;if(!sel)return;
  const v=SS.data[sel]?.val;
  const isNum=!isNaN(v)&&v!=='';
  document.getElementById('ss-status').textContent=sel+(v!==undefined?': '+v:'');
  document.getElementById('ss-sum').textContent='Sum: '+(isNum?v:0);
  document.getElementById('ss-avg').textContent='Avg: '+(isNum?v:0);
  document.getElementById('ss-count').textContent='Count: 1';
}

function ssNew(){ SS.data={}; const body=document.getElementById('ss-body'); if(body){const cells=body.querySelectorAll('[id^="ss-d-"]');cells.forEach(c=>c.textContent='');} Toast.show('New spreadsheet','success'); }

function ssLoadCSV(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n');
    SS.data={};
    lines.forEach((line,r)=>{
      line.split(',').forEach((val,c)=>{
        const ref=String.fromCharCode(65+c)+(r+1);
        if(val.trim())ssSetCell(ref,val.trim().replace(/^"|"$/g,''));
      });
    });
    ssCalcAll();
    Toast.show('CSV loaded: '+lines.length+' rows','success',2000);
  };
  reader.readAsText(f);
}

function ssExportCSV(){
  const rows=[];
  for(let r=1;r<=SS.ROWS;r++){
    const row=[];let hasData=false;
    for(let c=0;c<SS.COLS;c++){const v=SS.data[String.fromCharCode(65+c)+r]?.val||'';if(v)hasData=true;row.push('"'+(v+'').replace(/"/g,'""')+'"');}
    if(hasData)rows.push(row.join(','));else if(rows.length)break;
  }
  if(!rows.length){Toast.show('Nothing to export','warn');return;}
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.join('\n'));a.download='sheet_'+Date.now()+'.csv';a.click();
  Toast.show('CSV exported','success',2000);
}
