function doomInit() {
  const canvas = document.getElementById('doom-canvas');
  if (!canvas) return;
  DOOM.W = canvas.parentElement.clientWidth || 640;
  DOOM.H = canvas.parentElement.clientHeight - 0 || 400;
  canvas.width = Math.floor(DOOM.W / 2);   // render at half res, scale up
  canvas.height = Math.floor(DOOM.H / 2);
  // Mouse look
  canvas.addEventListener('click', () => canvas.requestPointerLock?.());
  document.addEventListener('pointerlockchange', () => {});
  document.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) DOOM.pa += e.movementX * 0.003;
  });
}

function doomStart() {
  document.getElementById('doom-start').style.display = 'none';
  DOOM.running = true; DOOM.hp = 100; DOOM.ammo = 50; DOOM.score = 0;
  DOOM.px = 3.5; DOOM.py = 3.5; DOOM.pa = 0;
  DOOM.enemies.forEach(e => { e.hp = 3; e.alive = true; });
  // Keys
  const root = document.getElementById('doom-root');
  if (root) { root.focus(); root.onkeydown = doomKey; root.onkeyup = doomKeyUp; }
  document.getElementById('doom-root')?.focus();
  doomLoop();
}

function doomRestart() {
  document.getElementById('doom-dead').style.display = 'none';
  doomStart();
}

function doomKey(e) {
  const k = e.key.toLowerCase();
  if (k==='w'||k==='arrowup')    DOOM.moveF = true;
  if (k==='s'||k==='arrowdown')  DOOM.moveB = true;
  if (k==='a'||k==='arrowleft')  DOOM.turnL = true;
  if (k==='d'||k==='arrowright') DOOM.turnR = true;
  if (k===' ') { e.preventDefault(); doomShoot(); }
  if (k==='e') doomInteract();
}
function doomKeyUp(e) {
  const k = e.key.toLowerCase();
  if (k==='w'||k==='arrowup')    DOOM.moveF = false;
  if (k==='s'||k==='arrowdown')  DOOM.moveB = false;
  if (k==='a'||k==='arrowleft')  DOOM.turnL = false;
  if (k==='d'||k==='arrowright') DOOM.turnR = false;
}

function doomShoot() {
  if (!DOOM.ammo) { doomMsg('No ammo!'); return; }
  DOOM.ammo--;
  DOOM.shooting = true; setTimeout(() => DOOM.shooting = false, 80);
  document.getElementById('doom-ammo').textContent = 'AMMO: ' + DOOM.ammo;
  document.getElementById('doom-ammo-disp').textContent = DOOM.ammo;
  // Hit detection — check enemy in center of screen
  DOOM.enemies.forEach(en => {
    if (!en.alive) return;
    const dx = en.x - DOOM.px, dy = en.y - DOOM.py;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);
    const da = ((angle - DOOM.pa) + Math.PI*3) % (Math.PI*2) - Math.PI;
    if (Math.abs(da) < 0.18 && dist < 8) {
      en.hp--;
      if (en.hp <= 0) {
        en.alive = false;
        DOOM.score += 100;
        document.getElementById('doom-score-disp').textContent = 'SCORE: ' + DOOM.score;
        doomMsg(en.ico + ' Killed! +100');
        const alive = DOOM.enemies.filter(e => e.alive).length;
        if (!alive) { setTimeout(() => { doomMsg('🏆 ALL ENEMIES DEFEATED! Score: '+DOOM.score); }, 500); }
      } else {
        doomMsg('Hit! ' + en.ico + ' HP: ' + en.hp);
      }
    }
  });
}

function doomInteract() { doomMsg('Nothing here…'); }

function doomMsg(txt) {
  const el = document.getElementById('doom-msg');
  if (el) { el.textContent = txt; clearTimeout(DOOM._msgT); DOOM._msgT = setTimeout(() => el.textContent = '', 2000); }
}

function doomLoop(ts = 0) {
  if (!DOOM.running) return;
  const dt = Math.min((ts - DOOM.lastTime) / 1000, 0.05);
  DOOM.lastTime = ts;
  // FPS
  DOOM.frames++; DOOM.fpsTimer += dt;
  if (DOOM.fpsTimer >= 0.5) {
    DOOM.fps = Math.round(DOOM.frames / DOOM.fpsTimer);
    DOOM.frames = 0; DOOM.fpsTimer = 0;
    const el = document.getElementById('doom-fps'); if (el) el.textContent = 'FPS: ' + DOOM.fps;
  }
  // Movement
  const spd = 3 * dt, rot = 2.2 * dt;
  const cos = Math.cos(DOOM.pa), sin = Math.sin(DOOM.pa);
  let nx = DOOM.px, ny = DOOM.py;
  if (DOOM.moveF) { nx += cos*spd; ny += sin*spd; }
  if (DOOM.moveB) { nx -= cos*spd; ny -= sin*spd; }
  if (DOOM.turnL) DOOM.pa -= rot;
  if (DOOM.turnR) DOOM.pa += rot;
  // Collision
  if (DOOM.map[Math.floor(ny)]?.[Math.floor(DOOM.px)] === 0) DOOM.py = ny;
  if (DOOM.map[Math.floor(DOOM.py)]?.[Math.floor(nx)] === 0) DOOM.px = nx;
  // Enemy damage
  DOOM.enemies.forEach(en => {
    if (!en.alive) return;
    const d = Math.hypot(en.x-DOOM.px, en.y-DOOM.py);
    if (d < 0.6 && Math.random() < dt * 0.8) {
      DOOM.hp = Math.max(0, DOOM.hp - 5);
      const bar = document.getElementById('doom-hp-bar');
      if (bar) bar.style.width = DOOM.hp + '%';
      const hEl = document.getElementById('doom-hp'); if (hEl) hEl.textContent = 'HP: '+DOOM.hp;
      if (DOOM.hp <= 0) { DOOM.running = false; doomDie(); return; }
    }
  });
  doomRender();
  DOOM.raf = requestAnimationFrame(doomLoop);
}

function doomDie() {
  const dead = document.getElementById('doom-dead');
  const fs = document.getElementById('doom-final-score');
  if (dead) dead.style.display = 'flex';
  if (fs) fs.textContent = 'Final Score: ' + DOOM.score + ' | Enemies killed: ' + DOOM.enemies.filter(e=>!e.alive).length;
}

function doomRender() {
  const canvas = document.getElementById('doom-canvas'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  // Sky & floor
  ctx.fillStyle = '#1a0a0a'; ctx.fillRect(0, 0, W, H/2);
  ctx.fillStyle = '#2a1a1a'; ctx.fillRect(0, H/2, W, H/2);
  // Raycasting
  const numRays = W;
  const zBuf = new Float32Array(numRays);
  for (let col = 0; col < numRays; col++) {
    const rayAngle = DOOM.pa - DOOM.fov/2 + (col/numRays)*DOOM.fov;
    const cos = Math.cos(rayAngle), sin = Math.sin(rayAngle);
    let dist = 0.05, hit = false, side = 0;
    let rx = DOOM.px, ry = DOOM.py;
    // DDA
    const dx = Math.abs(1/cos), dy = Math.abs(1/sin);
    let mx = Math.floor(rx), my = Math.floor(ry);
    let stepX = cos < 0 ? -1 : 1, stepY = sin < 0 ? -1 : 1;
    let sideDistX = cos < 0 ? (rx-mx)*dx : (mx+1-rx)*dx;
    let sideDistY = sin < 0 ? (ry-my)*dy : (my+1-ry)*dy;
    for (let i = 0; i < 24; i++) {
      if (sideDistX < sideDistY) { sideDistX += dx; mx += stepX; side = 0; }
      else { sideDistY += dy; my += stepY; side = 1; }
      if (DOOM.map[my]?.[mx]) { dist = side===0 ? sideDistX-dx : sideDistY-dy; hit = true; break; }
    }
    if (!hit) dist = 24;
    dist = Math.max(0.1, dist);
    zBuf[col] = dist;
    const wallH = Math.min(H, Math.floor(H / dist));
    const top = Math.floor((H - wallH) / 2);
    // Wall color — darker for Y sides
    const base = side === 1 ? 120 : 180;
    const r = Math.floor(base * Math.min(1, 4/dist));
    const g = Math.floor(base * 0.2 * Math.min(1, 4/dist));
    const b = Math.floor(base * 0.2 * Math.min(1, 4/dist));
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(col, top, 1, wallH);
  }
  // Sprite rendering (enemies)
  const sprites = DOOM.enemies.filter(e => e.alive).map(e => ({
    ...e,
    dx: e.x - DOOM.px, dy: e.y - DOOM.py,
    dist: Math.hypot(e.x-DOOM.px, e.y-DOOM.py)
  })).sort((a,b) => b.dist - a.dist);

  sprites.forEach(sp => {
    const angle = Math.atan2(sp.dy, sp.dx) - DOOM.pa;
    const normAngle = ((angle + Math.PI*3) % (Math.PI*2)) - Math.PI;
    if (Math.abs(normAngle) > DOOM.fov * 0.6) return;
    const screenX = Math.floor((0.5 + normAngle / DOOM.fov) * W);
    const sprH = Math.min(H, Math.floor(H / sp.dist));
    const sprTop = Math.floor((H - sprH) / 2);
    const sprW = Math.max(4, Math.floor(sprH * 0.6));
    if (sp.dist < 0.5) return;
    // Check z-buffer
    const colStart = Math.max(0, screenX - sprW/2);
    const colEnd = Math.min(W-1, screenX + sprW/2);
    let visible = false;
    for (let c = colStart; c <= colEnd; c++) { if (zBuf[c] > sp.dist) { visible = true; break; } }
    if (!visible) return;
    // Draw enemy as colored rectangle with emoji overlay
    const bright = Math.min(1, 2.5 / sp.dist);
    ctx.fillStyle = `rgba(255,100,0,${bright * 0.8})`;
    ctx.fillRect(colStart, sprTop, sprW, sprH);
    ctx.fillStyle = `rgba(0,0,0,${0.3})`;
    ctx.fillRect(colStart, sprTop, sprW, 4);
    // HP bar
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(colStart, sprTop-3, sprW, 2);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(colStart, sprTop-3, Math.floor(sprW * (sp.hp/3)), 2);
  });

  // Weapon
  const gunY = H - 60 + (DOOM.moveF||DOOM.moveB ? Math.sin(Date.now()*0.01)*4 : 0);
  const gunX = W/2 - 20;
  ctx.fillStyle = DOOM.shooting ? '#ffaa00' : '#888';
  ctx.fillRect(gunX, gunY + (DOOM.shooting?-8:0), 40, 50);
  ctx.fillStyle = '#555';
  ctx.fillRect(gunX+10, gunY+8, 20, 8);
  if (DOOM.shooting) {
    ctx.fillStyle = 'rgba(255,200,0,0.8)';
    ctx.beginPath(); ctx.arc(W/2, gunY - 10, 12, 0, Math.PI*2); ctx.fill();
  }

  // Minimap
  const ms = 4, mo = 6;
  DOOM.map.forEach((row, y) => row.forEach((cell, x) => {
    ctx.fillStyle = cell ? 'rgba(200,200,200,0.5)' : 'rgba(0,0,0,0.3)';
    ctx.fillRect(mo + x*ms, mo + y*ms, ms-1, ms-1);
  }));
  DOOM.enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = 'rgba(255,80,0,0.8)';
    ctx.fillRect(mo + e.x*ms - 1, mo + e.y*ms - 1, 3, 3);
  });
  ctx.fillStyle = '#00ff00';
  ctx.beginPath();
  ctx.arc(mo + DOOM.px*ms, mo + DOOM.py*ms, 2.5, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mo + DOOM.px*ms, mo + DOOM.py*ms);
  ctx.lineTo(mo + DOOM.px*ms + Math.cos(DOOM.pa)*6, mo + DOOM.py*ms + Math.sin(DOOM.pa)*6);
  ctx.stroke();

  // Vignette
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);
  // Damage flash
  if (DOOM.hp < 30) {
    ctx.fillStyle = `rgba(255,0,0,${0.15 + 0.1*Math.sin(Date.now()*0.01)})`;
    ctx.fillRect(0,0,W,H);
  }
}

}

function ceBuildTabs() {
  const tabs = document.getElementById('ce-tabs');
  if (!tabs) return;
  const openFiles = Object.keys(CE.files).slice(0, 6); // show up to 6 tabs
  const icons = {js:'📜',ts:'📘',py:'🐍',html:'🌐',css:'🎨',json:'📋',md:'📝',sh:'⬛',txt:'📄'};
  tabs.innerHTML = openFiles.map(f => {
    const ext = f.split('.').pop();
    const active = f === CE.activeFile;
    const bg = active ? '#1e1e1e' : '#2d2d2d';
    const fg = active ? '#ffffff' : '#969696';
    const bb = active ? '2px solid #007acc' : '2px solid transparent';
    return '<div onclick="ceOpenFile(\''+f+'\')" style="display:flex;align-items:center;gap:6px;padding:0 14px;font-size:12px;cursor:pointer;border-right:1px solid #1e1e1e;min-width:100px;flex-shrink:0;'
      +'background:'+bg+';color:'+fg+';border-bottom:'+bb+'">'
      +(icons[ext]||'📄')+' '+f
      +'<span onclick="event.stopPropagation();ceBuildTabs()" style="margin-left:4px;color:#666;font-size:10px" title="Close">×</span></div>';
  }).join('');
}

function ceUpdateLines() {
  const editor = document.getElementById('ce-editor');
  const lines = document.getElementById('ce-lines');
  if (!editor || !lines) return;
  const count = (editor.value.match(/\n/g) || []).length + 1;
  lines.innerHTML = Array.from({length:count}, (_,i) => `<div style="padding:0 6px;line-height:1.6">${i+1}</div>`).join('');
}

function ceOnInput() {
  const editor = document.getElementById('ce-editor');
  if (!editor) return;
  CE.files[CE.activeFile] = editor.value;
  ceUpdateLines();
  ceHighlight();
  ceSyncCursor();
}

function ceHighlight() {
  // Basic syntax highlighting via overlay (minimap preview)
  const editor = document.getElementById('ce-editor');
  const mini = document.getElementById('ce-minimap');
  if (!editor || !mini) return;
  mini.textContent = editor.value.slice(0, 2000);
}

function ceSyncScroll() {
  const editor = document.getElementById('ce-editor');
  const lines = document.getElementById('ce-lines');
  if (!editor || !lines) return;
  lines.scrollTop = editor.scrollTop;
}

function ceSyncCursor() {
  const editor = document.getElementById('ce-editor');
  const pos = document.getElementById('ce-cursor-pos');
  if (!editor || !pos) return;
  const text = editor.value.substring(0, editor.selectionStart);
  const lines = text.split('\n');
  pos.textContent = `Ln ${lines.length}, Col ${lines[lines.length-1].length + 1}`;
}

function ceKeyDown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ed = e.target;
    const start = ed.selectionStart, end = ed.selectionEnd;
    ed.value = ed.value.substring(0,start) + '  ' + ed.value.substring(end);
    ed.selectionStart = ed.selectionEnd = start + 2;
    ceOnInput();
  }
  if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); ceRunCode(); }
  if ((e.ctrlKey||e.metaKey) && e.key === '/') { e.preventDefault(); ceToggleComment(); }
  ceSyncCursor();
}

function ceToggleComment() {
  const ed = document.getElementById('ce-editor');
  if (!ed) return;
  const start = ed.selectionStart;
  const lineStart = ed.value.lastIndexOf('\n', start-1) + 1;
  const line = ed.value.substring(lineStart, ed.value.indexOf('\n', start));
  const comment = line.trim().startsWith('//') ? line.replace('//', '') : '// ' + line;
  ed.value = ed.value.substring(0, lineStart) + comment + ed.value.substring(lineStart + line.length);
  ceOnInput();
}

function ceRunCode() {
  const editor = document.getElementById('ce-editor');
  const output = document.getElementById('ce-output');
  const status = document.getElementById('ce-run-status');
  if (!editor || !output) return;
  const code = editor.value;
  const ext = CE.activeFile.split('.').pop();
  if (status) status.textContent = '⚡ Running…';
  output.textContent = '';
  if (ext === 'py') {
    output.innerHTML = '<span style="color:#f59e0b">Python files run in the PyREPL app (🐍). Opening…</span>';
    setTimeout(() => OS.open('PyREPL'), 500);
    if (status) status.textContent = '';
    return;
  }
  if (ext === 'html') {
    const blob = new Blob([code], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    output.innerHTML = '<span style="color:#22c55e">HTML opened in new tab ↗</span>';
    if (status) status.textContent = '';
    return;
  }
  // JavaScript execution
  const logs = [];
  const origLog = console.log, origErr = console.error, origWarn = console.warn;
  console.log = (...a) => { logs.push({t:'log', v:a.map(ceStringify).join(' ')}); origLog(...a); };
  console.error = (...a) => { logs.push({t:'err', v:a.map(ceStringify).join(' ')}); origErr(...a); };
  console.warn = (...a) => { logs.push({t:'warn', v:a.map(ceStringify).join(' ')}); origWarn(...a); };
  try {
    // eslint-disable-next-line no-new-func
    const result = new Function(code)();
    if (result !== undefined) logs.push({t:'ret', v: '→ ' + ceStringify(result)});
    if (status) status.textContent = '✅ Done';
  } catch(e) {
    logs.push({t:'err', v: '❌ ' + e.message});
    if (status) status.textContent = '❌ Error';
  }
  console.log = origLog; console.error = origErr; console.warn = origWarn;
  const colors = {log:'#d4d4d4', err:'#ef4444', warn:'#f59e0b', ret:'#75beff'};
  output.innerHTML = logs.length
    ? logs.map(l => `<div style="color:${colors[l.t]||'#d4d4d4'};border-left:2px solid ${colors[l.t]||'#444'};padding-left:8px;margin-bottom:2px">${ceEscape(l.v)}</div>`).join('')
    : '<span style="color:#484f58">(no output)</span>';
  setTimeout(() => { if (status) status.textContent = ''; }, 3000);
}

function ceStringify(v) {
  if (typeof v === 'object' && v !== null) { try { return JSON.stringify(v, null, 2); } catch(e) { return String(v); } }
  return String(v);
}
function ceEscape(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function ceNewFile() {
  const name = prompt('File name (e.g. script.js):', 'untitled.js');
  if (!name) return;
  CE.files[name] = '// ' + name + '\n';
  ceOpenFile(name);
}

function ceMenu(item) {
  const actions = {
    'File': [['New File','ceNewFile()'],['Save (Ctrl+S)','ceRunCode()'],['Export…','ceSaveFile()']],
    'Edit': [['Undo','document.execCommand("undo")'],['Redo','document.execCommand("redo")'],['Toggle Comment','ceToggleComment()'],['Find…','ceFindReplace()']],
    'View': [['Toggle Sidebar','ceToggleSidebar()'],['Zoom In','ceFontSize(1)'],['Zoom Out','ceFontSize(-1)']],
    'Run':  [['▶ Run File','ceRunCode()'],['Run in Browser','ceRunBrowser()']],
    'Help': [['Shortcuts','Toast.show("Ctrl+S=Run  Tab=Indent  Ctrl+/=Comment","info",5000)']],
  };
  const items = actions[item] || [];
  const dd = document.createElement('div');
  dd.style.cssText = 'position:fixed;background:#252526;border:1px solid #3c3c3c;border-radius:4px;z-index:99999;min-width:160px;padding:4px 0;box-shadow:0 8px 24px rgba(0,0,0,0.6)';
  items.forEach(([l,a]) => {
    const li = document.createElement('div');
    li.style.cssText = 'padding:6px 16px;font-size:12px;color:#cccccc;cursor:pointer;font-family:inherit';
    li.onmouseover = () => li.style.background='rgba(255,255,255,0.08)';
    li.onmouseout = () => li.style.background='';
    li.textContent = l; li.onclick = () => { eval(a); dd.remove(); };
    dd.appendChild(li);
  });
  const bar = document.querySelector('.px-menu-item');
  const allItems = document.querySelectorAll('[onclick*="ceMenu"]');
  const idx = ['File','Edit','View','Run','Help'].indexOf(item);
  const el = allItems[idx];
  if (el) { const r=el.getBoundingClientRect(); dd.style.left=r.left+'px'; dd.style.top=r.bottom+'px'; }
  document.body.appendChild(dd);

function ceToggleSidebar() {
  const sb = document.getElementById('ce-sidebar');
  if (sb) sb.style.display = sb.style.display === 'none' ? '' : 'none';
}
function ceFontSize(d) {
  const ed = document.getElementById('ce-editor');
  if (!ed) return;
  const cur = parseInt(getComputedStyle(ed).fontSize) || 13;
  ed.style.fontSize = (cur + d) + 'px';
  document.getElementById('ce-lines').style.fontSize = (cur + d) + 'px';
}
function ceSaveFile() {
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(CE.files[CE.activeFile]||'');
  a.download = CE.activeFile; a.click();
  Toast.show('Saved: ' + CE.activeFile, 'success');
}
function ceFindReplace() {
  const q = prompt('Find:'); if (!q) return;
  const rep = prompt('Replace with (leave blank to just find):');
  const ed = document.getElementById('ce-editor');
  if (!ed) return;
  const count = (ed.value.match(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'))||[]).length;
  if (rep !== null && rep !== '') {
    ed.value = ed.value.replaceAll(q, rep);
    ceOnInput();
    Toast.show(`Replaced ${count} occurrence(s)`, 'success');
  } else {
    Toast.show(`Found ${count} occurrence(s) of "${q}"`, 'info');
  }
}
function ceRunBrowser() {
  const ext = CE.activeFile.split('.').pop();
  if (ext === 'html') {
    const blob = new Blob([CE.files[CE.activeFile]], {type:'text/html'});
    window.open(URL.createObjectURL(blob), '_blank');
  } else if (ext === 'js') {
    ceRunCode();
  }
}

// PYTHON REPL ENGINE (via Pyodide — real Python in browser)
// ══════════════════════════════════════════════════════════════
const PY = { loaded: false, loading: false, pyodide: null, history: [], histIdx: -1 };

function pyReplInit() {
  pyLoad();
}

function pyLoad() {
  if (PY.loaded || PY.loading) return;
  PY.loading = true;
  const ver = document.getElementById('py-version');
  const loading = document.getElementById('py-loading');
  if (ver) ver.textContent = 'Loading Pyodide 0.25 (real CPython 3.12)…';
  if (loading) loading.style.display = 'block';
  pyPrint('Loading Python 3.12 via Pyodide…\n', '#58a6ff');
  // Load Pyodide from CDN
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
  script.onload = async () => {
    try {
      pyPrint('Initializing Python runtime…\n', '#58a6ff');
      PY.pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
      // Redirect stdout/stderr
      PY.pyodide.runPython(`
import sys
import io
class _Writer:
    def __init__(self): self.buf = []
    def write(self, s): self.buf.append(s)
    def flush(self): pass
sys.stdout = _Writer()
sys.stderr = _Writer()
`);
      PY.loaded = true; PY.loading = false;
      if (ver) ver.textContent = 'Python 3.12.0 (Pyodide) — Ready ✅';
      if (loading) loading.style.display = 'none';
      pyPrint('\n✅ Python 3.12 ready! Try the examples above or write your own code.\n', '#22c55e');
      pyPrint('Available: math, json, re, random, datetime, itertools, functools, collections…\n', '#484f58');
    } catch(e) {
      PY.loading = false;
      if (ver) ver.textContent = 'Pyodide load failed — using JS fallback';
      if (loading) loading.style.display = 'none';
      pyPrint('⚠️ Pyodide failed to load (needs network). Using JS-based Python emulation.\n', '#f59e0b');
      pyPrint('Basic print(), math operations, lists, dicts, for loops, functions will work.\n', '#484f58');
      PY.loaded = 'fallback';
    }
  };
  script.onerror = () => {
    PY.loading = false;
    if (ver) ver.textContent = 'Pyodide unavailable — JS fallback active';
    if (loading) loading.style.display = 'none';
    pyPrint('⚠️ Cannot load Pyodide (no network). Using built-in Python emulator.\n', '#f59e0b');
    PY.loaded = 'fallback';
  };
  document.head.appendChild(script);
}

async function pyExec() {
  const code = document.getElementById('py-code')?.value?.trim();
  if (!code) return;
  if (!PY.loaded) { pyLoad(); return; }
  // Add to history
  PY.history.unshift(code);
  if (PY.history.length > 20) PY.history.pop();
  pyRenderHistory();
  pyPrint('\n>>> ' + code.split('\n')[0] + (code.includes('\n') ? '\n    …' : '') + '\n', '#484f58');
  if (PY.loaded === 'fallback') {
    pyExecFallback(code); return;
  }
  try {
    // Capture output
    PY.pyodide.runPython('sys.stdout.buf.clear(); sys.stderr.buf.clear()');
    await PY.pyodide.runPythonAsync(code);
    const out = PY.pyodide.runPython('sys.stdout.buf');
    const err = PY.pyodide.runPython('sys.stderr.buf');
    const outStr = Array.from(out).join('');
    const errStr = Array.from(err).join('');
    if (outStr) pyPrint(outStr, '#e6edf3');
    if (errStr) pyPrint(errStr, '#ef4444');
    if (!outStr && !errStr) pyPrint('(no output)\n', '#484f58');
  } catch(e) {
    pyPrint('❌ ' + e.message + '\n', '#ef4444');
  }
}

function pyExecFallback(code) {
  // Simple Python-to-JS transpiler for basic code
  const logs = [];
  const cap = (...a) => logs.push(a.map(v => typeof v==='object'?JSON.stringify(v,null,2):String(v)).join(' '));
  try {
    // Transform basic Python to JS
    let js = code
      .replace(/^(\s*)print\((.*)\)/gm, '$1__log($2)')
      .replace(/^(\s*)#.*$/gm, '$1')
      .replace(/True/g,'true').replace(/False/g,'false').replace(/None/g,'null')
      .replace(/elif /g,'else if ').replace(/def (\w+)\((.*?)\):/g,'function $1($2){').replace(/^(\s*)(\w.*):$/gm, '$1$2{')
      .replace(/f"([^"]*)"/g, (_, s) => '`' + s.replace(/\{([^}]*)\}/g,'${$1}') + '`')
      .replace(/f'([^']*)'/g, (_, s) => '`' + s.replace(/\{([^}]*)\}/g,'${$1}') + '`');
    // Very basic: just eval with print -> cap
    const fn = new Function('__log', js + '\nreturn true;');
    fn(cap);
    if (logs.length) logs.forEach(l => pyPrint(l + '\n', '#e6edf3'));
    else pyPrint('(no output)\n', '#484f58');
  } catch(e) {
    pyPrint('❌ ' + e.message + '\n', '#ef4444');
    pyPrint('💡 Tip: For full Python support, open with a network connection (loads Pyodide)\n', '#f59e0b');
  }
}

function pyPrint(text, color = '#e6edf3') {
  const el = document.getElementById('py-output'); if (!el) return;
  if (el.querySelector('.px-btn')) el.innerHTML = '';
  const span = document.createElement('span');
  span.style.color = color; span.textContent = text;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function pyClear() { const el=document.getElementById('py-output'); if(el) el.innerHTML='<span style="color:#484f58"># Output cleared</span>'; }
function pyReset() {
  PY.loaded = false; PY.loading = false; PY.pyodide = null;
  pyClear();
  pyPrint('Python session reset.\n','#f59e0b');
  const ver=document.getElementById('py-version');if(ver)ver.textContent='Ready to reload…';
  pyLoad();
}
function pySetCode(code) {
  const ed=document.getElementById('py-code');if(ed){ed.value=code.replace(/\\n/g,'\n');}
}
function pyKeyDown(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); pyExec(); }
  if (e.key==='Tab') { e.preventDefault(); const ed=e.target,s=ed.selectionStart;ed.value=ed.value.substring(0,s)+'    '+ed.value.substring(ed.selectionEnd);ed.selectionStart=ed.selectionEnd=s+4; }
  if (e.key==='ArrowUp' && e.ctrlKey) {
    PY.histIdx=Math.min(PY.histIdx+1,PY.history.length-1);
    const ed=document.getElementById('py-code');if(ed&&PY.history[PY.histIdx])ed.value=PY.history[PY.histIdx];
  }
}
function pyRenderHistory() {
  const el=document.getElementById('py-history');if(!el)return;
  el.innerHTML=PY.history.slice(0,8).map((h,i)=>`<div onclick="pySetCode(${JSON.stringify(h)})" style="padding:2px 8px;background:rgba(56,139,253,0.08);border:1px solid rgba(56,139,253,0.15);border-radius:99px;font-size:9px;color:#484f58;cursor:pointer;white-space:nowrap;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${h.replace(/\n/g,' ')}">${h.split('\n')[0].slice(0,20)}</div>`).join('');
}

function stOpenUrl(url) {
  if (!url) return;
  if (url.startsWith('http')) { stOpen(url, url); return; }
  const q = encodeURIComponent(url);
  stOpen(`https://www.twitch.tv/search?term=${q}`, 'Search: '+url);
}

function stSearch(q) {
  if (!q) { stTab(ST_ACTIVE_TAB); return; }
  const grid = document.getElementById('st-grid'); if (!grid) return;
  const results = ST_CHANNELS.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) || c.cat.toLowerCase().includes(q.toLowerCase())
  );
  grid.innerHTML = results.map(ch => `
    <div onclick="stOpen('${ch.url}','${ch.name}')" style="background:#18181b;border:1px solid #2d2d35;border-radius:12px;overflow:hidden;cursor:pointer;padding:12px;transition:border-color .15s"
      onmouseover="this.style.borderColor='#9147ff'" onmouseout="this.style.borderColor='#2d2d35'">
      <div style="font-size:24px;margin-bottom:6px">${ch.icon}</div>
      <div style="font-size:13px;font-weight:600;color:#efeff1">${ch.name}</div>
      <div style="font-size:10px;color:#6d6d7a;margin:3px 0">${ch.cat} ${ch.viewers!=='—'?'· 🔴 LIVE · '+ch.viewers:''}</div>
      <button style="margin-top:8px;padding:4px 12px;background:#9147ff;border:none;border-radius:6px;color:#fff;font-size:11px;cursor:pointer">▶ Watch</button>
    </div>`).join('');
}

function stSave(id) {
  const ch = ST_CHANNELS.find(c => c.id===id);
  if (!ch) return;
  if (!ST_SAVED.find(c=>c.id===id)) { ST_SAVED.push(ch); Toast.show('⭐ Saved: '+ch.name,'success',1500); }
  else Toast.show('Already saved','info',1000);
}

// ══════════════════════════════════════════════════════════════
// IMAGE EDITOR ENGINE (Photopea/GIMP-inspired)
// Full-featured raster + basic vector editor
// ══════════════════════════════════════════════════════════════
const IMG = {
  tool: 'brush', zoom: 1, layers: [], activeLayer: 0,
  drawing: false, lastX: 0, lastY: 0, startX: 0, startY: 0,
  undoStack: [], redoStack: [],
  width: 800, height: 600,
  origImageData: null,  // for non-destructive adjustments
};

function imgEdInit() {
  imgSetupCanvas();
  imgTool('brush');
}

function imgSetupCanvas(W, H) {
  W = W || 800; H = H || 600;
  IMG.width = W; IMG.height = H;
  ['img-bg-canvas','img-main','img-overlay'].forEach(id => {
    const c = document.getElementById(id);
    if (c) { c.width = W; c.height = H; }
  });
  // Checkerboard bg
  const bg = document.getElementById('img-bg-canvas');
  if (bg) {
    const ctx = bg.getContext('2d');
    for (let y = 0; y < H; y += 16)
      for (let x = 0; x < W; x += 16) {
        ctx.fillStyle = (x+y)/16 % 2 === 0 ? '#cccccc' : '#ffffff';
        ctx.fillRect(x, y, 16, 16);
      }
  }
  if (!IMG.layers.length) imgAddLayer('Background');
  // Hide drop zone
  const drop = document.getElementById('img-drop');
  if (drop && IMG.layers.length > 1) drop.style.display = 'none';
  imgComposite();
  imgSyncLayers();
  imgUpdateInfo();
}

function imgAddLayer(name) {
  const W = IMG.width, H = IMG.height;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  IMG.layers.splice(IMG.activeLayer+1, 0, {
    canvas, name: name || 'Layer '+(IMG.layers.length+1),
    visible: true, opacity: 1, blend: 'source-over'
  });
  IMG.activeLayer = IMG.layers.length - 1;
  imgSyncLayers(); imgComposite();
}

function imgDupeLayer() {
  const src = IMG.layers[IMG.activeLayer]; if (!src) return;
  const c = document.createElement('canvas');
  c.width=IMG.width; c.height=IMG.height;
  c.getContext('2d').drawImage(src.canvas, 0, 0);
  IMG.layers.splice(IMG.activeLayer+1, 0, {...src, canvas:c, name:src.name+' copy'});
  IMG.activeLayer++;
  imgSyncLayers(); imgComposite();
}

function imgDelLayer() {
  if (IMG.layers.length <= 1) { Toast.show('Cannot delete last layer','warn'); return; }
  IMG.layers.splice(IMG.activeLayer, 1);
  IMG.activeLayer = Math.min(IMG.activeLayer, IMG.layers.length-1);
  imgSyncLayers(); imgComposite();
}

function imgSyncLayers() {
  const el = document.getElementById('img-layers'); if (!el) return;
  el.innerHTML = [...IMG.layers].reverse().map((l,ri) => {
    const i = IMG.layers.length-1-ri;
    const t = document.createElement('canvas'); t.width=60; t.height=40;
    t.getContext('2d').drawImage(l.canvas,0,0,60,40);
    return `<div style="display:flex;align-items:center;gap:5px;padding:5px;border-bottom:1px solid #2a2a2a;cursor:pointer;background:${i===IMG.activeLayer?'rgba(145,71,255,0.15)':'transparent'}" onclick="imgSetLayer(${i})">
      <canvas width="40" height="28" id="img-lt-${i}" style="border:1px solid #555;border-radius:2px;background:#fff"></canvas>
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;color:${i===IMG.activeLayer?'#c084fc':'#ccc'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.name}</div>
        <input type="range" min="0" max="100" value="${Math.round(l.opacity*100)}" style="width:100%;height:2px;accent-color:#9147ff" oninput="IMG.layers[${i}].opacity=this.value/100;imgComposite()" onclick="event.stopPropagation()">
      </div>
      <div onclick="event.stopPropagation();IMG.layers[${i}].visible=!IMG.layers[${i}].visible;imgComposite();imgSyncLayers()" style="cursor:pointer;font-size:12px;color:${l.visible?'#9147ff':'#555'}">${l.visible?'👁':'🚫'}</div>
    </div>`;
  }).join('');
  // Render layer thumbs
  IMG.layers.forEach((l,i) => {
    const t = document.getElementById('img-lt-'+i);
    if (t) { t.width=40;t.height=28;t.getContext('2d').drawImage(l.canvas,0,0,40,28); }
  });
}

function imgSetLayer(i) { IMG.activeLayer = i; imgSyncLayers(); }

function imgComposite() {
  const main = document.getElementById('img-main'); if (!main) return;
  const ctx = main.getContext('2d');
  ctx.clearRect(0,0,main.width,main.height);
  IMG.layers.forEach(l => {
    if (!l.visible) return;
    ctx.save(); ctx.globalAlpha=l.opacity; ctx.globalCompositeOperation=l.blend||'source-over';
    ctx.drawImage(l.canvas,0,0); ctx.restore();
  });
}

function imgTool(t) {
  IMG.tool = t;
  document.querySelectorAll('[id^="img-t-"]').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('img-t-'+t); if(el) el.classList.add('active');
  const lbl = document.getElementById('img-tool-label'); if(lbl) lbl.textContent = t.charAt(0).toUpperCase()+t.slice(1);
  const main = document.getElementById('img-main');
  if (main) main.style.cursor = t==='zoom'?'zoom-in':t==='pan'?'grab':t==='eyedrop'?'crosshair':'crosshair';
  // Wire events once
  if (!IMG._eventsWired) {
    const c = document.getElementById('img-main'); if (!c) return;
    c.onmousedown = imgMouseDown;
    c.onmousemove = imgMouseMove;
    c.onmouseup   = imgMouseUp;
    c.onmouseleave = imgMouseUp;
    const wrap = document.getElementById('img-canvas-area');
    if (wrap) wrap.onwheel = e => { if(e.ctrlKey){e.preventDefault();imgZoom(e.deltaY<0?1.1:0.9);} };
    IMG._eventsWired = true;
  }
}

function imgEventPos(e) {
  const c = document.getElementById('img-main'); if(!c) return [0,0];
  const r = c.getBoundingClientRect();
  return [Math.round((e.clientX-r.left)/IMG.zoom), Math.round((e.clientY-r.top)/IMG.zoom)];
}

function imgGetCtx() { return IMG.layers[IMG.activeLayer]?.canvas.getContext('2d') || null; }

function imgMouseDown(e) {
  const [x,y] = imgEventPos(e);
  IMG.drawing=true; IMG.startX=x; IMG.startY=y; IMG.lastX=x; IMG.lastY=y;
  imgSaveUndo();
  const ctx = imgGetCtx(); if (!ctx) return;
  if (IMG.tool==='eyedrop') { imgEyedrop(x,y); IMG.drawing=false; return; }
  if (IMG.tool==='fill')    { imgFill(x,y);    IMG.drawing=false; return; }
  if (IMG.tool==='text')    { imgPlaceText(x,y); IMG.drawing=false; return; }
  if (IMG.tool==='zoom')    { imgZoom(e.shiftKey?0.8:1.25); IMG.drawing=false; return; }
  if (['brush','pencil','eraser','smudge'].includes(IMG.tool)) imgApplyBrush(ctx,x,y,x,y);
  imgComposite();
}

function imgMouseMove(e) {
  const [x,y] = imgEventPos(e);
  const xy = document.getElementById('img-xy'); if(xy) xy.textContent = `x:${x} y:${y}`;
  if (!IMG.drawing) return;
  const ctx = imgGetCtx(); if(!ctx) return;
  if (['brush','pencil','eraser','smudge'].includes(IMG.tool)) {
    imgApplyBrush(ctx, IMG.lastX, IMG.lastY, x, y);
    imgComposite();
  } else if (['rect','ellipse','line','star','gradient','crop'].includes(IMG.tool)) {
    imgComposite();
    imgPreviewShape(x,y);
  }
  IMG.lastX=x; IMG.lastY=y;
}

function imgMouseUp(e) {
  if (!IMG.drawing) return;
  IMG.drawing = false;
  const [x,y] = imgEventPos(e);
  const ctx = imgGetCtx(); if(!ctx) return;
  if (['rect','ellipse','line','star'].includes(IMG.tool)) {
    imgCommitShape(ctx, IMG.startX, IMG.startY, x, y);
    const ov = document.getElementById('img-overlay'); if(ov) ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
    imgComposite();
  } else if (IMG.tool==='gradient') {
    imgApplyGradient(ctx, IMG.startX, IMG.startY, x, y);
    const ov = document.getElementById('img-overlay'); if(ov) ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
    imgComposite();
  }
  imgSyncLayers();
  imgDrawHistogram();
}

function imgApplyBrush(ctx, x1, y1, x2, y2) {
  const size    = parseInt(document.getElementById('img-size')?.value||10);
  const opacity = parseInt(document.getElementById('img-opacity')?.value||100)/100;
  const hard    = parseInt(document.getElementById('img-hard')?.value||80)/100;
  const color   = document.getElementById('img-fg')?.value||'#000000';
  const blend   = IMG.tool==='eraser'?'destination-out':'source-over';
  ctx.save();
  ctx.globalAlpha = opacity; ctx.globalCompositeOperation = blend;
  ctx.strokeStyle = IMG.tool==='eraser'?'rgba(0,0,0,1)':color;
  ctx.lineWidth = size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (IMG.tool==='pencil') { ctx.lineWidth = Math.max(1, size/3); ctx.globalAlpha = Math.min(1,opacity*1.5); }
  if (hard < 0.5) {
    // Soft brush: draw as dots with radial gradient
    const grad = ctx.createRadialGradient(x2,y2,0,x2,y2,size/2);
    grad.addColorStop(0, color); grad.addColorStop(1,'transparent');
    ctx.fillStyle = grad; ctx.globalCompositeOperation='source-over';
    ctx.beginPath(); ctx.arc(x2,y2,size/2,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  if (IMG.tool==='smudge') {
    // Smudge: sample and blend
    const d = ctx.getImageData(x2-size/2, y2-size/2, size, size);
    for (let i=0;i<d.data.length;i+=4) { d.data[i]=(d.data[i]+d.data[i-4]||d.data[i])/2|0; }
    ctx.putImageData(d, x2-size/2, y2-size/2);
  }
  ctx.restore();
}

function imgPreviewShape(x, y) {
  const ov = document.getElementById('img-overlay'); if(!ov) return;
  const ctx = ov.getContext('2d');
  ctx.clearRect(0,0,ov.width,ov.height);
  const color = document.getElementById('img-fg')?.value||'#000';
  const size  = parseInt(document.getElementById('img-size')?.value||2);
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=size; ctx.fillStyle=color+'22';
  imgDrawShape(ctx, IMG.tool, IMG.startX, IMG.startY, x, y);
  ctx.restore();
}

function imgCommitShape(ctx, x1,y1,x2,y2) {
  const color=document.getElementById('img-fg')?.value||'#000';
  const size=parseInt(document.getElementById('img-size')?.value||2);
  const op=parseInt(document.getElementById('img-opacity')?.value||100)/100;
  ctx.save(); ctx.globalAlpha=op; ctx.strokeStyle=color; ctx.lineWidth=size; ctx.fillStyle=color+'33';
  imgDrawShape(ctx,IMG.tool,x1,y1,x2,y2); ctx.restore();
}

function imgDrawShape(ctx, tool, x1,y1,x2,y2) {
  const cx=(x1+x2)/2, cy=(y1+y2)/2, w=x2-x1, h=y2-y1;
  ctx.beginPath();
  if (tool==='rect')    { ctx.rect(x1,y1,w,h); }
  else if (tool==='ellipse') { ctx.ellipse(cx,cy,Math.abs(w)/2||1,Math.abs(h)/2||1,0,0,Math.PI*2); }
  else if (tool==='line')    { ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); }
  else if (tool==='star')    {
    const spikes=5,or=Math.max(Math.abs(w),Math.abs(h))/2,ir=or*0.4;
    for(let i=0;i<spikes*2;i++){const a=i*Math.PI/spikes-Math.PI/2;const r=i%2?ir:or;ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
    ctx.closePath();
  }
  ctx.fill(); ctx.stroke();
}

function imgApplyGradient(ctx, x1,y1,x2,y2) {
  const fg=document.getElementById('img-fg')?.value||'#000';
  const bg=document.getElementById('img-bg')?.value||'#fff';
  const grad=ctx.createLinearGradient(x1,y1,x2,y2);
  grad.addColorStop(0,fg); grad.addColorStop(1,bg);
  ctx.fillStyle=grad; ctx.fillRect(0,0,IMG.width,IMG.height);
}

function imgFill(x,y) {
  const ctx=imgGetCtx();if(!ctx)return;
  const color=document.getElementById('img-fg')?.value||'#000';
  const imgData=ctx.getImageData(0,0,IMG.width,IMG.height);
  const data=imgData.data;
  const idx=(y*IMG.width+x)*4;
  const tr=data[idx],tg=data[idx+1],tb=data[idx+2];
  const fc={r:parseInt(color.slice(1,3),16),g:parseInt(color.slice(3,5),16),b:parseInt(color.slice(5,7),16)};
  if(tr===fc.r&&tg===fc.g&&tb===fc.b)return;
  const stack=[[x,y]];const vis=new Uint8Array(IMG.width*IMG.height);
  let its=0;
  while(stack.length&&its++<300000){
    const[cx,cy]=stack.pop();if(cx<0||cy<0||cx>=IMG.width||cy>=IMG.height)continue;
    const i=(cy*IMG.width+cx)*4;if(vis[cy*IMG.width+cx])continue;
    if(Math.abs(data[i]-tr)>30||Math.abs(data[i+1]-tg)>30||Math.abs(data[i+2]-tb)>30)continue;
    vis[cy*IMG.width+cx]=1;data[i]=fc.r;data[i+1]=fc.g;data[i+2]=fc.b;data[i+3]=255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imgData,0,0);imgComposite();
}

function imgEyedrop(x,y) {
  const ctx=imgGetCtx();if(!ctx)return;
  const p=ctx.getImageData(Math.round(x),Math.round(y),1,1).data;
  const hex='#'+[p[0],p[1],p[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  const fg=document.getElementById('img-fg');if(fg)fg.value=hex;
  Toast.show('Picked: '+hex,'info',1500);
}

function imgPlaceText(x,y) {
  const t=prompt('Enter text:','Hello');if(!t)return;
  const ctx=imgGetCtx();if(!ctx)return;
  const color=document.getElementById('img-fg')?.value||'#000';
  const size=Math.max(12,parseInt(document.getElementById('img-size')?.value||20)*1.5);
  ctx.save();ctx.font=`${size}px sans-serif`;ctx.fillStyle=color;
  ctx.globalAlpha=parseInt(document.getElementById('img-opacity')?.value||100)/100;
  ctx.fillText(t,x,y);ctx.restore();
  imgComposite();
}

function imgFilter(f) {
  const ctx=imgGetCtx();if(!ctx)return;imgSaveUndo();
  const W=IMG.width,H=IMG.height;
  const filters={
    'Blur':'blur(3px)','Sharpen':'contrast(1.5) brightness(1.05)',
    'Grayscale':'grayscale(1)','Sepia':'sepia(1)','Invert':'invert(1)',
    'Emboss':'contrast(2) brightness(0.7)','Edge':'invert(1) grayscale(1) contrast(3)',
    'Vignette':null,'Noise':null,'HDR':'contrast(1.4) saturate(1.5) brightness(1.05)',
  };
  if(f==='Vignette'){
    const grad=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
    grad.addColorStop(0,'transparent');grad.addColorStop(1,'rgba(0,0,0,0.7)');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  } else if(f==='Noise'){
    const id=ctx.getImageData(0,0,W,H);
    for(let i=0;i<id.data.length;i+=4){const n=(Math.random()-0.5)*40;id.data[i]+=n;id.data[i+1]+=n;id.data[i+2]+=n;}
    ctx.putImageData(id,0,0);
  } else if(filters[f]) {
    const tmp=document.createElement('canvas');tmp.width=W;tmp.height=H;
    tmp.getContext('2d').drawImage(IMG.layers[IMG.activeLayer].canvas,0,0);
    ctx.clearRect(0,0,W,H);ctx.filter=filters[f];ctx.drawImage(tmp,0,0);ctx.filter='none';
  }
  imgComposite();imgSyncLayers();imgDrawHistogram();
  Toast.show(f+' applied','success',1500);
}

function imgAdjust() {
  const b=parseInt(document.getElementById('img-br')?.value||0);
  const c=parseInt(document.getElementById('img-con')?.value||0);
  const s=parseInt(document.getElementById('img-sat')?.value||0);
  const h=parseInt(document.getElementById('img-hue')?.value||0);
  ['img-br','img-con','img-sat','img-hue','img-temp'].forEach(id=>{
    const el=document.getElementById(id);
    const lbl=document.getElementById(id+'-lbl');
    if(el&&lbl)lbl.textContent=el.value;
  });
  // Live preview on overlay
  const ov=document.getElementById('img-overlay');if(!ov)return;
  const ctx=ov.getContext('2d');ctx.clearRect(0,0,ov.width,ov.height);
  ctx.filter=`brightness(${1+b/100}) contrast(${1+c/100}) saturate(${1+s/100}) hue-rotate(${h}deg)`;
  IMG.layers.forEach(l=>{if(l.visible)ctx.drawImage(l.canvas,0,0);});
  ctx.filter='none';
}

function imgApplyAdjust() {
  const b=parseInt(document.getElementById('img-br')?.value||0);
  const c=parseInt(document.getElementById('img-con')?.value||0);
  const s=parseInt(document.getElementById('img-sat')?.value||0);
  const h=parseInt(document.getElementById('img-hue')?.value||0);
  const ctx=imgGetCtx();if(!ctx)return;imgSaveUndo();
  const W=IMG.width,H=IMG.height;
  const tmp=document.createElement('canvas');tmp.width=W;tmp.height=H;
  tmp.getContext('2d').drawImage(IMG.layers[IMG.activeLayer].canvas,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.filter=`brightness(${1+b/100}) contrast(${1+c/100}) saturate(${1+s/100}) hue-rotate(${h}deg)`;
  ctx.drawImage(tmp,0,0);ctx.filter='none';
  // Clear overlay
  const ov=document.getElementById('img-overlay');if(ov)ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
  imgComposite();imgSyncLayers();imgDrawHistogram();
  Toast.show('Adjustments applied','success',1500);
}

function imgResetAdjust() {
  ['img-br','img-con','img-sat','img-hue','img-temp'].forEach(id=>{
    const el=document.getElementById(id);const lbl=document.getElementById(id+'-lbl');
    if(el)el.value=0;if(lbl)lbl.textContent='0';
  });
  const ov=document.getElementById('img-overlay');if(ov)ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
}

function imgLoad(inp) {
  const f=inp.files[0];if(!f)return;
  const img=new Image();
  img.onload=()=>{
    IMG.width=img.width;IMG.height=img.height;
    ['img-bg-canvas','img-main','img-overlay'].forEach(id=>{const c=document.getElementById(id);if(c){c.width=img.width;c.height=img.height;}});
    const drop=document.getElementById('img-drop');if(drop)drop.style.display='none';
    const canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;
    canvas.getContext('2d').drawImage(img,0,0);
    IMG.layers=[{canvas,name:f.name,visible:true,opacity:1,blend:'source-over'}];
    IMG.activeLayer=0;
    imgSetupCanvas(img.width,img.height);
    imgComposite();imgSyncLayers();imgUpdateInfo();imgDrawHistogram();
    Toast.show('Loaded: '+f.name,'success',2000);
  };
  img.src=URL.createObjectURL(f);
}

function imgDrop(e) {
  e.preventDefault();
  const f=e.dataTransfer.files[0];if(!f||!f.type.startsWith('image/'))return;
  const inp={files:[f]};imgLoad(inp);
}

function imgExport(fmt) {
  const flat=document.createElement('canvas');flat.width=IMG.width;flat.height=IMG.height;
  const ctx=flat.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,IMG.width,IMG.height);
  IMG.layers.forEach(l=>{if(l.visible){ctx.save();ctx.globalAlpha=l.opacity;ctx.globalCompositeOperation=l.blend||'source-over';ctx.drawImage(l.canvas,0,0);ctx.restore();}});
  const a=document.createElement('a');a.href=flat.toDataURL('image/'+fmt,0.95);a.download='ghaniy_img_'+Date.now()+'.'+fmt;a.click();
  Toast.show('Saved as '+fmt.toUpperCase(),'success',2000);
}

function imgSaveUndo() {
  const l=IMG.layers[IMG.activeLayer];if(!l)return;
  const snap=document.createElement('canvas');snap.width=l.canvas.width;snap.height=l.canvas.height;
  snap.getContext('2d').drawImage(l.canvas,0,0);
  IMG.undoStack.push({layer:IMG.activeLayer,canvas:snap});
  if(IMG.undoStack.length>20)IMG.undoStack.shift();
  IMG.redoStack=[];
}

function imgZoom(f) {
  IMG.zoom=Math.max(0.1,Math.min(8,IMG.zoom*f));
  const cont=document.getElementById('img-container');if(cont)cont.style.transform=`scale(${IMG.zoom})`;
  const lbl=document.getElementById('img-zoom-lbl');if(lbl)lbl.textContent=Math.round(IMG.zoom*100)+'%';
}
function imgZoomIn()  {imgZoom(1.25);}
function imgZoomOut() {imgZoom(0.8);}
function imgZoomFit() {
  const area=document.getElementById('img-canvas-area');if(!area)return;
  const f=Math.min((area.clientWidth-40)/IMG.width,(area.clientHeight-40)/IMG.height);
  IMG.zoom=Math.max(0.1,Math.min(8,f));
  const cont=document.getElementById('img-container');if(cont)cont.style.transform=`scale(${IMG.zoom})`;
  const lbl=document.getElementById('img-zoom-lbl');if(lbl)lbl.textContent=Math.round(IMG.zoom*100)+'%';
}

function imgSwapColors(){
  const fg=document.getElementById('img-fg'),bg=document.getElementById('img-bg');
  if(!fg||!bg)return;const t=fg.value;fg.value=bg.value;bg.value=t;
}
function imgSyncColor(){}

function imgUpdateInfo() {
  const el=document.getElementById('img-info');if(!el)return;
  el.textContent=`Size: ${IMG.width}×${IMG.height}\nLayers: ${IMG.layers.length}\nZoom: ${Math.round(IMG.zoom*100)}%`;
}

function imgDrawHistogram() {
  const canvas=document.getElementById('img-histogram');if(!canvas)return;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,188,60);
  const main=document.getElementById('img-main');if(!main)return;
  const ic=main.getContext('2d');
  let data;try{data=ic.getImageData(0,0,IMG.width,IMG.height).data;}catch(e){return;}
  const rH=new Array(256).fill(0),gH=new Array(256).fill(0),bH=new Array(256).fill(0);
  for(let i=0;i<data.length;i+=4){rH[data[i]]++;gH[data[i+1]]++;bH[data[i+2]]++;}
  const max=Math.max(...rH,...gH,...bH)||1;
  [[rH,'rgba(255,80,80,0.6)'],[gH,'rgba(80,255,80,0.6)'],[bH,'rgba(80,80,255,0.6)']].forEach(([h,col])=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,60);
    h.forEach((v,i)=>{ctx.lineTo(i*188/256,60-(v/max)*58);});
    ctx.lineTo(188,60);ctx.closePath();ctx.fill();
  });
}

function imgMenu(item) {
  const menus={
    'File':[['New 800×600','imgNewCanvas(800,600)'],['New 1920×1080','imgNewCanvas(1920,1080)'],['Open Image','document.querySelector("[accept=\\"image/*\\"]").click()'],['Save PNG','imgExport("png")'],['Save JPG','imgExport("jpeg")']],
    'Edit':[['Undo','imgUndo()'],['Redo','imgRedo()'],['Select All',''],['Clear Layer','imgClearLayer()'],['Flatten','imgFlatten()']],
    'Image':[['Flip H','imgFlipH()'],['Flip V','imgFlipV()'],['Rotate 90°','imgRotate90()'],['Resize…','imgResizePrompt()']],
    'Layer':[['New Layer','imgAddLayer()'],['Duplicate','imgDupeLayer()'],['Delete','imgDelLayer()'],['Flatten','imgFlatten()']],
    'Filters':[['Blur','imgFilter("Blur")'],['Sharpen','imgFilter("Sharpen")'],['Grayscale','imgFilter("Grayscale")'],['Sepia','imgFilter("Sepia")'],['Invert','imgFilter("Invert")'],['Vignette','imgFilter("Vignette")'],['Noise','imgFilter("Noise")'],['HDR','imgFilter("HDR")']],
    'Select':[['All',''],['None',''],['Invert','']],
    'View':[['Zoom In','imgZoomIn()'],['Zoom Out','imgZoomOut()'],['Fit','imgZoomFit()'],['100%','imgZoom(1/IMG.zoom)']],
  };
  const items=menus[item]||[];
  const dd=document.createElement('div');
  dd.style.cssText='position:fixed;background:#444;border:1px solid #333;border-radius:4px;z-index:99999;min-width:160px;padding:4px 0;box-shadow:0 8px 24px rgba(0,0,0,0.6)';
  items.forEach(([l,a])=>{
    const li=document.createElement('div');li.style.cssText='padding:6px 14px;font-size:12px;color:#eee;cursor:pointer;font-family:inherit';
    li.onmouseover=()=>li.style.background='rgba(145,71,255,0.2)';li.onmouseout=()=>li.style.background='';
    li.textContent=l;if(a)li.onclick=()=>{eval(a);dd.remove();};else li.style.color='#666';
    dd.appendChild(li);
  });
  const all=document.querySelectorAll('[onclick*="imgMenu"]');const idx=['File','Edit','Image','Layer','Filters','Select','View'].indexOf(item);
  const el=all[idx];if(el){const r=el.getBoundingClientRect();dd.style.left=r.left+'px';dd.style.top=r.bottom+'px';}
  document.body.appendChild(dd);
  setTimeout(()=>document.addEventListener('click',function rem(){dd.remove();document.removeEventListener('click',rem);}),50);
}

function imgNewCanvas(W,H){IMG.layers=[];imgSetupCanvas(W,H);Toast.show('New canvas '+W+'×'+H,'success');}
function imgClearLayer(){const ctx=imgGetCtx();if(!ctx)return;imgSaveUndo();ctx.clearRect(0,0,IMG.width,IMG.height);imgComposite();}
function imgFlatten(){
  const flat=document.createElement('canvas');flat.width=IMG.width;flat.height=IMG.height;
  const ctx=flat.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,IMG.width,IMG.height);
  IMG.layers.forEach(l=>{if(l.visible){ctx.save();ctx.globalAlpha=l.opacity;ctx.drawImage(l.canvas,0,0);ctx.restore();}});
  IMG.layers=[{canvas:flat,name:'Background',visible:true,opacity:1,blend:'source-over'}];
  IMG.activeLayer=0;imgComposite();imgSyncLayers();Toast.show('Flattened','success');
}
function imgFlipH(){const ctx=imgGetCtx();if(!ctx)return;imgSaveUndo();const W=IMG.width,H=IMG.height;const t=document.createElement('canvas');t.width=W;t.height=H;t.getContext('2d').drawImage(IMG.layers[IMG.activeLayer].canvas,0,0);ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(W,0);ctx.scale(-1,1);ctx.drawImage(t,0,0);ctx.restore();imgComposite();}
function imgFlipV(){const ctx=imgGetCtx();if(!ctx)return;imgSaveUndo();const W=IMG.width,H=IMG.height;const t=document.createElement('canvas');t.width=W;t.height=H;t.getContext('2d').drawImage(IMG.layers[IMG.activeLayer].canvas,0,0);ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(0,H);ctx.scale(1,-1);ctx.drawImage(t,0,0);ctx.restore();imgComposite();}
function imgRotate90(){const src=IMG.layers[IMG.activeLayer];if(!src)return;imgSaveUndo();const W=IMG.width,H=IMG.height;const t=document.createElement('canvas');t.width=H;t.height=W;const tc=t.getContext('2d');tc.translate(H,0);tc.rotate(Math.PI/2);tc.drawImage(src.canvas,0,0);src.canvas=t;IMG.width=H;IMG.height=W;['img-bg-canvas','img-main','img-overlay'].forEach(id=>{const c=document.getElementById(id);if(c){c.width=H;c.height=W;}});imgSetupCanvas(H,W);imgComposite();imgSyncLayers();}
function imgResizePrompt(){const w=prompt('Width:',IMG.width),h=prompt('Height:',IMG.height);if(!w||!h)return;imgNewCanvas(parseInt(w),parseInt(h));}
function imgUndo(){if(!IMG.undoStack.length)return;const snap=IMG.undoStack.pop();const l=IMG.layers[snap.layer];if(!l)return;const cur=document.createElement('canvas');cur.width=l.canvas.width;cur.height=l.canvas.height;cur.getContext('2d').drawImage(l.canvas,0,0);IMG.redoStack.push({layer:snap.layer,canvas:cur});l.canvas.getContext('2d').clearRect(0,0,l.canvas.width,l.canvas.height);l.canvas.getContext('2d').drawImage(snap.canvas,0,0);imgComposite();imgSyncLayers();}
function imgRedo(){if(!IMG.redoStack.length)return;const snap=IMG.redoStack.pop();const l=IMG.layers[snap.layer];if(!l)return;const cur=document.createElement('canvas');cur.width=l.canvas.width;cur.height=l.canvas.height;cur.getContext('2d').drawImage(l.canvas,0,0);IMG.undoStack.push({layer:snap.layer,canvas:cur});l.canvas.getContext('2d').clearRect(0,0,l.canvas.width,l.canvas.height);l.canvas.getContext('2d').drawImage(snap.canvas,0,0);imgComposite();imgSyncLayers();}

// Installed state (persistent)
const PS_INSTALLED = new Set(State.get('ps_installed', ['vscode','github','chatgpt','claude','figma']));
function psSaveInstalled(){ State.set('ps_installed',[...PS_INSTALLED]); }

// Cart
const PS_CART = new Set();

function psStars(r){
  const full=Math.floor(r), half=r%1>=0.5?1:0, empty=5-full-half;
  return '<span style="color:#f59e0b">'+'★'.repeat(full)+(half?'½':'')+'</span><span style="color:#334155">'+'★'.repeat(empty)+'</span>';
}

function psCardHTML(app, mode='grid'){
  const installed = PS_INSTALLED.has(app.id);
  const btnLabel  = installed ? '▶ Open' : '⬇ Install';
  const btnClass  = installed ? 'open' : 'install';
  if(mode==='horizontal'){
    return `<div class="ps-hcard" onclick="psOpenDetail('${app.id}')">
      <div style="width:52px;height:52px;border-radius:14px;background:${app.color};display:flex;align-items:center;justify-content:center;font-size:26px">${app.ico}</div>
      <div style="font-size:11px;font-weight:600;color:#e2e8f0;text-align:center;line-height:1.3">${app.name}</div>
      <div style="font-size:9px;color:#475569">${app.cat}</div>
      <div style="font-size:9px">${psStars(app.rating)} ${app.rating}</div>
      <button class="ps-card-btn ${btnClass}" onclick="event.stopPropagation();psInstall('${app.id}')" style="padding:5px 10px;font-size:10px">${btnLabel}</button>
    </div>`;
  }
  return `<div class="ps-card" onclick="psOpenDetail('${app.id}')">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="ps-card-ico" style="background:${app.color}">${app.ico}</div>
      <div style="flex:1;min-width:0">
        <div class="ps-card-name">${app.name}</div>
        <div class="ps-card-dev">${app.dev}</div>
        <div class="ps-card-stars">${psStars(app.rating)} <span style="color:#475569">${app.rating}</span></div>
      </div>
    </div>
    <div class="ps-card-cat">${app.cat}</div>
    <div style="font-size:10px;color:#475569;line-height:1.4;flex:1">${app.desc.slice(0,70)}…</div>
    <button class="ps-card-btn ${btnClass}" onclick="event.stopPropagation();psInstall('${app.id}')">${btnLabel}</button>
  </div>`;
}

function psInit(){
  // Hero slider
  const heroApps = PS_DB.filter(a=>a.featured).slice(0,4);
  const hColors = [['#0d1b40','#1a0d40'],['#1a0d10','#0d1a10'],['#0d1020','#201030'],['#1a1000','#0d2010']];
  const slides = document.getElementById('ps-hero-slides');
  if(!slides) return;
  let hi=0;
  function renderSlide(){
    const a=heroApps[hi], [c1,c2]=hColors[hi%hColors.length];
    slides.innerHTML = `<div class="ps-hero-slide" style="--hc1:${c1};--hc2:${c2}" onclick="psOpenDetail('${a.id}')">
      <div style="width:72px;height:72px;border-radius:18px;background:${a.color};display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,0.5)">${a.ico}</div>
      <div style="flex:1">
        <div style="font-size:16px;font-weight:700;color:#e2e8f0">${a.name}</div>
        <div style="font-size:11px;color:#94a3b8;margin:3px 0">${a.dev} · ${a.cat}</div>
        <div style="font-size:11px;color:#94a3b8">${a.desc.slice(0,60)}…</div>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
          <button onclick="event.stopPropagation();psInstall('${a.id}')" style="padding:6px 16px;background:${a.color};border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:600;cursor:pointer">${PS_INSTALLED.has(a.id)?'▶ Open':'⬇ Install'}</button>
          <div style="font-size:10px;color:#94a3b8">${psStars(a.rating)} ${a.rating} · ${a.installs}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-direction:column;align-items:center">
        ${heroApps.map((_,i)=>`<div onclick="event.stopPropagation();psHeroGo(${i})" style="width:6px;height:${i===hi?18:6}px;border-radius:3px;background:${i===hi?'#fff':'rgba(255,255,255,0.25)'};cursor:pointer;transition:height .2s"></div>`).join('')}
      </div>
    </div>`;
  }
  renderSlide();
  window._psHeroInterval = setInterval(()=>{ hi=(hi+1)%heroApps.length; renderSlide(); }, 4000);
  window.psHeroGo = i=>{ hi=i; renderSlide(); clearInterval(window._psHeroInterval); window._psHeroInterval=setInterval(()=>{hi=(hi+1)%heroApps.length;renderSlide();},4000); };

  // Horizontal rows
  const fill=(id,apps,mode='horizontal')=>{const el=document.getElementById(id);if(el)el.innerHTML=apps.map(a=>psCardHTML(a,mode)).join('');};
  fill('ps-featured',  PS_DB.filter(a=>a.featured));
  fill('ps-topfree',   [...PS_DB].sort((a,b)=>b.rating-a.rating).slice(0,12));
  fill('ps-gamesrow',  PS_DB.filter(a=>a.cat==='Games'));
  fill('ps-prodrow',   PS_DB.filter(a=>a.cat==='Productivity'));

  // Apps grid + category chips
  const cats=[...new Set(PS_DB.map(a=>a.cat))];
  const cf=document.getElementById('ps-cat-filters');
  if(cf) cf.innerHTML='<div class="ps-chip sel" onclick="psCatFilter(this,\'\')">'+'All</div>'+cats.map(c=>'<div class="ps-chip" onclick="psCatFilter(this,\''+c+'\')">'+c+'</div>').join('');
  const ag=document.getElementById('ps-apps-grid');
  if(ag) ag.innerHTML=PS_DB.map(a=>psCardHTML(a)).join('');

  // Games
  const gg=document.getElementById('ps-games-grid');
  if(gg) gg.innerHTML=PS_DB.filter(a=>a.cat==='Games').map(a=>psCardHTML(a)).join('');

  // Tools (Dev + Design + AI)
  const tg=document.getElementById('ps-tools-grid');
  if(tg) tg.innerHTML=PS_DB.filter(a=>['Dev','Design','AI','Finance'].includes(a.cat)).map(a=>psCardHTML(a)).join('');

  // Installed
  psRefreshInstalled();
}

function psRefreshInstalled(){
  const ig=document.getElementById('ps-installed-grid');
  if(!ig)return;
  const apps=PS_DB.filter(a=>PS_INSTALLED.has(a.id));
  ig.innerHTML=apps.length?apps.map(a=>psCardHTML(a)).join(''):'<div style="color:#475569;padding:20px;grid-column:1/-1;text-align:center">No apps installed yet. Browse and install!</div>';
}

function psCatFilter(el, cat){
  document.querySelectorAll('.ps-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  const grid=document.getElementById('ps-apps-grid');
  if(!grid)return;
  const apps=cat?PS_DB.filter(a=>a.cat===cat):PS_DB;
  grid.innerHTML=apps.map(a=>psCardHTML(a)).join('');
}

function psTab(el, id){
  const pages=['ps-home','ps-apps','ps-games','ps-tools','ps-webvm','ps-installed','ps-search-results','ps-detail'];
  pages.forEach(p=>{const d=document.getElementById(p);if(d)d.style.display='none';});
  const t=document.getElementById(id);if(t)t.style.display='block';
  document.querySelectorAll('.ps-tab').forEach(n=>n.classList.remove('sel'));
  el.classList.add('sel');
  if(id==='ps-installed')psRefreshInstalled();
  if(id==='ps-webvm')wvInitPackages();
}

function psSearch(q){
  const sr=document.getElementById('ps-search-results');
  const sg=document.getElementById('ps-search-grid');
  const sl=document.getElementById('ps-search-label');
  const pages=['ps-home','ps-apps','ps-games','ps-tools','ps-installed','ps-detail'];
  if(!q){
    if(sr)sr.style.display='none';
    const home=document.getElementById('ps-home');if(home)home.style.display='block';
    document.querySelectorAll('.ps-tab').forEach(t=>t.classList.remove('sel'));
    const ht=document.querySelector('.ps-tab');if(ht)ht.classList.add('sel');
    return;
  }
  pages.forEach(p=>{const d=document.getElementById(p);if(d)d.style.display='none';});
  if(sr)sr.style.display='block';
  const ql=q.toLowerCase();
  const results=PS_DB.filter(a=>
    a.name.toLowerCase().includes(ql)||a.cat.toLowerCase().includes(ql)||
    a.desc.toLowerCase().includes(ql)||(a.tags||[]).some(t=>t.includes(ql))||a.dev.toLowerCase().includes(ql)
  );
  if(sl)sl.innerHTML=`<b style="color:#e2e8f0">${results.length}</b> results for "<b style="color:#60a5fa">${q}</b>"`;
  if(sg)sg.innerHTML=results.length?results.map(a=>psCardHTML(a)).join(''):`<div style="color:#475569;padding:40px;grid-column:1/-1;text-align:center"><div style="font-size:32px;margin-bottom:8px">🔍</div>No apps found for "${q}"</div>`;
}

function psInstall(id){
  const app=PS_DB.find(a=>a.id===id);
  if(!app)return;
  if(PS_INSTALLED.has(id)){
    // Already installed → open it in real tab
    brOpenExternal(app.url);
    Toast.show(`Opening ${app.name} in browser tab ↗`, 'success', 2000);
    return;
  }
  // Animate install
  const btn=document.querySelector(`[onclick*="psInstall('${id}')"]`);
  if(btn){btn.textContent='⏳ Installing…';btn.className='ps-card-btn installing';btn.disabled=true;}
  Toast.show(`Installing ${app.name}…`, 'info', 2000);
  setTimeout(()=>{
    PS_INSTALLED.add(id); psSaveInstalled();
    psUpdateCartCount();
    if(btn){btn.textContent='▶ Open';btn.className='ps-card-btn open';btn.disabled=false;}
    Toast.show(`✅ ${app.name} installed!`, 'success', 3000);
    Notif.push(`${app.name} installed`, `${app.name} by ${app.dev} is ready to use.`, app.ico);
    // Re-render any visible grids
    psRefreshAllGrids();
  }, 1200 + Math.random()*800);
}

function psLaunchApp(app){
  Toast.show(`Launching ${app.name}…`, 'info', 1500);
  brOpenExternal(app.url);
}

function psRefreshAllGrids(){
  // Refresh all rendered cards to reflect new install state
  document.querySelectorAll('.ps-card,.ps-hcard').forEach(card=>{
    const idMatch = card.getAttribute('onclick')?.match(/psOpenDetail\('([^']+)'\)/);
    if(!idMatch)return;
    const app=PS_DB.find(a=>a.id===idMatch[1]);
    if(!app)return;
    const installed=PS_INSTALLED.has(app.id);
    const btn=card.querySelector('.ps-card-btn');
    if(btn){btn.textContent=installed?'▶ Open':'⬇ Install';btn.className='ps-card-btn '+(installed?'open':'install');}
  });
}

function psUpdateCartCount(){
  const cnt=document.getElementById('ps-cart-count');
  if(cnt){cnt.textContent=PS_INSTALLED.size;cnt.style.display='flex';}
}

function brNormalizeUrl(raw) {
  raw = raw.trim();
  if (!raw) return '';
  // Google search if no dot or space
  if (!raw.includes('.') || raw.includes(' '))
    return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
  if (!raw.startsWith('http'))
    return 'https://' + raw;
  return raw;
}

function brIsEmbeddable(url) {
  return BR_EMBEDDABLE.some(e => url.includes(new URL(e.url).hostname));
}

function brGo(raw) {
  const url = brNormalizeUrl(raw);
  if (!url) return;
  const ub = document.getElementById('burl');
  const qs = document.getElementById('br-qs');
  if (ub) ub.value = url;
  if (qs) qs.value = url;
  brHistory = brHistory.slice(0, brHidx + 1);
  brHistory.push(url);
  brHidx = brHistory.length - 1;

  if (brIsEmbeddable(url)) {
    brLoadIframe(url, url);
  } else {
    brShowBlocked(url);
  }
}

function brLoadIframe(url, name) {
  const fr = document.getElementById('bfr');
  const start = document.getElementById('br-start');
  const blocked = document.getElementById('br-blocked');
  if (!fr) return;
  if (start) start.style.display = 'none';
  if (blocked) blocked.style.display = 'none';
  fr.style.display = 'block';
  fr.src = url;
  const ub = document.getElementById('burl');
  if (ub) ub.value = url;
  Toast.show('Loading ' + (name||url), 'info', 1500);
}

function brShowBlocked(url) {
  const fr = document.getElementById('bfr');
  const start = document.getElementById('br-start');
  const blocked = document.getElementById('br-blocked');
  if (fr) fr.style.display = 'none';
  if (start) start.style.display = 'none';
  if (blocked) {
    blocked.style.display = 'flex';
    const msg = document.getElementById('br-blocked-msg');
    if (msg) msg.innerHTML = `<b style="color:#e2e8f0">${_esc(url)}</b><br><br>This site uses <code style="color:#f59e0b">X-Frame-Options</code> or <code style="color:#f59e0b">Content-Security-Policy</code> headers that prevent it from loading inside another page.<br><br>Click the button below to open it in a real browser tab where it will work perfectly.`;
    const btn = document.getElementById('br-open-btn');
    if (btn) btn.onclick = () => brOpenExternal(url);
  }
}

function brShowStart() {
  const fr = document.getElementById('bfr');
  const start = document.getElementById('br-start');
  const blocked = document.getElementById('br-blocked');
  if (fr) fr.style.display = 'none';
  if (blocked) blocked.style.display = 'none';
  if (start) start.style.display = 'block';
}

function brOpenExternal(url) {
  url = brNormalizeUrl(url || document.getElementById('burl')?.value || '');
  if (!url) return;
  window.open(url, '_blank', 'noopener');
  Toast.show('Opened in new browser tab ↗', 'success', 2500);
}

function brBack() {
  if (brHidx > 0) { brHidx--; brGo(brHistory[brHidx]); }
}
function brFwd() {
  if (brHidx < brHistory.length - 1) { brHidx++; brGo(brHistory[brHidx]); }
}
function brReload() {
  const fr = document.getElementById('bfr');
  if (fr && fr.style.display !== 'none') { fr.src = fr.src; }
  else { const ub = document.getElementById('burl'); if (ub?.value) brGo(ub.value); }
}

function wvSearchPkg(q) {
  const cat = document.getElementById('wv-cat-filter')?.value || '';
  let pkgs = WV_PACKAGES;
  if (q) pkgs = pkgs.filter(p => p.name.toLowerCase().includes(q.toLowerCase()) || p.desc.toLowerCase().includes(q.toLowerCase()) || p.apt.includes(q.toLowerCase()));
  if (cat) pkgs = pkgs.filter(p => p.cat === cat);
  wvRenderPackages(pkgs);
}

function wvFilterCat(cat) {
  const q = document.getElementById('wv-search')?.value || '';
  wvSearchPkg(q);
}

function wvInstall(id) {
  const pkg = WV_PACKAGES.find(p => p.id === id);
  if (!pkg) return;
  const installed = State.get('wv_installed', []);
  if (installed.includes(id)) {
    // Launch terminal with package
    wvTab('term');
    setTimeout(() => webvmLaunch(pkg.apt), 300);
    return;
  }
  const btn = document.getElementById('wv-btn-' + id);
  if (btn) { btn.textContent = '⏳ Installing…'; btn.disabled = true; }
  Toast.show(`Installing ${pkg.name}…`, 'info', 1500);

  // Simulate install with progress (real install happens in WebVM terminal)
  let prog = 0;
  const iv = setInterval(() => {
    prog += Math.random() * 20;
    if (prog >= 100) {
      clearInterval(iv);
      installed.push(id);
      State.set('wv_installed', installed);
      if (btn) { btn.textContent = '✓ Installed'; btn.style.background = 'rgba(34,197,94,0.15)'; btn.style.borderColor = 'rgba(34,197,94,0.3)'; btn.style.color = '#22c55e'; btn.disabled = false; }
      Toast.show(`✅ ${pkg.name} installed! Launch Linux Terminal to use it.`, 'success', 4000);
      Notif.push(pkg.name + ' installed', 'Run: ' + pkg.apt, pkg.ico);
      // Open terminal with apt install command ready
      wvTab('term');
      setTimeout(() => webvmLaunch(pkg.apt), 400);
    }
  }, 200);
}

function wvTab(tab) {
  ['wv-pkg','wv-term','wv-about'].forEach(t => {
    const el = document.getElementById(t);
    if (el) el.style.display = 'none';
  });
  document.querySelectorAll('#wv-tab-pkg,#wv-tab-term,#wv-tab-about').forEach(t => t.classList.remove('sel'));
  const el = document.getElementById('wv-' + tab);
  if (el) el.style.display = tab === 'term' ? 'flex' : 'block';
  const tabEl = document.getElementById('wv-tab-' + tab);
  if (tabEl) tabEl.classList.add('sel');
  if (tab === 'term' && !wvInitialized) webvmLaunch();
}

let wvLaunchPkg = null;
function webvmLaunch(pkg) {
  wvLaunchPkg = pkg || null;
  wvTab('term');
  const loading = document.getElementById('wv-loading');
  const frame = document.getElementById('wv-frame');
  const progress = document.getElementById('wv-progress');
  const label = document.getElementById('wv-progress-label');
  if (!frame) return;
  if (wvInitialized) {
    if (pkg && frame.contentWindow) {
      // Try to send command
      try { frame.contentWindow.postMessage({ type: 'command', cmd: `apt install -y ${pkg}\n` }, '*'); } catch(e){}
    }
    return;
  }
  wvInitialized = true;
  if (loading) loading.style.display = 'flex';
  // Simulate loading progress
  let p = 0;
  const iv = setInterval(() => {
    p = Math.min(95, p + Math.random()*8);
    if (progress) progress.style.width = p + '%';
    if (label) label.textContent = Math.round(p) + '%';
  }, 200);

  // Load WebVM iframe (real CheerpX WebVM)
  frame.src = 'https://webvm.io/alpine.html';
  frame.onload = () => {
    clearInterval(iv);
    if (progress) progress.style.width = '100%';
    if (label) label.textContent = '100%';
    setTimeout(() => {
      if (loading) loading.style.display = 'none';
      frame.style.display = 'block';
      Toast.show('🐧 Linux terminal ready!', 'success', 3000);
      if (wvLaunchPkg) Toast.show(`Run: apt install ${wvLaunchPkg}`, 'info', 5000);
    }, 500);
  };
  frame.onerror = () => {
    clearInterval(iv);
    if (loading) loading.innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:32px;margin-bottom:10px">⚠️</div>
        <div style="font-size:13px;font-weight:600;color:#f59e0b;margin-bottom:8px">WebVM blocked by CORS</div>
        <div style="font-size:11px;color:#64748b;margin-bottom:14px;max-width:300px;line-height:1.7">
          WebVM requires HTTPS and specific headers. Open GhaniyOS on a web server or use the external links below.
        </div>
        <a href="https://webvm.io" target="_blank" style="display:inline-block;padding:8px 16px;background:#22c55e;border-radius:8px;color:#fff;text-decoration:none;font-size:12px;font-weight:600;margin:4px">↗ Open WebVM.io</a>
        <a href="https://copy.sh/v86/" target="_blank" style="display:inline-block;padding:8px 16px;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);border-radius:8px;color:#60a5fa;text-decoration:none;font-size:12px;font-weight:600;margin:4px">↗ v86 Linux Emulator</a>
        <a href="https://bellard.org/jslinux/" target="_blank" style="display:inline-block;padding:8px 16px;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);border-radius:8px;color:#60a5fa;text-decoration:none;font-size:12px;font-weight:600;margin:4px">↗ JSLinux</a>
      </div>`;
  };
}

function startEmu(type) {
  const screen = document.getElementById('emu-screen');
  if (!screen) return;
  if (type === 'alpine') {
    screen.innerHTML = `
      <div style="width:100%;background:#0a0a0a;font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px;color:#22c55e;min-height:240px">
        <div id="emu-out"></div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <span style="color:#60a5fa">alpine:~#</span>
          <input id="emu-inp" style="flex:1;background:transparent;border:none;outline:none;color:#22c55e;font-family:inherit;font-size:12px" placeholder="type commands...">
        </div>
      </div>`;
    const lines = ['Alpine Linux v3.19','Welcome to GhaniyOS Alpine Shell','Type: ls, uname, date, echo, help'];
    const out = document.getElementById('emu-out');
    lines.forEach((l,i)=>setTimeout(()=>{const d=document.createElement('div');d.textContent=l;out?.appendChild(d);},i*200));
    const inp = document.getElementById('emu-inp');
    if (inp) inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const cmd = inp.value.trim(); inp.value = '';
      const d = document.createElement('div');
      d.innerHTML = `<span style="color:#60a5fa">alpine:~#</span> ${cmd}`;
      out?.appendChild(d);
      const r = document.createElement('div');
      if (cmd==='ls') r.textContent = 'bin  dev  etc  home  lib  proc  root  tmp  usr  var';
      else if (cmd==='uname -a') r.textContent = 'Linux alpine 6.6.0 #1 SMP GhaniyOS x86_64 Linux';
      else if (cmd==='date') r.textContent = new Date().toString();
      else if (cmd==='whoami') r.textContent = 'root';
      else if (cmd==='echo hello') r.textContent = 'hello';
      else if (cmd==='help') r.textContent = 'ls  uname  date  whoami  echo  cat  pwd  exit';
      else if (cmd==='exit') { screen.innerHTML = `<div style="text-align:center;color:#475569;padding:40px"><div style="font-size:32px">🖥️</div><div style="margin-top:8px">Session ended</div></div>`; return; }
      else r.textContent = `${cmd}: command not found`;
      r.style.color = '#94a3b8';
      out?.appendChild(r);
      out?.scrollTo(0,9e9);
    });
  } else {
    screen.innerHTML = `<div style="text-align:center;color:#f59e0b;padding:24px">
      <div style="font-size:28px;margin-bottom:8px">⚠️</div>
      <div style="font-size:13px">Android-x86 requires ~400MB WASM runtime.</div>
      <div style="font-size:12px;color:#475569;margin-top:8px">For real Android, use the Remote Runtime tab with Waydroid on your PC.<br>Or try the PWA Store for web-native Android-like apps.</div>
      <button onclick="abTab(document.querySelector('.ab-tab'),'ab-pwa');renderPWAGrid()" style="margin-top:14px;padding:8px 16px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);border-radius:8px;color:#22c55e;font-size:12px;cursor:pointer">→ Go to PWA Store</button>
    </div>`;
  }
}

function connectRTC() {
  const url = document.getElementById('rtc-url')?.value?.trim();
  if (!url) { Toast.show('Enter a stream URL first', 'warn'); return; }
  const wrap = document.getElementById('rtc-frame-wrap');
  const frame = document.getElementById('rtc-frame');
  if (wrap && frame) {
    frame.src = url.startsWith('http') ? url : 'http://'+url;
    wrap.style.display = 'block';
    Toast.show('Connecting to '+url, 'info');
  }
}

function handleAPKDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) { document.getElementById('apk-inp').files = e.dataTransfer.files; handleAPKFile({files:[file]}); }
}

function generatePWA(apkName) {
  const appName = apkName.replace('.apk','');
  const pwaCode = `<!DOCTYPE html>\n<html>\n<head>\n  <title>${appName}</title>\n  <meta name="viewport" content="width=device-width">\n  <link rel="manifest" href="manifest.json">\n</head>\n<body style="background:#000;display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif">\n  <div style="text-align:center">\n    <div style="font-size:48px">📱</div>\n    <h2>${appName}</h2>\n    <p>PWA wrapper generated by GhaniyOS Android Bridge</p>\n  </div>\n</body>\n</html>`;
  VFS.write(`/home/user/Downloads/${appName}_pwa.html`, pwaCode);
  Toast.show(`PWA saved to Downloads/${appName}_pwa.html`, 'success');
  OS.open('Notes', {path:`/home/user/Downloads/${appName}_pwa.html`, content: pwaCode});
}
