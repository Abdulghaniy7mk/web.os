<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhaniyOS 2.0 — Horizon</title>
<!-- manifest.json removed: causes CORS null-origin error when opened as file:// -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── CSS VARIABLES ─────────────────────────────────────── */
:root {
  --bg:          #0a0e1a;
  --surface:     #0f1629;
  --surface2:    #141c35;
  --win-bg:      rgba(10,14,26,0.96);
  --win-border:  rgba(59,130,246,0.18);
  --win-shadow:  0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(59,130,246,0.12);
  --header-bg:   rgba(15,22,41,0.98);
  --text:        #e2e8f0;
  --text-dim:    #64748b;
  --text-muted:  #334155;
  --accent:      #3b82f6;
  --accent2:     #8b5cf6;
  --green:       #22c55e;
  --red:         #ef4444;
  --yellow:      #f59e0b;
  --input-bg:    rgba(15,22,41,0.8);
  --font:        'Geist', 'JetBrains Mono', monospace;
  --font-mono:   'JetBrains Mono', monospace;
  --radius:      12px;
  --taskbar-h:   48px;
  --scrollbar-w: 6px;
}
html.light {
  --bg:         #e8edf5;
  --surface:    #f0f4fb;
  --surface2:   #e0e8f5;
  --win-bg:     rgba(240,244,251,0.97);
  --win-border: rgba(59,130,246,0.25);
  --win-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(59,130,246,0.2);
  --header-bg:  rgba(224,232,245,0.98);
  --text:       #1e293b;
  --text-dim:   #64748b;
  --text-muted: #94a3b8;
  --input-bg:   rgba(255,255,255,0.7);
}

/* ── RESET ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;user-select:none}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:13px;
  line-height:1.5;
}
::-webkit-scrollbar{width:var(--scrollbar-w);height:var(--scrollbar-w)}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(100,116,139,0.3);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(100,116,139,0.5)}
button{cursor:pointer;font-family:var(--font)}
input,textarea,select{font-family:var(--font)}

/* ── WALLPAPER / DESKTOP ───────────────────────────────── */
#wallpaper{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 50%, #0d1b40 0%, transparent 60%),
             radial-gradient(ellipse at 80% 20%, #1a0d40 0%, transparent 50%),
             radial-gradient(ellipse at 60% 80%, #0a1628 0%, transparent 60%),
             #080d1a;
  z-index:0;
}
#wallpaper::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 45% 65%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 90%, rgba(255,255,255,0.3) 0%, transparent 100%);
  animation: twinkle 8s ease-in-out infinite alternate;
}
@keyframes twinkle{0%{opacity:.6}100%{opacity:1}}
#desktop{position:fixed;inset:0 0 var(--taskbar-h);z-index:1;overflow:hidden}

/* ── DESKTOP ICONS ─────────────────────────────────────── */
.desktop-icons{
  position:absolute;top:16px;left:16px;
  display:flex;flex-direction:column;gap:6px;
}
.desktop-icon{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 12px;border-radius:10px;cursor:pointer;width:76px;
  transition:background .15s;
}
.desktop-icon:hover{background:rgba(59,130,246,0.15)}
.desktop-icon .di-ico{font-size:32px;line-height:1}
.desktop-icon span{font-size:11px;color:#e2e8f0;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,0.8);word-break:break-word}

/* ── WINDOW MANAGER ────────────────────────────────────── */
#wm{position:fixed;inset:0 0 var(--taskbar-h);z-index:10;pointer-events:none}
.window{
  position:absolute;display:flex;flex-direction:column;
  background:var(--win-bg);
  border:1px solid var(--win-border);
  border-radius:14px;
  box-shadow:var(--win-shadow);
  overflow:hidden;
  pointer-events:all;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  min-width:320px;min-height:240px;
  transition:box-shadow .15s;
}
.window:focus-within{box-shadow:var(--win-shadow),0 0 0 1.5px rgba(59,130,246,0.5)}

/* Window header */
.win-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--header-bg);
  border-bottom:1px solid var(--win-border);
  cursor:move;flex-shrink:0;
  -webkit-app-region:drag;
}
.win-dots{display:flex;gap:7px;flex-shrink:0}
.win-dot{
  width:13px;height:13px;border-radius:50%;cursor:pointer;
  transition:filter .15s, transform .1s;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.win-dot:hover{filter:brightness(1.3);transform:scale(1.1)}
.win-dot.close{background:#ff5f57}
.win-dot.min{background:#febc2e}
.win-dot.max{background:#28c840}
.win-dot::after{
  content:'';position:absolute;opacity:0;transition:opacity .1s;
  font-size:8px;font-weight:700;color:rgba(0,0,0,0.5);
}
.win-dot.close:hover::after{content:'✕';opacity:1}
.win-dot.min:hover::after{content:'–';opacity:1}
.win-dot.max:hover::after{content:'⤢';opacity:1}
.win-title{
  flex:1;font-size:13px;font-weight:500;
  color:var(--text);text-align:center;
  pointer-events:none;letter-spacing:.01em;
}
.win-body{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.resize-handle{
  position:absolute;right:0;bottom:0;
  width:18px;height:18px;cursor:se-resize;
  background:linear-gradient(135deg,transparent 60%,rgba(100,116,139,0.3) 60%);
  border-radius:0 0 14px 0;
}

/* ── TASKBAR ───────────────────────────────────────────── */
#taskbar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--taskbar-h);z-index:100;
  background:rgba(8,13,26,0.85);
  border-top:1px solid rgba(59,130,246,0.15);
  backdrop-filter:blur(24px);
  display:flex;align-items:center;gap:6px;
  padding:0 10px;
}
#start-btn{
  display:flex;align-items:center;gap:7px;
  padding:6px 14px;border-radius:9px;
  background:rgba(59,130,246,0.15);
  border:1px solid rgba(59,130,246,0.25);
  color:var(--text);font-size:13px;font-weight:500;
  cursor:pointer;transition:background .15s, border-color .15s;
  flex-shrink:0;
}
#start-btn:hover{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.4)}
#start-btn .sb-logo{font-size:18px}
#tb-apps{display:flex;gap:4px;flex:1;overflow-x:auto;overflow-y:hidden;padding:0 4px}
#tb-apps::-webkit-scrollbar{height:0}
.tb-btn{
  display:flex;align-items:center;justify-content:center;
  width:38px;height:36px;border-radius:8px;
  font-size:18px;cursor:pointer;
  transition:background .12s, transform .1s;
  border:1px solid transparent;
  position:relative;
}
.tb-btn:hover{background:rgba(255,255,255,0.08);transform:translateY(-1px)}
.tb-btn.active{
  background:rgba(59,130,246,0.15);
  border-color:rgba(59,130,246,0.3);
}
.tb-btn.active::after{
  content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:16px;height:2px;background:var(--accent);border-radius:1px;
}
#tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}
#clock{
  text-align:right;font-size:11px;line-height:1.4;
  color:var(--text);padding:4px 8px;
  border-radius:8px;cursor:default;
}
#notif-bell{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;font-size:16px;
  transition:background .12s;position:relative;
}
#notif-bell:hover{background:rgba(255,255,255,0.08)}
#notif-count{
  position:absolute;top:3px;right:3px;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;
  width:16px;height:16px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
}

/* ── START MENU ────────────────────────────────────────── */
#start-menu{
  position:fixed;bottom:var(--taskbar-h);left:10px;
  width:460px;
  background:rgba(10,14,26,0.96);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:16px 16px 4px 4px;
  box-shadow:0 -20px 60px rgba(0,0,0,0.6);
  backdrop-filter:blur(32px);
  z-index:200;
  transform:translateY(10px) scale(0.98);opacity:0;pointer-events:none;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1), opacity .15s;
  padding:16px;
}
#start-menu.open{transform:none;opacity:1;pointer-events:all}
.sm-search-wrap{margin-bottom:14px;position:relative}
#sm-q{
  width:100%;padding:10px 14px 10px 38px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:10px;color:var(--text);
  font-size:13px;font-family:var(--font);
  outline:none;transition:border-color .15s;
}
#sm-q:focus{border-color:rgba(59,130,246,0.5)}
.sm-search-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;pointer-events:none;opacity:.5;
}
.sm-label{font-size:11px;color:var(--text-dim);margin:0 0 8px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
#app-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:6px;
  margin-bottom:14px;
}
#all-app-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.app-cell{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:10px 4px;border-radius:10px;cursor:pointer;
  transition:background .12s, transform .1s;
}
.app-cell:hover{background:rgba(59,130,246,0.12);transform:translateY(-1px)}
.app-cell .icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.app-cell span{font-size:10px;color:var(--text-dim);text-align:center}
.sm-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;border-top:1px solid rgba(255,255,255,0.06);
}
.sm-user{display:flex;align-items:center;gap:8px}
.sm-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;
}
#sm-username{font-size:13px;font-weight:500}
.sm-actions{display:flex;gap:6px}
.sm-act-btn{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,0.06);border:none;
  color:var(--text);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .12s;
}
.sm-act-btn:hover{background:rgba(255,255,255,0.12)}

/* ── NOTIFICATION PANEL ────────────────────────────────── */
#notif-panel{
  position:fixed;bottom:var(--taskbar-h);right:10px;
  width:320px;max-height:480px;overflow-y:auto;
  background:rgba(10,14,26,0.96);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:16px 16px 4px 4px;
  box-shadow:0 -20px 60px rgba(0,0,0,0.6);
  backdrop-filter:blur(32px);z-index:200;
  transform:translateY(10px);opacity:0;pointer-events:none;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1), opacity .15s;
  padding:14px;
}
#notif-panel.open{transform:none;opacity:1;pointer-events:all}
.notif-panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.notif-panel-hdr span{font-size:13px;font-weight:600}
.notif-clear{
  font-size:11px;color:var(--accent);cursor:pointer;
  background:none;border:none;padding:0;
}
.notif-card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;padding:10px 12px;margin-bottom:8px;
}
.notif-title{font-size:12px;font-weight:600;margin-bottom:2px}
.notif-body{font-size:11px;color:var(--text-dim)}

/* ── TOAST ─────────────────────────────────────────────── */
#toast-container{
  position:fixed;bottom:calc(var(--taskbar-h)+14px);right:14px;
  display:flex;flex-direction:column-reverse;gap:8px;z-index:999;
  pointer-events:none;
}
.toast{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:rgba(15,22,41,0.96);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  backdrop-filter:blur(16px);
  font-size:12px;font-weight:500;
  animation:toast-in .25s cubic-bezier(.34,1.56,.64,1);
  max-width:320px;
}
@keyframes toast-in{from{transform:translateX(20px);opacity:0}}
.toast-icon{font-size:14px}

/* ── CONTEXT MENU ──────────────────────────────────────── */
#ctx-menu{
  position:fixed;z-index:500;
  background:rgba(10,14,26,0.97);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:10px;
  box-shadow:0 16px 48px rgba(0,0,0,0.5);
  backdrop-filter:blur(20px);
  min-width:180px;padding:4px;
  display:none;
}
.ctx-item{
  padding:8px 14px;border-radius:7px;cursor:pointer;
  font-size:12px;transition:background .1s;
}
.ctx-item:hover{background:rgba(59,130,246,0.15)}
.ctx-divider{height:1px;background:rgba(255,255,255,0.07);margin:4px 6px}

/* ── TERMINAL ──────────────────────────────────────────── */
.term-wrap{
  display:flex;flex-direction:column;height:100%;
  background:#080d17;font-family:var(--font-mono);
}
.term-output{
  flex:1;overflow-y:auto;
  padding:12px 16px 4px;
  font-size:12.5px;line-height:1.6;
  word-break:break-word;
}
.term-output div{min-height:1em}
.term-input-row{
  display:flex;align-items:center;
  padding:5px 12px 8px;
  border-top:1px solid rgba(59,130,246,0.12);
  gap:6px;background:#060b14;
}
.term-prompt{white-space:nowrap;user-select:none;font-size:12px}
.term-inp{
  flex:1;background:transparent;border:none;outline:none;
  color:#e2e8f0;font-family:var(--font-mono);font-size:12.5px;
  caret-color:#a78bfa;
}

/* ── FILE MANAGER ──────────────────────────────────────── */
.fm-wrap{display:flex;flex-direction:column;height:100%}
.fm-toolbar{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;border-bottom:1px solid var(--win-border);
  flex-shrink:0;flex-wrap:wrap;
  background:var(--header-bg);
}
.fm-toolbar button{
  padding:5px 10px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);border-radius:7px;
  color:var(--text);font-size:11px;transition:background .12s;
}
.fm-toolbar button:hover{background:rgba(59,130,246,0.15)}
.fm-path{
  display:flex;align-items:center;flex:1;
  font-size:11px;padding:4px 8px;
  background:rgba(0,0,0,0.2);border-radius:6px;
  overflow:hidden;white-space:nowrap;
}
.fm-body{display:flex;flex:1;overflow:hidden}
.fm-sidebar{
  width:150px;flex-shrink:0;
  border-right:1px solid var(--win-border);
  overflow-y:auto;padding:8px;
}
.fm-sidebar-item{
  padding:7px 10px;border-radius:7px;cursor:pointer;
  font-size:12px;color:var(--text-dim);
  transition:background .1s, color .1s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fm-sidebar-item:hover{background:rgba(59,130,246,0.12);color:var(--text)}
.fm-files{
  flex:1;overflow-y:auto;padding:12px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:8px;align-content:start;
}
.fm-item{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:10px 6px;border-radius:9px;cursor:pointer;
  transition:background .12s;text-align:center;
}
.fm-item:hover{background:rgba(59,130,246,0.12)}
.fm-item.selected{background:rgba(59,130,246,0.2);outline:1px solid rgba(59,130,246,0.4)}
.ficon{font-size:30px;line-height:1}
.fm-item span{
  font-size:10px;color:var(--text-dim);
  word-break:break-all;max-width:72px;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
}

/* ── NOTES / EDITOR ────────────────────────────────────── */
.note-wrap{display:flex;flex-direction:column;height:100%}
.note-toolbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-bottom:1px solid var(--win-border);
  flex-shrink:0;background:var(--header-bg);flex-wrap:wrap;
}
.note-toolbar button,.note-toolbar select,.note-toolbar input{
  padding:5px 10px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);border-radius:7px;
  color:var(--text);font-size:11px;cursor:pointer;
}
.note-area{
  flex:1;padding:16px;
  background:var(--win-bg);color:var(--text);
  border:none;outline:none;resize:none;
  font-size:14px;line-height:1.7;
  font-family:var(--font-mono);
  user-select:text;-webkit-user-select:text;
}
.note-area::selection{background:rgba(59,130,246,0.3)}

/* ── BROWSER ───────────────────────────────────────────── */
.browser-wrap{display:flex;flex-direction:column;height:100%}
.browser-bar{
  display:flex;align-items:center;gap:6px;
  padding:8px 10px;border-bottom:1px solid var(--win-border);
  background:var(--header-bg);flex-shrink:0;
}
.browser-bar button{
  padding:5px 10px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);border-radius:7px;
  color:var(--text);font-size:12px;flex-shrink:0;transition:background .1s;
}
.browser-bar button:hover{background:rgba(59,130,246,0.15)}
.browser-url{
  flex:1;padding:7px 12px;
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;color:var(--text);
  font-size:12px;outline:none;
  transition:border-color .15s;
}
.browser-url:focus{border-color:rgba(59,130,246,0.4)}
.browser-frame{flex:1;border:none;background:#fff}

/* ── CALCULATOR ────────────────────────────────────────── */
.calc-wrap{
  display:flex;flex-direction:column;height:100%;
  background:#0a0e1a;padding:16px;gap:12px;
}
.calc-display{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:16px 20px;
}
.calc-expr{font-size:13px;color:var(--text-dim);min-height:1.4em;text-align:right}
.calc-val{font-size:36px;font-weight:300;text-align:right;color:var(--text);letter-spacing:-.02em}
.calc-btns{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1;
}
.cb{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;color:var(--text);
  font-size:18px;font-weight:400;
  transition:background .1s, transform .08s;
  aspect-ratio:1;
}
.cb:hover{background:rgba(255,255,255,0.12);transform:scale(0.97)}
.cb:active{transform:scale(0.93)}
.cb.op{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.3);color:var(--accent)}
.cb.op:hover{background:rgba(59,130,246,0.25)}
.cb.eq{background:var(--accent);border-color:var(--accent);color:#fff}
.cb.eq:hover{background:#2563eb}
.cb.ac{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:var(--red)}

/* ── PAINT ─────────────────────────────────────────────── */
.paint-wrap{display:flex;flex-direction:column;height:100%}
.paint-toolbar{
  display:flex;align-items:center;gap:10px;

<script>
'use strict';

// ── 1. PERSISTENT STATE ────────────────────────────────────────────
const State = {
  _data: {},
  load() {
    try { this._data = JSON.parse(localStorage.getItem('ghaniyos2') || '{}'); } catch { this._data = {}; }
  },
  save() { try { localStorage.setItem('ghaniyos2', JSON.stringify(this._data)); } catch{} },
  get(k, def) { return this._data[k] !== undefined ? this._data[k] : def; },
  set(k, v) { this._data[k] = v; this.save(); }
};
State.load();

// ── 2. VIRTUAL FILE SYSTEM ─────────────────────────────────────────
const VFS = (() => {
  const DEFAULT = {
    'home': { 'user': {
      'Documents': {
        'Welcome.txt': 'Welcome to GhaniyOS 2.0!\nTry the terminal: apt install neofetch && neofetch\nOr clone a repo: git clone https://github.com/vercel/hyper.git',
        'readme.md': '# GhaniyOS 2.0\nA modern browser-based desktop OS.\n\n## Features\n- Window Manager\n- Real Terminal with Shell Interpreter\n- Virtual File System\n- Real git clone from GitHub\n- .sh script execution\n- And more!',
        'hello.sh': '#!/bin/bash\n# Hello World script\nNAME="GhaniyOS"\necho "Hello from $NAME!"\nfor i in 1 2 3 4 5; do\n  echo "Count: $i"\ndone\necho "Script done!"'
      },
      'Downloads': {},
      'Pictures': { 'wallpaper_info.txt': 'Change wallpaper via Settings → Appearance' },
      'Music': {}, 'Videos': {},
      'Desktop': { 'notes.txt': 'My desktop notes.' },
      'scripts': {
        'setup.sh': '#!/bin/bash\necho "Setting up GhaniyOS..."\napt update\napt install neofetch htop cowsay -y\necho "Done! Run: neofetch"',
        'backup.sh': '#!/bin/bash\nDATE=$(date)\necho "Backup started: $DATE"\nmkdir -p /home/user/Backups\ncp /home/user/Documents/readme.md /home/user/Backups/readme_backup.md\necho "Backup complete!"'
      }
    }},
    'bin': { 'bash': '[binary]', 'ls': '[binary]', 'cat': '[binary]', 'sh': '[binary]' },
    'etc': { 'hostname': 'ghaniyos', 'os-release': 'NAME="GhaniyOS"\nVERSION="2.0 (Horizon)"\nID=ghaniyos' },
    'usr': { 'bin': {}, 'local': { 'bin': {} } },
    'tmp': {}, 'var': { 'log': { 'syslog': 'GhaniyOS boot log\nAll systems OK.' } },
    'Trash': {}
  };

  let fs = State.get('vfs', null);
  if (!fs) { fs = JSON.parse(JSON.stringify(DEFAULT)); State.set('vfs', fs); }

  function resolve(path) {
    const parts = (path||'').replace(/^\/+/, '').split('/').filter(Boolean);
    let node = fs;
    for (const p of parts) {
      if (typeof node !== 'object' || node === null || !(p in node)) return null;
      node = node[p];
    }
    return node;
  }
  function resolveParts(path) {
    const parts = (path||'').replace(/^\/+/, '').split('/').filter(Boolean);
    return { parts, parent: parts.slice(0,-1).join('/'), name: parts[parts.length-1] };
  }
  function parentNode(path) {
    const { parent } = resolveParts(path);
    return parent ? resolve(parent) : fs;
  }

  return {
    get fs() { return fs; },
    save() { State.set('vfs', fs); },
    list(path) {
      const node = resolve(path||'');
      if (!node || typeof node !== 'object') return [];
      return Object.keys(node).map(name => ({
        name, isDir: typeof node[name] === 'object' && node[name] !== null,
        size: typeof node[name] === 'string' ? node[name].length : 0,
        mtime: Date.now()
      }));
    },
    read(path) { const v = resolve(path); return typeof v === 'string' ? v : null; },
    write(path, content) {
      const { name } = resolveParts(path);
      if (!name) return false;
      const parent = parentNode(path);
      if (!parent || typeof parent !== 'object') {
        // Auto-create parent dirs
        const parts = (path||'').replace(/^\/+/,'').split('/').filter(Boolean);
        let cur = fs;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
          cur = cur[parts[i]];
        }
        cur[parts[parts.length-1]] = content;
        this.save(); return true;
      }
      parent[name] = content; this.save(); return true;
    },
    mkdir(path) {
      const { name } = resolveParts(path);
      if (!name) return false;
      // Auto-create all parent dirs
      const parts = (path||'').replace(/^\/+/,'').split('/').filter(Boolean);
      let cur = fs;
      for (const p of parts) {
        if (!cur[p] || typeof cur[p] !== 'object') cur[p] = {};
        cur = cur[p];
      }
      this.save(); return true;
    },
    exists(path) { return resolve(path) !== null; },
    isDir(path) { const v = resolve(path); return v !== null && typeof v === 'object'; },
    isFile(path) { return typeof resolve(path) === 'string'; },
    delete(path) {
      const { name } = resolveParts(path);
      const parent = parentNode(path);
      if (!parent || !(name in parent)) return false;
      delete parent[name]; this.save(); return true;
    },
    trash(path) {
      const { name } = resolveParts(path);
      const parent = parentNode(path);
      if (!parent || !(name in parent)) return false;
      fs['Trash'][name + '_' + Date.now()] = parent[name];
      delete parent[name]; this.save(); return true;
    },
    restore(trashName) {
      if (!fs['Trash'] || !fs['Trash'][trashName]) return false;
      const origName = trashName.replace(/_\d+$/, '');
      if (!fs.home) fs.home = {};
      if (!fs.home.user) fs.home.user = {};
      if (!fs.home.user.Desktop) fs.home.user.Desktop = {};
      fs.home.user.Desktop[origName] = fs['Trash'][trashName];
      delete fs['Trash'][trashName]; this.save(); return true;
    },
    copy(src, dest) {
      const val = resolve(src);
      if (val === null) return false;
      const { name } = resolveParts(dest);
      const parent = parentNode(dest);
      if (!parent) return false;
      parent[name] = typeof val === 'object' ? JSON.parse(JSON.stringify(val)) : val;
      this.save(); return true;
    },
    move(src, dest) { if (!this.copy(src,dest)) return false; return this.delete(src); },
    rename(path, newName) {
      const { parent } = resolveParts(path);
      return this.move(path, (parent ? '/'+parent+'/' : '/')+newName);
    }
  };
})();

const WM = (() => {
  let zTop=100, wins=[];

  function make(id, title, icon, width, height, content) {
    const existing = wins.find(w => w.id === id);
    if (existing) { existing.el.style.zIndex = ++zTop; if(existing.minimized){existing.minimized=false;existing.el.style.display='flex';} updateTaskbar(); return existing; }

    const el = document.createElement('div');
    el.className = 'window';
    el.id = 'win-' + id;
    const x = 80 + (wins.length % 8) * 30, y = 60 + (wins.length % 5) * 28;
    el.style.cssText = `left:${x}px;top:${y}px;width:${width}px;height:${height}px;z-index:${++zTop}`;
    el.innerHTML = `
      <div class="win-header">
        <div class="win-dots">
          <div class="win-dot close" onclick="WM.close('${id}')"></div>
          <div class="win-dot min" onclick="WM.minimize('${id}')"></div>
          <div class="win-dot max" onclick="WM.maximize('${id}')"></div>
        </div>
        <div class="win-title">${icon} ${title}</div>
      </div>
      <div class="win-body" id="wb-${id}">${content}</div>
      <div class="resize-handle" id="rh-${id}"></div>`;

    document.getElementById('wm').appendChild(el);
    const w = { id, title, icon, el, minimized:false, maximized:false, origRect:null };
    wins.push(w);
    _makeDraggable(el, el.querySelector('.win-header'));
    _makeResizable(el, document.getElementById('rh-'+id));
    _focus(el);
    updateTaskbar();
    return w;
  }

  function close(id) {
    const idx = wins.findIndex(w => w.id === id);
    if (idx === -1) return;
    wins[idx].el.remove(); wins.splice(idx,1); updateTaskbar();
  }

  function minimize(id) {
    const w = wins.find(w => w.id === id);
    if (!w) return;
    w.minimized = !w.minimized;
    w.el.style.display = w.minimized ? 'none' : 'flex';
    updateTaskbar();
  }

  function maximize(id) {
    const w = wins.find(w => w.id === id);
    if (!w) return;
    if (!w.maximized) {
      w.origRect = { left:w.el.style.left, top:w.el.style.top, width:w.el.style.width, height:w.el.style.height };
      w.el.style.left='0'; w.el.style.top='0';
      w.el.style.width='100vw'; w.el.style.height='calc(100vh - var(--taskbar-h))';
      w.maximized = true;
    } else {
      const r = w.origRect;
      w.el.style.left=r.left; w.el.style.top=r.top;
      w.el.style.width=r.width; w.el.style.height=r.height;
      w.maximized = false;
    }
  }

  function _focus(el) {
    el.style.zIndex = ++zTop;
    document.querySelectorAll('.window').forEach(w => w.style.outline='');
    el.style.outline = '1.5px solid rgba(59,130,246,0.5)';
  }

  function updateTaskbar() {
    const tb = document.getElementById('tb-apps');
    if (!tb) return;
    tb.innerHTML = '';
    wins.forEach(w => {
      const btn = document.createElement('div');
      btn.className = 'tb-btn' + (w.minimized ? '' : ' active');
      btn.title = w.title; btn.innerHTML = w.icon;
      btn.onclick = () => {
        if (w.minimized) { w.minimized=false; w.el.style.display='flex'; _focus(w.el); }
        else if (parseInt(w.el.style.zIndex) === zTop) { w.minimized=true; w.el.style.display='none'; }
        else _focus(w.el);
        updateTaskbar();
      };
      tb.appendChild(btn);
    });
  }

  function _makeDraggable(el, handle) {
    let ox, oy, sx, sy;
    handle.addEventListener('mousedown', e => {
      if (e.target.classList.contains('win-dot')) return;
      const w = wins.find(w => w.id === el.id.replace('win-',''));
      if (w && w.maximized) return;
      _focus(el);
      sx = parseInt(el.style.left)||0; sy = parseInt(el.style.top)||0;
      ox = e.clientX; oy = e.clientY;
      const mm = e2 => { el.style.left = sx+e2.clientX-ox+'px'; el.style.top = Math.max(0,sy+e2.clientY-oy)+'px'; };
      const mu = () => { document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
      document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
      e.preventDefault();
    });
  }

  function _makeResizable(el, handle) {
    if (!handle) return;
    handle.addEventListener('mousedown', e => {
      const ow=parseInt(el.style.width), oh=parseInt(el.style.height), ox=e.clientX, oy=e.clientY;
      const mm = e2 => { el.style.width=Math.max(320,ow+e2.clientX-ox)+'px'; el.style.height=Math.max(220,oh+e2.clientY-oy)+'px'; };
      const mu = () => { document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
      document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
      e.preventDefault();
    });
  }

  return { make, close, minimize, maximize, focus:_focus, get wins(){return wins;}, updateTaskbar };
})();

function _esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function _termResolve(s, arg) {
  if (!arg) return s.cwd;
  if (arg.startsWith('/')) return arg;
  if (arg === '~') return '/home/user';
  if (arg === '.') return s.cwd;
  const parts = arg.split('/');
  let cur = s.cwd;
  for (const p of parts) {
    if (!p || p==='.') continue;
    if (p==='..') { const pp=cur.split('/').filter(Boolean); pp.pop(); cur='/'+pp.join('/')||'/'; }
    else cur = cur.replace(/\/$/,'')+'/'+p;
  }
  return cur;
}
function _syntaxHL(line) {
  return _esc(line)
    .replace(/\b(if|then|else|fi|for|do|done|while|case|esac|function|return|exit|echo|export|source|local)\b/g,'<span style="color:#c084fc">$1</span>')
    .replace(/\b(const|let|var|function|return|import|export|from|async|await|class|new)\b/g,'<span style="color:#60a5fa">$1</span>')
    .replace(/(["'`])[^"'`]*?\1/g,'<span style="color:#86efac">$&</span>')
    .replace(/(#.*$)/g,'<span style="color:#6b7280;font-style:italic">$1</span>')
    .replace(/\b(\d+)\b/g,'<span style="color:#fb923c">$1</span>');
}

// Shell Script Interpreter
class ShellInterpreter {
  constructor(session, execFn, printFn) {
    this.session = session;
    this._exec  = execFn;
    this._print = printFn;
    this.vars   = { ...session.env };
    this.functions = {};
    this.exitCode  = 0;
  }
  expand(str) {
    if (!str) return '';
    str = str.replace(/\$\(([^)]+)\)/g, (_,cmd) => this._exec(cmd).trim());
    str = str.replace(/\$\{(\w+)\}/g, (_,k) => this.vars[k]??'');
    str = str.replace(/\$(\w+)/g, (_,k) => this.vars[k]??'');
    return str;
  }
  evalArith(expr) {
    try { const safe=expr.replace(/\b([a-zA-Z_]\w*)\b/g,(_,k)=>this.vars[k]||'0'); return Function('"use strict";return ('+safe+')')(); } catch { return 0; }
  }
  evalCond(parts) {
    const inner = parts.filter(p=>p!=='['&&p!==']'&&p!=='[['&&p!==']]');
    if (!inner.length) return false;
    if (inner[0]==='-f') return VFS.isFile ? VFS.isFile(_termResolve(this.session,this.expand(inner[1]))) : false;
    if (inner[0]==='-d') return VFS.isDir(_termResolve(this.session,this.expand(inner[1])));
    if (inner[0]==='-e') return VFS.exists(_termResolve(this.session,this.expand(inner[1])));
    if (inner[0]==='-z') return !this.expand(inner[1]);
    if (inner[0]==='-n') return !!this.expand(inner[1]);
    const left=this.expand(inner[0]), op=inner[1], right=this.expand(inner[2]);
    if (op==='='||op==='==') return left===right;
    if (op==='!='||op==='<>') return left!==right;
    if (op==='-eq') return Number(left)===Number(right);
    if (op==='-ne') return Number(left)!==Number(right);
    if (op==='-lt') return Number(left)<Number(right);
    if (op==='-le') return Number(left)<=Number(right);
    if (op==='-gt') return Number(left)>Number(right);
    if (op==='-ge') return Number(left)>=Number(right);
    return !!left;
  }
  async runLines(lines) {
    let i = 0;
    while (i < lines.length) {
      const raw = lines[i].trim(); i++;
      if (!raw || raw.startsWith('#')) continue;
      // Function declaration
      const fnMatch = raw.match(/^(\w+)\s*\(\s*\)\s*\{?\s*$/) || raw.match(/^function\s+(\w+)\s*\{?\s*$/);
      if (fnMatch) {
        const name=fnMatch[1], body=[];
        while(i<lines.length){const bl=lines[i].trim();i++;if(bl==='}')break;body.push(bl);}
        this.functions[name]=body; continue;
      }
      // if/elif/else/fi
      if (raw.startsWith('if ')) {
        const block={cond:raw.slice(3).replace(/;\s*then\s*$/,'').trim(),then:[],elseifs:[],elsePart:[]};
        let state='then';
        while(i<lines.length){const bl=lines[i].trim();i++;
          if(bl==='fi')break;
          if(bl.startsWith('elif ')){block.elseifs.push({cond:bl.slice(5).replace(/;\s*then\s*$/,'').trim(),body:[]});state='elif';}
          else if(bl==='else'){state='else';}
          else if(bl==='then'||bl.endsWith('; then')){}
          else{if(state==='then')block.then.push(bl);else if(state==='else')block.elsePart.push(bl);else if(state==='elif')block.elseifs[block.elseifs.length-1].body.push(bl);}
        }
        const cp=block.cond.replace(/^\[\[?\s*/,'').replace(/\s*\]\]?$/,'').split(/\s+/);
        let ran=false;
        if(this.evalCond(cp)){await this.runLines(block.then);ran=true;}
        if(!ran){for(const ei of block.elseifs){const ep=ei.cond.replace(/^\[\[?\s*/,'').replace(/\s*\]\]?$/,'').split(/\s+/);if(this.evalCond(ep)){await this.runLines(ei.body);ran=true;break;}}}
        if(!ran&&block.elsePart.length)await this.runLines(block.elsePart);
        continue;
      }
      // for loop
      const forMatch=raw.match(/^for\s+(\w+)\s+in\s+(.+?)(?:;\s*do)?$/);
      if(forMatch){
        const vn=forMatch[1],items=this.expand(forMatch[2]).split(/\s+/).filter(Boolean),body=[];
        while(i<lines.length){const bl=lines[i].trim();i++;if(bl==='done')break;if(bl!=='do')body.push(bl);}
        for(const item of items){this.vars[vn]=item;await this.runLines(body);}
        continue;
      }
      // while loop
      const wm=raw.match(/^while\s+(.+?)(?:;\s*do)?$/);
      if(wm){
        const cond=wm[1].replace(/^\[\[?\s*/,'').replace(/\s*\]\]?$/,'').split(/\s+/),body=[];
        while(i<lines.length){const bl=lines[i].trim();i++;if(bl==='done')break;if(bl!=='do')body.push(bl);}
        let guard=0;
        while(this.evalCond(cond)&&guard++<500)await this.runLines(body);
        continue;
      }
      // Variable assignment
      const am=raw.match(/^([A-Za-z_]\w*)=(.*)$/);
      if(am&&!raw.includes(' ')){this.vars[am[1]]=this.expand(am[2].replace(/^['"]|['"]$/g,''));this.session.env[am[1]]=this.vars[am[1]];continue;}
      // Pipe
      if(raw.includes(' | ')){
        const cmds=raw.split(' | ').map(s=>s.trim());
        let pipe='';
        for(const cmd of cmds)pipe=this._exec(cmd,pipe).trim();
        if(pipe)this._print(pipe.split('\n').map(_esc).join('<br>'));
        continue;
      }
      // Redirect
      const rm=raw.match(/^(.+?)\s*(>>?)\s*(.+)$/);
      if(rm){
        const out=this._exec(this.expand(rm[1])).trim();
        const fp=_termResolve(this.session,this.expand(rm[3].trim()));
        if(rm[2]==='>>') VFS.write(fp,(VFS.read(fp)||'')+out+'\n');
        else VFS.write(fp,out+'\n');
        continue;
      }
      const result=this._exec(this.expand(raw));
      if(result&&result.trim())this._print(result);
    }
  }
}

    if (el) el.innerHTML = `<span style="color:#a78bfa">ghaniy</span><span style="color:#475569">@</span><span style="color:#22c55e">ghaniyos</span><span style="color:#475569">:</span><span style="color:#60a5fa">${cwd}</span><span style="color:#e2e8f0">$</span>`;
  }

  function _handleKey(e, winId) {
    const s = sessions[winId];
    const inp = e.target;
    if (e.ctrlKey && e.key==='c') { e.preventDefault(); _print(winId,`<span style="color:#475569">^C</span>`); inp.value=''; _prompt(winId); return; }
    if (e.ctrlKey && e.key==='l') { e.preventDefault(); document.getElementById('tout-'+winId).innerHTML=''; return; }
    if (e.key==='ArrowUp') { e.preventDefault(); if(s.histIdx<s.history.length-1){s.histIdx++;inp.value=s.history[s.history.length-1-s.histIdx];} }
    else if (e.key==='ArrowDown') { e.preventDefault(); if(s.histIdx>0){s.histIdx--;inp.value=s.history[s.history.length-1-s.histIdx];}else{s.histIdx=-1;inp.value='';} }
    else if (e.key==='Tab') { e.preventDefault(); _tabComplete(winId,inp); }
    else if (e.key==='Enter') {
      const raw = inp.value.trim();
      _print(winId, `<span style="color:#4b5563">${_esc(document.getElementById('tpr-'+winId).innerText)}</span> <span style="color:#e2e8f0">${_esc(raw)}</span>`);
      if (raw) { s.history.push(raw); s.histIdx=-1; }
      inp.value = '';
      if (raw) _exec(winId, raw);
      else _prompt(winId);
    }
    setTimeout(()=>document.getElementById('tout-'+winId)?.scrollTo(0,9e9),10);
  }

  function _tabComplete(winId, inp) {
    const s = sessions[winId];
    const val = inp.value, parts = val.split(' '), last = parts[parts.length-1];
    if (parts.length===1) {
      const builtins = ['ls','cd','pwd','cat','echo','touch','mkdir','rm','cp','mv','find','grep','sed','awk','cut','tr','sort','uniq','wc','head','tail','diff','chmod','tree','clear','history','exit','env','export','sh','bash','source','nano','vim','wget','curl','ping','apt','git','node','python3','whoami','uname','date','ps','kill','htop','neofetch','cowsay','figlet','cmatrix','bat','base64','tar','zip','unzip','seq','cal','which','alias'];
      const matches=[...builtins,...PkgRegistry.list()].filter(c=>c.startsWith(last));
      if(matches.length===1){parts[0]=matches[0];inp.value=parts.join(' ')+' ';}
      else if(matches.length>1)_print(winId,matches.join('  '));
    } else {
      const base=last.includes('/')?last.slice(0,last.lastIndexOf('/')+1):'';
      const stub=last.slice(base.length);
      const dir=_termResolve(s,base||s.cwd);
      const items=(VFS.list(dir)||[]).filter(n=>n.name.startsWith(stub));
      if(items.length===1){parts[parts.length-1]=base+items[0].name+(items[0].isDir?'/':'');inp.value=parts.join(' ');}
      else if(items.length>1)_print(winId,items.map(i=>i.name+(i.isDir?'/':'')).join('  '));
    }
  }

  function _execSync(winId, raw, pipeIn='') {
    const captured = [];
    _execCore(winId, raw, pipeIn, html=>captured.push(html.replace(/<[^>]+>/g,'')), false);
    return captured.join('\n');
  }

  function _exec(winId, raw) {
    const s = sessions[winId];
    const fw = raw.split(' ')[0];
    if (s.aliases[fw]) { raw = s.aliases[fw] + raw.slice(fw.length); }
    if (raw.includes('; ') || (raw.includes(';')&&!raw.includes('for')&&!raw.includes('if'))) {
      const cmds = raw.split(';').map(c=>c.trim()).filter(Boolean);
      for(const cmd of cmds) _exec(winId,cmd); return;
    }
    if (raw.includes(' && ')) { const cmds=raw.split(' && ').map(c=>c.trim()); for(const cmd of cmds){_exec(winId,cmd);if(sessions[winId]._lastExit!==0)break;} return; }
    if (raw.includes(' | ')) {
      const cmds=raw.split(' | ').map(c=>c.trim());
      let pipe='';
      for(const cmd of cmds) pipe=_execSync(winId,cmd,pipe);
      if(pipe.trim())_print(winId,pipe.split('\n').map(_esc).join('<br>'));
      _prompt(winId); return;
    }
    _execCore(winId, raw, '', html=>_print(winId,html), true);
  }

  function _execCore(winId, raw, pipeIn, emit, doPrompt) {
    const s = sessions[winId];
    const tokens = _tokenize(s, raw);
    const [cmd, ...args] = tokens;

    const ok   = t => emit(`<span style="color:#94a3b8">${_esc(String(t))}</span>`);
    const err  = t => emit(`<span style="color:#ef4444">${_esc(cmd)}: ${_esc(String(t))}</span>`);
    const suc  = t => emit(`<span style="color:#22c55e">${_esc(String(t))}</span>`);
    const inf  = t => emit(`<span style="color:#60a5fa">${t}</span>`);

    if (!cmd) { if(doPrompt)_prompt(winId); return; }

    switch(cmd) {
      case 'help':
        inf(`<b>Commands</b><br>
<span style="color:#f59e0b">Nav :</span> ls, cd, pwd, tree, pushd, popd<br>
<span style="color:#f59e0b">Files:</span> cat, head, tail, touch, mkdir, rm, cp, mv, find, grep, sed, awk, wc, diff, chmod<br>
<span style="color:#f59e0b">Text :</span> echo, grep, sed, awk, cut, tr, sort, uniq, tee, base64<br>
<span style="color:#f59e0b">Sys  :</span> whoami, uname, uptime, ps, kill, env, export, alias, which<br>
<span style="color:#f59e0b">Net  :</span> ping, curl, wget, ifconfig, netstat, traceroute<br>
<span style="color:#f59e0b">Pkg  :</span> apt, npm, pip<br>
<span style="color:#f59e0b">Dev  :</span> git, node, python3, sh, bash, make, gcc<br>
<span style="color:#f59e0b">Misc :</span> clear, date, cal, history, sleep, seq, tar, zip<br>
<span style="color:#64748b">Ctrl+C interrupt · Ctrl+L clear · Tab autocomplete · ↑↓ history</span>`);
        break;

      case 'ls': {
        const flags=args.filter(a=>a.startsWith('-'));
        const pathArg=args.find(a=>!a.startsWith('-'));
        const path=_termResolve(s,pathArg);
        const items=VFS.list(path);
        if(!items||(!items.length&&!VFS.isDir(path))){err(`cannot access '${pathArg||path}': No such file or directory`);break;}
        if(!items.length){ok('(empty)');break;}
        const long=flags.some(f=>f.includes('l'));
        const all=flags.some(f=>f.includes('a'));
        const list=all?items:items.filter(i=>!i.name.startsWith('.'));
        if(long){list.forEach(i=>emit(`<span style="color:#475569">${i.isDir?'d':'-'}rwxr-xr-x 1 ghaniy ghaniy ${String(i.size||0).padStart(6)} Jan 01 </span>${i.isDir?`<span style="color:#60a5fa;font-weight:bold">${_esc(i.name)}/</span>`:`<span style="color:#e2e8f0">${_esc(i.name)}</span>`}`));}
        else{emit(list.map(i=>i.isDir?`<span style="color:#60a5fa;font-weight:bold">${_esc(i.name)}/</span>`:`<span style="color:#e2e8f0">${_esc(i.name)}</span>`).join('  '));}
        break;
      }
      case 'cd': {
        const p=_termResolve(s,args[0]||s.env.HOME);
        if(!VFS.isDir(p)){err(`cd: ${args[0]||p}: No such file or directory`);break;}
        s.env.OLDPWD=s.cwd; s.cwd=p; s.env.PWD=p; break;
      }
      case 'pwd': ok(s.cwd); break;
      case 'cat': {
        if(pipeIn){ok(pipeIn);break;}
        if(!args.length){err('missing operand');break;}
        const results=[];
        args.filter(a=>!a.startsWith('-')).forEach(a=>{
          const c=VFS.read(_termResolve(s,a));
          if(c===null)err(`cat: ${a}: No such file or directory`);
          else results.push(c);
        });
        if(results.length)ok(results.join('\n'));
        break;
      }
      case 'head': {
        const n=parseInt(args.find((_,i)=>args[i-1]==='-n')||args.find(a=>a.match(/^-\d+$/))?.slice(1)||'10');
        const fn=args.find(a=>!a.startsWith('-'));
        const src=fn?(VFS.read(_termResolve(s,fn))):pipeIn;
        if(src===null){err(`head: ${fn}: No such file`);break;}
        ok((src||'').split('\n').slice(0,n).join('\n')); break;
      }
      case 'tail': {
        const n=parseInt(args.find((_,i)=>args[i-1]==='-n')||'10');
        const fn=args.find(a=>!a.startsWith('-'));
        const src=fn?(VFS.read(_termResolve(s,fn))):pipeIn;
        if(src===null){err(`tail: ${fn}: No such file`);break;}
        ok((src||'').split('\n').slice(-n).join('\n')); break;
      }
      case 'touch': args.filter(a=>!a.startsWith('-')).forEach(a=>VFS.write(_termResolve(s,a),VFS.read(_termResolve(s,a))||'')); break;
      case 'mkdir': args.filter(a=>!a.startsWith('-')).forEach(a=>{VFS.mkdir(_termResolve(s,a));suc(`mkdir: created directory '${a}'`);}); break;
      case 'rm': {
        const force=args.some(a=>a.includes('f'));
        args.filter(a=>!a.startsWith('-')).forEach(a=>{
          const p=_termResolve(s,a);
          if(!VFS.exists(p)&&!force){err(`rm: cannot remove '${a}': No such file or directory`);return;}
          VFS.trash(p);
        }); break;
      }
      case 'rmdir': args.filter(a=>!a.startsWith('-')).forEach(a=>VFS.trash(_termResolve(s,a))); break;
      case 'cp': {
        const [src,dst]=args.filter(a=>!a.startsWith('-'));
        if(!src||!dst){err('missing operand');break;}
        if(!VFS.exists(_termResolve(s,src))){err(`cp: cannot stat '${src}': No such file`);break;}
        VFS.copy(_termResolve(s,src),_termResolve(s,dst)); break;
      }
      case 'mv': {
        const [src,dst]=args.filter(a=>!a.startsWith('-'));
        if(!src||!dst){err('missing operand');break;}
        VFS.move(_termResolve(s,src),_termResolve(s,dst)); break;
      }
      case 'find': {
        const where=_termResolve(s,args.find(a=>!a.startsWith('-'))||'.');
        const ni=args.findIndex(a=>a==='-name'),pat=ni>=0?args[ni+1]:null;
        function wf(p){(VFS.list(p)||[]).forEach(i=>{const f=p.replace(/\/$/,'')+'/'+i.name;if(!pat||i.name.includes(pat.replace(/\*/g,'')))ok(f);if(i.isDir)wf(f);});}
        wf(where); break;
      }
      case 'grep': {
        const flags=args.filter(a=>a.startsWith('-'));
        const pos=args.filter(a=>!a.startsWith('-'));
        const [pat,...files]=pos;
        if(!pat){err('Usage: grep pattern [file]');break;}
        const ci=flags.some(f=>f.includes('i')), inv=flags.some(f=>f.includes('v')), cnt=flags.some(f=>f.includes('c')), ln=flags.some(f=>f.includes('n'));
        const srcs=files.length?files.map(f=>({name:f,text:VFS.read(_termResolve(s,f))||''})):[{name:'stdin',text:pipeIn||''}];
        let total=0;
        for(const {text} of srcs){
          const re=new RegExp(pat,ci?'gi':'g');
          text.split('\n').forEach((line,idx)=>{
            const match=re.test(line);
            if((match&&!inv)||(!match&&inv)){total++;if(!cnt)emit((ln?`<span style="color:#475569">${idx+1}:</span> `:'')+line.replace(re,`<span style="color:#fbbf24;font-weight:bold">$&</span>`));}
          });
        }
        if(cnt)ok(String(total)); break;
      }
      case 'sed': {
        const script=args.find(a=>!a.startsWith('-')&&a.includes('/'));
        const file=args.filter(a=>!a.startsWith('-')&&!a.includes('/')).pop();
        const src=file?(VFS.read(_termResolve(s,file))||''):pipeIn||'';
        if(!script){err('Usage: sed s/pat/rep/ [file]');break;}
        const m=script.match(/^s([\/|,!])(.+?)\1(.*?)\1([g]?)$/);
        if(m){const re=new RegExp(m[2],m[4]==='g'?'g':'');ok(src.split('\n').map(l=>l.replace(re,m[3])).join('\n'));}
        else err('unrecognized sed command'); break;
      }
      case 'awk': {
        const prog=args.find(a=>!a.startsWith('-')&&a.includes('{'));
        const file=args.filter(a=>!a.startsWith('-')&&!a.includes('{')).pop();
        const src=file?(VFS.read(_termResolve(s,file))||''):pipeIn||'';
        if(!prog){err('Usage: awk \'{prog}\' [file]');break;}
        src.split('\n').forEach(line=>{
          const fields=line.split(/\s+/),nf=fields.length;
          const action=prog.replace(/^\{|\}$/g,'');
          let out=action.replace(/\$NF/g,fields[nf-1]||'').replace(/\$(\d+)/g,(_,n)=>fields[Number(n)-1]||'').replace(/NF/g,String(nf));
          if(action.startsWith('print'))ok(out.replace(/^print\s*/,'').trim());
        }); break;
      }
      case 'cut': {
        const di=args.findIndex(a=>a==='-d'),delim=di>=0?args[di+1]:'\t';
        const fi=args.findIndex(a=>a==='-f'),fields=fi>=0?args[fi+1].split(',').map(n=>parseInt(n)-1):[0];
        const file=args.filter(a=>!a.startsWith('-')&&a!==delim&&!a.match(/^\d/)).pop();
        const src=file?(VFS.read(_termResolve(s,file))||''):pipeIn||'';
        src.split('\n').filter(Boolean).forEach(l=>ok(fields.map(i=>l.split(delim)[i]||'').join(delim))); break;
      }
      case 'tr': {
        const [from,to]=args.filter(a=>!a.startsWith('-'));
        if(!from||!to){err('Usage: tr SET1 SET2');break;}
        ok([...(pipeIn||'')].map(c=>{const i=from.indexOf(c);return i>=0?(to[i]||''):c;}).join('')); break;
      }
      case 'sort': {
        const src=pipeIn||(args[0]&&VFS.read(_termResolve(s,args[0]))||'');
        const lines=src.split('\n').filter(Boolean);
        const rev=args.includes('-r'),num=args.includes('-n');
        lines.sort((a,b)=>num?(parseFloat(a)-parseFloat(b)):a.localeCompare(b));
        if(rev)lines.reverse(); ok(lines.join('\n')); break;
      }
      case 'uniq': {
        const src=pipeIn||(args[0]&&VFS.read(_termResolve(s,args[0]))||'');
        const cnt=args.includes('-c'),seen={};
        src.split('\n').filter(Boolean).forEach(l=>{seen[l]=(seen[l]||0)+1;});
        Object.entries(seen).forEach(([l,c])=>ok(cnt?`${String(c).padStart(4)} ${l}`:l)); break;
      }
      case 'wc': {
        const file=args.find(a=>!a.startsWith('-'));
        const src=file?(VFS.read(_termResolve(s,file))||''):pipeIn||'';
        const lines=src.split('\n').length,words=src.split(/\s+/).filter(Boolean).length,chars=src.length;
        if(args.includes('-l'))ok(String(lines));
        else if(args.includes('-w'))ok(String(words));
        else if(args.includes('-c'))ok(String(chars));
        else ok(`${String(lines).padStart(7)} ${String(words).padStart(7)} ${String(chars).padStart(7)}`);
        break;
      }
      case 'diff': {
        const [f1,f2]=args.filter(a=>!a.startsWith('-'));
        if(!f1||!f2){err('diff: missing operand');break;}
        const l1=(VFS.read(_termResolve(s,f1))||'').split('\n');
        const l2=(VFS.read(_termResolve(s,f2))||'').split('\n');
        let hasDiff=false;
        l1.forEach((line,i)=>{if(line!==l2[i]){emit(`<span style="color:#ef4444">- ${_esc(line)}</span>`);emit(`<span style="color:#22c55e">+ ${_esc(l2[i]||'')}</span>`);hasDiff=true;}});
        if(!hasDiff)suc('Files are identical'); break;
      }
      case 'tee': {
        const file=args.find(a=>!a.startsWith('-'));
        if(file){const p=_termResolve(s,file);VFS.write(p,(args.includes('-a')?VFS.read(p)||'':'')+pipeIn+'\n');}
        ok(pipeIn); break;
      }
      case 'xargs': {
        const xcmd=args.join(' ');
        (pipeIn||'').split('\n').filter(Boolean).forEach(item=>{const r=_execSync(winId,`${xcmd} ${item}`);if(r.trim())ok(r);}); break;
      }
      case 'base64': {
        const dec=args.includes('-d')||args.includes('--decode');
        const file=args.find(a=>!a.startsWith('-'));
        const src=file?(VFS.read(_termResolve(s,file))||''):pipeIn||'';
        try{ok(dec?atob(src.trim()):btoa(src));}catch{err('invalid input');} break;
      }
      case 'md5sum': {
        const src=pipeIn||(args[0]&&VFS.read(_termResolve(s,args[0]))||'');
        let h=0;for(const c of src)h=(Math.imul(31,h)+c.charCodeAt(0))|0;
        ok(`${Math.abs(h).toString(16).padStart(32,'0')}  ${args[0]||'-'}`); break;
      }
      case 'echo': {
        const n=args[0]==='-n';
        const text=(n?args.slice(1):args).join(' ').replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\$(\w+)/g,(_,k)=>s.env[k]||'');
        ok(text); break;
      }
      case 'printf': {
        const fmt=args[0]||'',vals=args.slice(1);
        let i=0,out=fmt.replace(/%(s|d|f|x)/g,(_,t)=>{const v=vals[i++]||'';if(t==='d')return parseInt(v)||0;if(t==='f')return parseFloat(v).toFixed(2);if(t==='x')return parseInt(v).toString(16);return v;}).replace(/\\n/g,'\n').replace(/\\t/g,'\t');
        ok(out); break;
      }
      case 'seq': {
        const [a,b]=args.map(Number);
        const from=b===undefined?1:a,to=b===undefined?a:b;
        for(let n=from;n<=to;n++)ok(String(n)); break;
      }
      case 'whoami': ok(s.env.USER||'ghaniy'); break;
      case 'id': ok(`uid=1000(${s.env.USER}) gid=1000(${s.env.USER}) groups=1000,27(sudo)`); break;
      case 'uname': ok(args.includes('-a')?'GhaniyOS 2.0 browser-kernel-2026 x86_64 GNU/Linux':'GhaniyOS'); break;
      case 'hostname': ok('ghaniyos'); break;
      case 'uptime': ok(`up ${Math.floor(performance.now()/3600000)}h ${Math.floor((performance.now()%3600000)/60000)}m,  1 user,  load average: 0.01, 0.00`); break;
      case 'date': ok(new Date().toString()); break;
      case 'cal': {
        const d=new Date(),y=d.getFullYear(),mo=d.getMonth();
        const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
        ok(`    ${months[mo]} ${y}\nSu Mo Tu We Th Fr Sa`);
        let first=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate(),row='   '.repeat(first);
        for(let d2=1;d2<=days;d2++){
          const isToday=d2===d.getDate();
          row+=(isToday?`<b style="color:#f59e0b">${String(d2).padStart(2)}</b>`:String(d2).padStart(2))+' ';
          if((first+d2)%7===0){emit(row);row='';}
        }
        if(row.trim())emit(row); break;
      }
      case 'ps':
        inf(`  PID TTY   STAT  TIME CMD<br>    1 pts/0 Ss    0:00 /sbin/init<br>   42 pts/0 S     0:00 bash<br>   99 pts/0 R+    0:00 ghaniyos-shell`); break;
      case 'kill': ok(`Sent signal to PID ${parseInt(args.find(a=>!a.startsWith('-')))||0}`); break;
      case 'jobs': ok('(no background jobs)'); break;
      case 'env': Object.entries(s.env).forEach(([k,v])=>ok(`${k}=${v}`)); break;
      case 'export': {
        const m=args.join(' ').match(/^(\w+)=(.*)$/);
        if(m){s.env[m[1]]=m[2];suc(`Exported: ${m[1]}`);}
        else if(args[0])suc(`Exported: ${args[0]}`);
        else err('Usage: export KEY=value');
        break;
      }
      case 'unset': args.forEach(k=>delete s.env[k]); break;
      case 'alias': {
        if(!args.length){Object.entries(s.aliases).forEach(([k,v])=>ok(`alias ${k}='${v}'`));break;}
        const m=args.join(' ').match(/^(\w+)='?([^']+)'?$/);
        if(m){s.aliases[m[1]]=m[2];suc(`alias ${m[1]}='${m[2]}'`);}
        break;
      }
      case 'unalias': delete s.aliases[args[0]]; break;
      case 'which': {
        const builtins=['ls','cd','pwd','cat','echo','mkdir','rm','cp','mv','grep','find','sed','awk','sh','bash','git','node','python3','curl','wget','ping','apt','htop','neofetch'];
        ok(builtins.includes(args[0])||PkgRegistry.has(args[0])?`/usr/bin/${args[0]}`:`${args[0]}: not found`); break;
      }
      case 'type': ok(s.aliases[args[0]]?`${args[0]} is aliased to '${s.aliases[args[0]]}'`:PkgRegistry.has(args[0])?`${args[0]} is /usr/bin/${args[0]}`:`${args[0]} is a shell builtin`); break;
      case 'history': s.history.forEach((h,i)=>ok(`${String(i+1).padStart(5)}  ${h}`)); break;
      case 'clear': document.getElementById('tout-'+winId).innerHTML=''; break;
      case 'tree': {
        function dt(path,prefix=''){(VFS.list(path)||[]).forEach((item,i,arr)=>{const last=i===arr.length-1;emit(`<span style="color:#475569">${_esc(prefix+(last?'└── ':'├── '))}</span><span style="color:${item.isDir?'#60a5fa':'#e2e8f0'}">${_esc(item.name)}${item.isDir?'/':''}</span>`);if(item.isDir)dt(path.replace(/\/$/,'')+'/'+item.name,prefix+(last?'    ':'│   '));});}
        const p=_termResolve(s,args.find(a=>!a.startsWith('-'))||'.');
        emit(`<span style="color:#e2e8f0">${_esc(p)}</span>`);dt(p); break;
      }
      case 'chmod': case 'chown': suc(`permissions updated for ${args[1]||'file'}`); break;
      case 'stat': {
        const p=_termResolve(s,args[0]);
        if(!VFS.exists(p)){err(`stat: cannot stat '${args[0]}': No such file`);break;}
        ok(`  File: ${p}\n  Size: (virtual)\nAccess: -rw-r--r--\n  Uid: 1000/ghaniy`); break;
      }
      case 'du': ok(`4.0K\t${_termResolve(s,args.find(a=>!a.startsWith('-'))||'.')}`); break;
      case 'df': inf(`Filesystem   1K-blocks  Used  Avail Use% Mounted on<br>ghaniyfs     10240000   2048 9216000   1% /`); break;
      case 'file': ok(`${args[0]}: ${args[0]?.endsWith('.sh')?'Bourne-Again shell script':'ASCII text'}`); break;
      case 'less': case 'more': {
        const src=args[0]?VFS.read(_termResolve(s,args[0]))||'':pipeIn||'';
        src.split('\n').slice(0,50).forEach(l=>ok(l));
        if(src.split('\n').length>50)inf(`(${src.split('\n').length} lines total — output truncated)`); break;
      }

      // ── Shell script execution ──────────────────────────────────
      case 'sh': case 'bash': case 'source': case '.': {
        const file=args.find(a=>!a.startsWith('-'));
        if(!file){inf('bash 5.2.0(1)-release (GhaniyOS)');break;}
        const p=_termResolve(s,file);
        const src=VFS.read(p);
        if(src===null){err(`${cmd}: ${file}: No such file or directory`);break;}
        const inp=document.getElementById('tinp-'+winId);
        if(inp)inp.disabled=true;
        inf(`<span style="color:#475569">Executing: ${_esc(file)}</span>`);
        const interp=new ShellInterpreter(s,c=>_execSync(winId,c),html=>_print(winId,`<span style="color:#94a3b8">${html}</span>`));
        interp.runLines(src.split('\n')).then(()=>{
          if(inp){inp.disabled=false;inp.focus();}
          suc(`[Process completed — exit 0]`);
          if(doPrompt)_prompt(winId);
        });
        return;
      }

      case 'nano': case 'vi': case 'vim': case 'nvim': {
        const p=_termResolve(s,args[0]);
        OS.open('Notes',{path:p,content:VFS.read(p)||''});
        inf(`Opening ${_esc(args[0]||'untitled')} in editor...`); break;
      }

      case 'ifconfig': case 'ip':
        inf(`eth0: flags=4163&lt;UP,BROADCAST,RUNNING&gt; mtu 1500<br>      inet <b>192.168.1.42</b>  netmask 255.255.255.0<br>      ether 00:11:22:33:44:55  txqueuelen 1000`); break;
      case 'netstat':
        inf(`Active connections:<br>tcp  127.0.0.1:80  LISTEN<br>tcp  0.0.0.0:443  LISTEN`); break;
      case 'nslookup': inf(`Server: 8.8.8.8\nAddress: 8.8.8.8#53\n\nName: ${_esc(args[0]||'google.com')}\nAddress: 93.184.216.34`); break;
      case 'ping': {
        const host=args.find(a=>!a.startsWith('-'))||'google.com';
        const count=parseInt(args.find((_,i)=>args[i-1]==='-c')||'4');
        const inp2=document.getElementById('tinp-'+winId);
        if(inp2)inp2.disabled=true;
        inf(`PING ${_esc(host)} (93.184.216.34): 56 data bytes`);
        let i=0;
        const iv=setInterval(()=>{
          const ms=(Math.random()*15+8).toFixed(2);
          _print(winId,`<span style="color:#94a3b8">64 bytes from ${_esc(host)}: icmp_seq=${i} ttl=118 time=<b style="color:#22c55e">${ms} ms</b></span>`);
          document.getElementById('tout-'+winId)?.scrollTo(0,9e9);
          if(++i>=count){clearInterval(iv);_print(winId,`<span style="color:#60a5fa">--- ping statistics ---<br>${count} packets, 0% loss</span>`);if(inp2){inp2.disabled=false;inp2.focus();}if(doPrompt)_prompt(winId);}
        },700);
        return;
      }
      case 'traceroute': {
        const host=args[0]||'google.com';
        const inp2=document.getElementById('tinp-'+winId);
        if(inp2)inp2.disabled=true;
        const hops=['192.168.1.1','10.0.0.1','72.14.204.1','172.217.14.1'];
        hops.forEach((hop,i)=>{
          setTimeout(()=>{
            const ms=(Math.random()*20+5).toFixed(1);
            _print(winId,`<span style="color:#94a3b8"> ${String(i+1).padStart(2)}  ${hop}  <b style="color:#22c55e">${ms} ms</b></span>`);
            if(i===hops.length-1){if(inp2){inp2.disabled=false;inp2.focus();}if(doPrompt)_prompt(winId);}
          },(i+1)*400);
        });
        return;
      }
      case 'curl': case 'wget': {
        const url=args.find(a=>!a.startsWith('-'))||'(no url)';
        const out=args.find((_,i)=>args[i-1]==='-o'||args[i-1]==='-O');
        const inp3=document.getElementById('tinp-'+winId);
        if(inp3)inp3.disabled=true;
        inf(`Connecting to ${_esc(url)}...`);
        setTimeout(()=>{
          const body=`HTTP/1.1 200 OK\nContent-Type: text/html\n\n&lt;!DOCTYPE html&gt;\n&lt;html&gt;&lt;body&gt;Hello from ${_esc(url)}&lt;/body&gt;&lt;/html&gt;`;
          if(out)VFS.write(_termResolve(s,out),body.replace(/&lt;/g,'<').replace(/&gt;/g,'>'));
          else inf(body);
          if(inp3){inp3.disabled=false;inp3.focus();}if(doPrompt)_prompt(winId);
        },1200);
        return;
      }

      case 'apt': case 'apt-get': case 'pkg': {
        const sub=args[0],pkgs=args.slice(1).filter(a=>!a.startsWith('-'));
        if(sub==='update'){
          _asyncPrint(winId,['Hit:1 http://archive.ghaniyos.org/stable InRelease','Get:2 http://security.ghaniyos.org stable/updates InRelease','Fetched 2,047 B in 0s (4,213 B/s)','<span style="color:#22c55e">Reading package lists... Done</span>'],200);
        } else if(sub==='upgrade'){
          const up=PkgRegistry.list().slice(0,3);
          _asyncPrint(winId,[`Reading state information... Done`,`${up.length} packages can be upgraded: ${up.join(' ')}`,'Fetching packages...',...up.map(p=>`Setting up ${p} (latest)...`),'<span style="color:#22c55e">✔ All packages up to date.</span>'],300);
        } else if(sub==='install'){
          const all=pkgs.length?pkgs:['base-utils'];
          _asyncPrint(winId,[`Reading state information... Done`,`NEW packages: <b>${all.map(_esc).join(' ')}</b>`,...all.map(p=>`Unpacking ${_esc(p)}...`),...all.map(p=>`Setting up ${_esc(p)}...`),`<span style="color:#22c55e">✔ ${all.length} package(s) installed.</span>`],250);
          all.forEach(p=>PkgRegistry.install(p));
        } else if(sub==='remove'||sub==='purge'){
          _asyncPrint(winId,[...pkgs.map(p=>`Removing ${_esc(p)}...`),'<span style="color:#22c55e">Done.</span>'],300);
          pkgs.forEach(p=>PkgRegistry.remove(p));
        } else if(sub==='list'){
          PkgRegistry.list().forEach(p=>ok(`${p}/stable (installed)`));
        } else if(sub==='search'){
          const q=(pkgs[0]||'').toLowerCase();
          const matches=PKG_CATALOG.filter(p=>p.includes(q));
          if(!matches.length)ok(`No results for '${q}'`);
          else matches.forEach(p=>ok(`${p}/stable - ${PkgRegistry.has(p)?'<span style="color:#22c55e">[installed]</span>':'available'}`));
        } else if(sub==='show'){
          const pkg=pkgs[0]||'';
          ok(`Package: ${pkg}\nVersion: latest\nStatus: ${PkgRegistry.has(pkg)?'installed':'not installed'}`);
        } else if(sub==='autoremove') suc('0 packages to remove.');
        else err(`apt: invalid operation '${sub||''}'. Try: update upgrade install remove list search`);
        return;
      }
      case 'npm': {
        const sub=args[0],pkg=args[1]||'package';
        if(sub==='install'||sub==='i') _asyncPrint(winId,[`added 1 package in 242ms`,`<span style="color:#22c55e">✔ ${_esc(pkg)} installed</span>`],500);
        else if(sub==='start') inf(`<span style="color:#22c55e">▶</span> starting...\n<span style="color:#22c55e">→  Local: http://localhost:3000/</span>`);
        else if(sub==='init'){ok(`Wrote to ${s.cwd}/package.json`);VFS.write(s.cwd+'/package.json',JSON.stringify({name:'project',version:'1.0.0'},null,2));}
        else ok(`npm ${raw.slice(4)}`);
        return;
      }
      case 'pip': case 'pip3': {
        const sub=args[0],pkg=args[1]||'package';
        if(sub==='install') _asyncPrint(winId,[`Collecting ${_esc(pkg)}`,`Downloading ${_esc(pkg)}-1.0.0.whl`,`<span style="color:#22c55e">Successfully installed ${_esc(pkg)}-1.0.0</span>`],400);
        else ok(`pip3 ${raw.slice(4)}`);
        return;
      }
      case 'make': {
        _asyncPrint(winId,[`make: Entering directory '${s.cwd}'`,`gcc -Wall -o output main.c`,`<span style="color:#22c55e">✔ Build complete</span>`],400);
        return;
      }
      case 'gcc': case 'g++': {
        const out=args.find((_,i)=>args[i-1]==='-o')||'a.out';
        _asyncPrint(winId,[`Compiling...`,`Linking...`,`<span style="color:#22c55e">✔ Built: ${_esc(out)}</span>`],500);
        return;
      }
      case 'node': case 'nodejs': {
        if(args.length&&!args[0].startsWith('-')){
          const src=VFS.read(_termResolve(s,args[0]));
          if(src){
            inf(`<span style="color:#475569">▶ node ${_esc(args[0])}</span>`);
            try{
              const captured=[];
              const fc={log:(...a)=>captured.push(a.map(String).join(' ')),error:(...a)=>captured.push('ERROR: '+a.join(' ')),warn:(...a)=>captured.push('WARN: '+a.join(' '))};
              Function('console',src)(fc);
              captured.forEach(l=>ok(l));
            }catch(e){err(e.message);}
          } else err(`Cannot open: ${args[0]}`);
        } else inf(`Welcome to Node.js v20.11.0 (GhaniyOS Virtual)\nType .exit to quit.`);
        break;
      }
      case 'python3': case 'python': {
        if(args.length&&!args[0].startsWith('-')){
          const src=VFS.read(_termResolve(s,args[0]));
          if(src){
            inf(`<span style="color:#475569">▶ python3 ${_esc(args[0])}</span>`);
            src.split('\n').forEach(line=>{
              const m=line.match(/^\s*print\s*\((.+)\)\s*$/);
              if(m){try{ok(String(Function('"use strict";return ('+m[1]+')')()));}catch{ok(m[1].replace(/['"]/g,''));}}
            });
          } else err(`python3: can't open file '${args[0]}': No such file`);
        } else inf(`Python 3.12.0 (GhaniyOS Virtual)\n>>> `);
        break;
      }

      // ── REAL GIT ENGINE ─────────────────────────────────────
      case 'git': {
        const sub=args[0];
        if(!sub){
          inf(`<b>usage:</b> git &lt;command&gt; [args]<br><br><span style="color:#f59e0b">Commands:</span> clone, init, status, add, commit, push, pull, log, branch, checkout, diff, remote, stash, tag, fetch<br><br><span style="color:#64748b">git version 2.43.0 (GhaniyOS)</span>`);
          break;
        }
        if(sub==='clone'){
          const rawUrl=args[1]||'';
          const destArg=args[2];
          if(!rawUrl){err('git clone: you must specify a repository to clone.');break;}
          let owner='',repo='';
          const ghHttps=rawUrl.match(/github\.com[/:]([^/]+)\/([^/.]+)/);
          const ghShort=rawUrl.match(/^([A-Za-z0-9_.-]+)\/([A-Za-z0-9_.-]+)$/);
          if(ghHttps){owner=ghHttps[1];repo=ghHttps[2].replace(/\.git$/,'');}
          else if(ghShort){owner=ghShort[1];repo=ghShort[2].replace(/\.git$/,'');}
          else{
            const name=destArg||rawUrl.split('/').pop().replace(/\.git$/,'')||'repo';
            _asyncPrint(winId,[`Cloning into '<b>${_esc(name)}</b>'...`,`remote: Enumerating objects: 104, done.`,`Receiving objects: 100% (104/104), done.`,`<span style="color:#22c55e">✔ Cloned (simulated)</span>`],300);
            VFS.mkdir(_termResolve(s,name));VFS.write(_termResolve(s,name)+'/README.md',`# ${name}\nCloned from: ${rawUrl}`);
            return;
          }
          const destName=destArg||repo;
          const destPath=_termResolve(s,destName);
          const apiInfo=`https://api.github.com/repos/${owner}/${repo}`;
          const rawBase=`https://raw.githubusercontent.com/${owner}/${repo}/HEAD/`;
          const inp=document.getElementById('tinp-'+winId);
          if(inp)inp.disabled=true;
          const tprint=html=>_print(winId,html);
          const tdone=()=>{if(inp){inp.disabled=false;inp.focus();}_prompt(winId);};
          tprint(`<span style="color:#94a3b8">Cloning into '<b>${_esc(destName)}</b>'...</span>`);
          tprint(`<span style="color:#94a3b8">Fetching repo info: <span style="color:#60a5fa">github.com/${owner}/${repo}</span></span>`);
          fetch(apiInfo,{headers:{'Accept':'application/vnd.github.v3+json'}})
            .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status} — not found or private`);return r.json();})
            .then(info=>{
              tprint(`<span style="color:#94a3b8">remote: <b>${_esc(info.full_name)}</b> — ${_esc(info.description||'No description')}</span>`);
              tprint(`<span style="color:#94a3b8">remote: ★ ${info.stargazers_count} stars · 🍴 ${info.forks_count} forks · 📦 ${info.size} KB</span>`);
              tprint(`<span style="color:#94a3b8">remote: default branch: <b>${_esc(info.default_branch)}</b></span>`);
              const treeUrl=`https://api.github.com/repos/${owner}/${repo}/git/trees/${info.default_branch}?recursive=1`;
              return fetch(treeUrl,{headers:{'Accept':'application/vnd.github.v3+json'}});
            })
            .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status} — could not fetch tree`);return r.json();})
            .then(async treeData=>{
              const allFiles=(treeData.tree||[]).filter(n=>n.type==='blob');
              const allDirs=(treeData.tree||[]).filter(n=>n.type==='tree');
              tprint(`<span style="color:#94a3b8">remote: Counting objects: <b>${treeData.tree.length}</b>, done.</span>`);
              tprint(`<span style="color:#94a3b8">remote: Total ${allFiles.length} files in ${allDirs.length} directories${treeData.truncated?' (truncated)':''}</span>`);
              tprint(`<span style="color:#94a3b8">Receiving objects: ████████████████████ 100%</span>`);
              VFS.mkdir(destPath);VFS.mkdir(destPath+'/.git');
              VFS.write(destPath+'/.git/config',`[core]\n\trepositoryformatversion = 0\n[remote "origin"]\n\turl = https://github.com/${owner}/${repo}.git\n[branch "main"]\n\tremote = origin`);
              VFS.write(destPath+'/.git/HEAD',`ref: refs/heads/${treeData.default_branch||'main'}\n`);
              allDirs.forEach(d=>VFS.mkdir(destPath+'/'+d.path));
              const PRIORITY_EXT=['.md','.json','.txt','.yml','.yaml','.toml','.gitignore','.sh','.env.example'];
              const PRIORITY_NAME=['README','package.json','Makefile','Dockerfile','index.js','index.ts','main.js','main.ts','app.js','app.ts','index.html'];
              const CODE_EXT=['.js','.ts','.jsx','.tsx','.py','.go','.rs','.c','.cpp','.h','.css','.html','.vue','.svelte'];
              const scored=allFiles.map(f=>{
                const name=f.path.split('/').pop(),ext='.'+name.split('.').pop();
                let score=0;
                if(PRIORITY_NAME.some(n=>name.startsWith(n)))score+=100;
                if(PRIORITY_EXT.includes(ext))score+=50;
                if(CODE_EXT.includes(ext))score+=20;
                if(f.size<50000)score+=30;
                if(f.path.split('/').length<=2)score+=20;
                return{...f,score};
              }).sort((a,b)=>b.score-a.score);
              const MAX_FILES=Math.min(scored.length,40),toFetch=scored.slice(0,MAX_FILES);
              tprint(`<span style="color:#94a3b8">Fetching <b>${toFetch.length}</b> files (of ${allFiles.length} total)...</span>`);
              const progDiv=document.createElement('div');
              progDiv.id='git-progress-'+winId;
              progDiv.innerHTML=`<span style="color:#94a3b8">[░░░░░░░░░░░░░░░░░░░░] 0% — starting...</span>`;
              document.getElementById('tout-'+winId)?.appendChild(progDiv);
              let done=0;
              const BATCH=5;
              for(let i=0;i<toFetch.length;i+=BATCH){
                const batch=toFetch.slice(i,i+BATCH);
                await Promise.allSettled(batch.map(async file=>{
                  try{
                    const r=await fetch(rawBase+file.path);
                    if(!r.ok)return;
                    const text=await r.text();
                    done++;
                    VFS.write(destPath+'/'+file.path,text);
                    const pct=Math.floor((done/toFetch.length)*100);
                    const bar='█'.repeat(Math.floor(pct/5))+'░'.repeat(20-Math.floor(pct/5));
                    const el=document.getElementById('git-progress-'+winId);
                    if(el)el.innerHTML=`<span style="color:#94a3b8">[${bar}] ${pct}% — ${_esc(file.path)}</span>`;
                  }catch{}
                }));
                document.getElementById('tout-'+winId)?.scrollTo(0,9e9);
              }
              // Stub remaining files
              scored.slice(MAX_FILES).forEach(f=>{VFS.write(destPath+'/'+f.path,`[Not fetched — size: ${f.size}B]\nFetch: ${rawBase+f.path}`);});
              tprint(`<span style="color:#22c55e">✔ Done. ${done} files written to <b>${_esc(destName)}/</b></span>`);
              tprint(`<span style="color:#475569">Tip: cd ${_esc(destName)} && ls</span>`);
              if(allFiles.length>MAX_FILES)tprint(`<span style="color:#f59e0b">⚠ Large repo: ${allFiles.length-MAX_FILES} files stubbed (rate limit). Add GitHub token for full clone.</span>`);
              tdone();
            })
            .catch(e2=>{
              tprint(`<span style="color:#ef4444">git: clone failed: ${_esc(e2.message)}</span>`);
              tprint(`<span style="color:#475569">Possible: private repo, network blocked, or rate limit.</span>`);
              tdone();
            });
          return;
        }
        if(sub==='status') inf(`On branch <b>main</b>\n<span style="color:#22c55e">nothing to commit, working tree clean</span>`);
        else if(sub==='init'){VFS.mkdir(s.cwd+'/.git');VFS.write(s.cwd+'/.git/config','[core]\n\trepositoryformatversion = 0');inf(`Initialized empty Git repository in <b>${s.cwd}/.git/</b>`);}
        else if(sub==='add') ok(args[1]==='.'?'All changes staged.':`Changes staged: ${_esc(args[1]||'.')}`);
        else if(sub==='commit'){const msg=args.find((_,i)=>args[i-1]==='-m')||'update';ok(`[main ${Math.random().toString(16).slice(2,9)}] ${_esc(msg)}`);}
        else if(sub==='push') _asyncPrint(winId,['Enumerating objects: 3, done.','Writing objects: 100% (3/3), done.','<span style="color:#22c55e">Branch main tracked.</span>'],400);
        else if(sub==='pull') _asyncPrint(winId,['Updating a1b2c3d..f4e5d6c','Fast-forward',' 1 file changed'],300);
        else if(sub==='log') inf(`<span style="color:#f59e0b">commit ${Math.random().toString(16).slice(2,11)} (HEAD → main)</span>\nAuthor: Ghaniy &lt;ghaniy@ghaniyos.local&gt;\nDate: ${new Date().toDateString()}\n\n    Initial commit`);
        else if(sub==='branch'){if(args[1])ok(`Created branch '${_esc(args[1])}'`);else emit(`<span style="color:#22c55e">* main</span>`);}
        else if(sub==='checkout'||sub==='switch'){const b=args.find(a=>!a.startsWith('-'))||'main';ok(args.includes('-b')?`Switched to new branch '${_esc(b)}'`:`Switched to branch '${_esc(b)}'`);}
        else if(sub==='diff') ok('(nothing to diff)');
        else if(sub==='stash') ok('Saved working directory state');
        else if(sub==='remote'){if(args[1]==='add')ok(`Remote '${_esc(args[2]||'origin')}' added.`);else if(args[1]==='-v')ok(`origin\thttps://github.com/ghaniy/project.git (fetch)`);else ok('origin');}
        else if(sub==='tag') ok(`Created tag '${_esc(args[1]||'v1.0.0')}'`);
        else if(sub==='fetch') _asyncPrint(winId,['From https://github.com/ghaniy/project','* branch HEAD -> FETCH_HEAD'],400);
        else if(sub==='rebase') ok(`Successfully rebased refs/heads/${_esc(args[1]||'main')}`);
        else if(sub==='reset') ok(`HEAD is now at a1b2c3d`);
        else if(sub==='show') inf(`commit a1b2c3d\nAuthor: Ghaniy\nDate: ${new Date().toDateString()}\n\n    Initial commit`);
        else if(sub==='--version'||sub==='version') ok('git version 2.43.0 (GhaniyOS)');
        else if(sub==='--help'||sub==='help'){_exec(winId,'git');return;}
        else err(`'${_esc(sub)}' is not a git command. See 'git --help'.`);
        break;
      }
      // ────────────────────────────────────────────────────────

      case 'zip': { VFS.write(_termResolve(s,args[0]||'archive.zip'),'[zip archive]');suc(`Created: ${args[0]||'archive.zip'}`); break; }
      case 'unzip': _asyncPrint(winId,[`Extracting ${_esc(args[0]||'archive.zip')}...`,'<span style="color:#22c55e">✔ Extracted</span>'],300); return;
      case 'tar': {
        if(args.some(a=>a.includes('c')))suc(`Created: ${args.find(a=>!a.startsWith('-'))||'archive.tar.gz'}`);
        else if(args.some(a=>a.includes('x'))) _asyncPrint(winId,[`Extracting...`,'<span style="color:#22c55e">✔ Done</span>'],400);
        else ok(`Usage: tar [czxvf] archive [files]`);
        if(args.some(a=>a.includes('x'))){return;} break;
      }
      case 'sleep': { const ms=(parseFloat(args[0])||1)*1000; const inp=document.getElementById('tinp-'+winId);if(inp)inp.disabled=true;setTimeout(()=>{if(inp){inp.disabled=false;inp.focus();}if(doPrompt)_prompt(winId);},ms);return; }
      case 'yes': for(let i=0;i<15;i++)ok(args[0]||'y'); break;
      case 'true': s._lastExit=0; break;
      case 'false': s._lastExit=1; break;
      case 'lsblk': inf(`NAME   MAJ:MIN RM  SIZE RO TYPE MOUNTPOINTS\nvda    252:0    0   10G  0 disk /`); break;
      case 'df2': case 'mount': ok(`/dev/vda1 on / type ext4 (rw)`); break;
      // ── GUI / BROWSER LAUNCH COMMANDS ────────────────────────
      case 'firefox': case 'chromium': case 'chrome': case 'brave':
      case 'opera': case 'vivaldi': case 'lynx': case 'w3m': {
        const url = args.find(a => !a.startsWith('-')) || 'https://www.google.com';
        const fullUrl = url.startsWith('http') ? url : 'https://'+url;
        suc(`Launching ${cmd}…`);
        brOpenExternal(fullUrl);
        break;
      }
      case 'open': case 'xdg-open': case 'start': {
        const target = args[0] || '';
        if (target.startsWith('http')||target.startsWith('www.')) {
          brOpenExternal(target);
          suc(`Opening ${_esc(target)} in browser…`);
        } else if (VFS.exists(_termResolve(s, target))) {
          const p = _termResolve(s, target);
          if (target.endsWith('.sh')) { _exec(winId, 'sh '+target); return; }
          else if (target.endsWith('.js')) { _exec(winId, 'node '+target); return; }
          else if (target.endsWith('.py')) { _exec(winId, 'python3 '+target); return; }
          else OS.open('Notes', { path: p, content: VFS.read(p)||'' });
        } else {
          err(`${cmd}: ${target}: No such file or cannot open`);
        }
        break;
      }
      case 'gnome-open': case 'nautilus': suc('Opening Files...'); setTimeout(()=>OS.open('Files'),100); break;
      case 'gedit': case 'kate': case 'mousepad': case 'leafpad': {

        else if(sub==='restart') { suc(`Stopped ${svc}.service`); setTimeout(()=>{_print(winId,`<span style="color:#22c55e">Started ${svc}.service</span>`);},500); }
        else if(sub==='list-units'||sub==='--list-units') {

      case 'adduser': case 'useradd': suc(`User '${args[0]||'newuser'}' added (virtual)`); break;
      case 'groups': ok(`${s.env.USER||'ghaniy'} : ghaniy sudo docker`); break;
      case 'ss': case 'lsof':
        inf(`Netid  State   Local Address:Port    Peer Address:Port<br>tcp    LISTEN  0.0.0.0:80               0.0.0.0:*<br>tcp    LISTEN  0.0.0.0:443              0.0.0.0:*`); break;
      case 'nmap':
        inf(`Starting Nmap 7.94 ( https://nmap.org )<br>Nmap scan report for ${_esc(args[args.length-1]||'localhost')}<br>Host is up (0.0010s latency).<br>PORT   STATE SERVICE<br>80/tcp open  http<br>443/tcp open https`); break;
      case 'ssh': {
        const host=args.find(a=>!a.startsWith('-'))||'server';
        const inp=document.getElementById('tinp-'+winId);if(inp)inp.disabled=true;
        _asyncPrint(winId,[`ssh: connecting to ${_esc(host)}...`,`Warning: browser sandbox — real SSH not possible.`,`<span style="color:#f59e0b">Tip: Use a web SSH client like shellinabox or Termius PWA.</span>`],400);

      // ── PACKAGE EXTRAS ────────────────────────────────────────
      case 'snap': {
        const sub=args[0];

          const pkg=args[1]||'package';
          _asyncPrint(winId,[`Download snap "${_esc(pkg)}"`,`Mount snap "${_esc(pkg)}"`,`<span style="color:#22c55e">✔ ${_esc(pkg)} installed via snap</span>`],400);
          PkgRegistry.install(pkg);

        else ok(`snap ${args.join(' ')}`);
